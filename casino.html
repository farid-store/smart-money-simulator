<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ocean Emperor — Ultimate Weapon Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --neon-blue:#00e5ff; --neon-gold:#ffd700; --neon-red:#ff1744;
  --neon-green:#00ff88; --neon-purple:#e040fb; --neon-orange:#ff9100;
  --bg-deep:#000811; --bg-panel:rgba(0,8,28,0.96);
  --border-glow:rgba(0,229,255,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

/* REVISI: Lock layar agar tidak bergeser oleh browser/keyboard */
html, body {
  background:var(--bg-deep);
  font-family:'Rajdhani',sans-serif;
  overflow:hidden;
  width:100%;
  height:100%;
  position:fixed;
  user-select:none;
  cursor:crosshair;
}

canvas{display:block;position:fixed;top:0;left:0;}

/* ── HUD ── */
/* REVISI: position absolute menjadi fixed */
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;background:linear-gradient(to bottom,rgba(0,5,20,0.95),transparent);}
.hud-stat{text-align:center;min-width:65px;}
.hud-label{font-size:8px;letter-spacing:3px;color:#5af;text-transform:uppercase;font-family:'Orbitron',sans-serif;}
.hud-val{font-size:15px;font-weight:700;color:#fff;font-family:'Orbitron',sans-serif;}
.hud-val.gold{color:var(--neon-gold);text-shadow:0 0 12px rgba(255,215,0,0.7);}
.hud-val.blue{color:var(--neon-blue);}
.jackpot-mid{text-align:center;flex:1;}
.jackpot-label{font-size:8px;letter-spacing:4px;color:#aaa;text-transform:uppercase;font-family:'Orbitron',sans-serif;}
.jackpot-val{font-size:20px;font-weight:900;color:var(--neon-gold);text-shadow:0 0 20px rgba(255,215,0,0.8);font-family:'Orbitron',sans-serif;}

/* weapon timer bar */
#sp-bar{position:absolute;left:50%;transform:translateX(-50%);top:60px;width:260px;display:none;flex-direction:column;align-items:center;gap:2px;}
#sp-label{font-size:10px;font-weight:700;letter-spacing:3px;color:#fff;font-family:'Orbitron',sans-serif;}
#sp-bg{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);}
#sp-fill{height:100%;border-radius:3px;transition:width 0.1s linear;}

/* weapon selector */
#weapon-row{position:absolute;bottom:96px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto;}
.w-slot{width:52px;height:52px;border:1px solid rgba(0,229,255,0.25);border-radius:8px;background:rgba(0,8,28,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.w-slot.active{border-color:var(--neon-gold);background:rgba(255,215,0,0.12);box-shadow:0 0 14px rgba(255,215,0,0.4);}
.w-slot.locked{opacity:0.4;cursor:not-allowed;}
.w-slot .wico{font-size:20px;}
.w-slot .wlvl{font-size:8px;color:var(--neon-gold);font-family:'Orbitron',sans-serif;font-weight:700;}
.w-slot .wname{font-size:7px;color:#7af;letter-spacing:1px;text-transform:uppercase;}

/* bottom HUD */
.hud-bot{pointer-events:auto;background:rgba(0,5,20,0.95);border-top:1px solid rgba(0,200,255,0.15);padding:8px 10px 10px;display:flex;align-items:center;justify-content:space-around;gap:6px;flex-wrap:wrap;}
.hud-btn{background:rgba(0,200,255,0.08);border:1px solid rgba(0,200,255,0.35);color:var(--neon-blue);padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:1px;border-radius:4px;cursor:pointer;transition:all 0.2s;font-family:'Orbitron',sans-serif;}
.hud-btn:hover,.hud-btn:active{background:rgba(0,200,255,0.22);}
.hud-btn.on{background:rgba(0,255,136,0.12);border-color:rgba(0,255,136,0.5);color:var(--neon-green);}
.hud-btn.gold-btn{border-color:rgba(255,215,0,0.5);color:var(--neon-gold);background:rgba(255,215,0,0.07);}
.hud-btn.gold-btn:hover{background:rgba(255,215,0,0.18);}
.hud-btn.red-btn{border-color:rgba(255,23,68,0.5);color:var(--neon-red);background:rgba(255,23,68,0.07);}
.bet-ctrl{display:flex;align-items:center;gap:6px;}
.bet-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);color:#fff;width:24px;height:24px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.bet-btn:hover{background:rgba(255,255,255,0.18);}

/* floaters */
/* REVISI: position fixed */
#floaters{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.floater{position:absolute;font-weight:900;pointer-events:none;animation:floatUp 1.3s ease-out forwards;font-family:'Orbitron',sans-serif;}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0.5);}15%{opacity:1;transform:translateY(-12px) scale(1.15);}100%{opacity:0;transform:translateY(-110px) scale(0.9);}}

/* ── SHOP OVERLAY ── */
/* REVISI: position fixed */
#shop-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,10,0.92);display:none;align-items:flex-start;justify-content:center;z-index:300;pointer-events:auto;overflow-y:auto;padding:10px;}
#shop-box{background:rgba(0,6,22,0.98);border:1px solid rgba(0,229,255,0.3);border-radius:14px;padding:18px;max-width:680px;width:100%;}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.shop-title{font-size:18px;font-weight:900;color:var(--neon-blue);font-family:'Orbitron',sans-serif;letter-spacing:3px;}
.shop-balance{font-size:13px;color:var(--neon-gold);font-family:'Orbitron',sans-serif;}
.shop-close{background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;}
.shop-tabs{display:flex;gap:6px;margin-bottom:14px;}
.shop-tab{background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);color:#7af;padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:2px;border-radius:4px;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all 0.2s;}
.shop-tab.active{background:rgba(0,229,255,0.18);border-color:var(--neon-blue);color:var(--neon-blue);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;}
.shop-card{background:rgba(0,10,30,0.9);border:1px solid rgba(0,229,255,0.18);border-radius:10px;padding:12px;text-align:center;transition:all 0.2s;cursor:pointer;}
.shop-card:hover{border-color:rgba(0,229,255,0.5);background:rgba(0,229,255,0.06);}
.shop-card.owned{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.05);}
.shop-card.equipped{border-color:var(--neon-gold);background:rgba(255,215,0,0.07);}
.shop-card .card-ico{font-size:28px;margin-bottom:6px;}
.shop-card .card-name{font-size:11px;font-weight:700;color:#fff;letter-spacing:1px;margin-bottom:3px;font-family:'Orbitron',sans-serif;}
.shop-card .card-desc{font-size:9px;color:#7af;margin-bottom:6px;line-height:1.4;}
.shop-card .card-stat{font-size:9px;color:#5af;margin-bottom:8px;}
.shop-card .card-price{font-size:12px;font-weight:900;color:var(--neon-gold);font-family:'Orbitron',sans-serif;}
.shop-card .card-price.free{color:var(--neon-green);}
.shop-card .card-btn{margin-top:6px;width:100%;padding:5px;font-size:9px;font-weight:700;letter-spacing:1px;border-radius:4px;cursor:pointer;border:none;font-family:'Orbitron',sans-serif;}
.shop-card .card-btn.buy{background:var(--neon-gold);color:#000;}
.shop-card .card-btn.equip{background:rgba(0,229,255,0.2);color:var(--neon-blue);border:1px solid var(--neon-blue);}
.shop-card .card-btn.equipped-tag{background:rgba(255,215,0,0.15);color:var(--neon-gold);border:1px solid var(--neon-gold);}
.shop-card .card-btn.maxed{background:rgba(255,255,255,0.08);color:#888;cursor:default;}

/* bonus wheel */
/* REVISI: position fixed */
#bonus-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;z-index:200;pointer-events:auto;}
#bonus-box{background:radial-gradient(circle at 50% 30%,#0a1a40,#000);border:2px solid rgba(255,215,0,0.6);border-radius:16px;padding:24px 20px;min-width:300px;max-width:90vw;text-align:center;position:relative;}
#bonus-title{font-size:18px;font-weight:900;color:var(--neon-gold);margin-bottom:4px;letter-spacing:2px;font-family:'Orbitron',sans-serif;}
#bonus-sub{font-size:11px;color:#aaa;margin-bottom:16px;letter-spacing:1px;}
#bonus-wrap{width:260px;height:260px;margin:0 auto 16px;position:relative;}
#bonusCanvas{border-radius:50%;border:2px solid rgba(255,215,0,0.4);}
#bonus-cd{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:900;color:rgba(255,255,255,0.15);pointer-events:none;font-family:'Orbitron',sans-serif;}
#bonus-result{font-size:26px;font-weight:900;color:#fff;min-height:36px;font-family:'Orbitron',sans-serif;}
#bonus-close{margin-top:14px;background:rgba(0,200,255,0.15);border:1px solid rgba(0,200,255,0.4);color:var(--neon-blue);padding:9px 26px;font-size:11px;font-weight:700;border-radius:6px;cursor:pointer;display:none;font-family:'Orbitron',sans-serif;letter-spacing:2px;}

/* game over */
/* REVISI: position fixed */
#gameover{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:100;}
#gameover-box{background:rgba(0,5,25,0.97);border:2px solid rgba(255,215,0,0.5);border-radius:14px;padding:30px 44px;text-align:center;display:none;pointer-events:auto;}
#go-title{font-size:26px;font-weight:900;color:var(--neon-gold);margin-bottom:8px;font-family:'Orbitron',sans-serif;}
#go-sub{font-size:12px;color:#aaa;margin-bottom:18px;}
#go-btn{background:linear-gradient(135deg,#ffd700,#ff9100);color:#000;border:none;padding:12px 28px;font-size:12px;font-weight:900;border-radius:6px;cursor:pointer;letter-spacing:2px;font-family:'Orbitron',sans-serif;}

/* god mode */
/* REVISI: position fixed */
#god-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:400;pointer-events:auto;}
#god-box{background:linear-gradient(135deg,#0a0020,#200020);border:2px solid rgba(224,64,251,0.6);border-radius:16px;padding:30px;min-width:300px;max-width:92vw;text-align:center;box-shadow:0 0 60px rgba(224,64,251,0.3);}
#god-title{font-size:20px;font-weight:900;color:var(--neon-purple);margin-bottom:6px;letter-spacing:3px;font-family:'Orbitron',sans-serif;}
#god-sub{font-size:11px;color:#aaa;margin-bottom:20px;}
.god-input{width:100%;background:rgba(224,64,251,0.08);border:1px solid rgba(224,64,251,0.4);color:#fff;padding:10px 14px;font-size:14px;border-radius:6px;font-family:'Orbitron',sans-serif;text-align:center;outline:none;margin-bottom:10px;}
.god-input::placeholder{color:rgba(255,255,255,0.3);}
.god-row{display:flex;gap:8px;margin-bottom:10px;}
.god-btn{flex:1;background:rgba(224,64,251,0.15);border:1px solid rgba(224,64,251,0.5);color:var(--neon-purple);padding:9px;font-size:10px;font-weight:700;letter-spacing:2px;border-radius:6px;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all 0.2s;}
.god-btn:hover{background:rgba(224,64,251,0.3);}
.god-btn.danger{background:rgba(255,23,68,0.12);border-color:rgba(255,23,68,0.4);color:var(--neon-red);}
.god-btn.safe{background:rgba(0,255,136,0.12);border-color:rgba(0,255,136,0.4);color:var(--neon-green);}
#god-status{font-size:11px;color:#7af;margin-top:8px;min-height:18px;font-family:'Orbitron',sans-serif;}
#god-close{margin-top:14px;background:none;border:1px solid rgba(255,255,255,0.2);color:#777;padding:8px 24px;font-size:10px;border-radius:6px;cursor:pointer;letter-spacing:2px;font-family:'Orbitron',sans-serif;}

/* pin modal */
/* REVISI: position fixed */
#pin-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:450;pointer-events:auto;}
#pin-box{background:rgba(0,5,25,0.98);border:2px solid rgba(224,64,251,0.5);border-radius:14px;padding:28px;min-width:280px;text-align:center;}
#pin-title{font-size:16px;font-weight:900;color:var(--neon-purple);margin-bottom:6px;font-family:'Orbitron',sans-serif;letter-spacing:3px;}
#pin-err{font-size:10px;color:var(--neon-red);min-height:16px;margin-bottom:8px;}
#pin-input{width:100%;background:rgba(224,64,251,0.08);border:1px solid rgba(224,64,251,0.3);color:#fff;padding:10px;font-size:20px;border-radius:6px;font-family:'Orbitron',sans-serif;text-align:center;outline:none;letter-spacing:6px;margin-bottom:12px;}
.pin-row{display:flex;gap:8px;}
.pin-btn{flex:1;background:rgba(224,64,251,0.12);border:1px solid rgba(224,64,251,0.35);color:var(--neon-purple);padding:8px;font-size:10px;font-weight:700;letter-spacing:1px;border-radius:6px;cursor:pointer;font-family:'Orbitron',sans-serif;}

@media(max-width:480px){
  .w-slot{width:44px;height:44px;}.w-slot .wico{font-size:16px;}
  .hud-val{font-size:12px;}.jackpot-val{font-size:16px;}
  #bonus-wrap{width:220px;height:220px;}#bonusCanvas{width:220px;height:220px;}
  .shop-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
  
  /* REVISI TATA LETAK TOMBOL */
  .hud-bot {
    flex-wrap: nowrap;
    padding: 6px 4px;
    gap: 4px;
  }
  .hud-btn {
    padding: 6px;
    font-size: 8px;
    letter-spacing: 0;
  }
  .bet-btn {
    width: 20px; height: 20px; font-size: 12px;
  }
  #h-bet {
    font-size: 14px !important; min-width: 26px !important;
  }
  #weapon-row {
    bottom: 75px;
  }
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="floaters"></div>

<div id="ui">
  <div class="hud-top">
    <div class="hud-stat"><div class="hud-label">Saldo</div><div class="hud-val gold" id="h-bal">10,000</div></div>
    <div class="jackpot-mid"><div class="jackpot-label">Grand Jackpot</div><div class="jackpot-val" id="h-jack">9,999,999</div></div>
    <div class="hud-stat"><div class="hud-label">Total Win</div><div class="hud-val blue" id="h-win">0</div></div>
  </div>
  <div id="sp-bar"><div id="sp-label">DRILL</div><div id="sp-bg"><div id="sp-fill"></div></div></div>

  <div id="weapon-row"></div>

  <div class="hud-bot">
    <div class="hud-stat"><div class="hud-label">Level</div><div class="hud-val" id="h-lvl">1</div></div>
    <button class="hud-btn" id="btn-auto" onclick="toggleAuto()">AUTO</button>
    <div>
      <div class="hud-label" style="text-align:center;margin-bottom:2px;">BET</div>
      <div class="bet-ctrl">
        <div class="bet-btn" onclick="changeBet(-10)">−</div>
        <span class="hud-val" id="h-bet" style="min-width:36px;text-align:center;font-size:16px;">10</span>
        <div class="bet-btn" onclick="changeBet(10)">+</div>
      </div>
    </div>
    <button class="hud-btn gold-btn" onclick="changeBet(0,'max')">MAX</button>
    <button class="hud-btn gold-btn" onclick="openShop()">🏪 SHOP</button>
    <button class="hud-btn red-btn" onclick="openPin()">⚙ ADMIN</button>
  </div>
</div>

<div id="shop-overlay">
  <div id="shop-box">
    <div class="shop-header">
      <div class="shop-title">⚓ ARMORY</div>
      <div class="shop-balance">💰 <span id="sh-bal">0</span></div>
      <button class="shop-close" onclick="closeShop()">✕</button>
    </div>
    <div class="shop-tabs">
      <div class="shop-tab active" onclick="shopTab('weapons')">SENJATA</div>
      <div class="shop-tab" onclick="shopTab('upgrades')">UPGRADE</div>
      <div class="shop-tab" onclick="shopTab('buffs')">BUFF</div>
    </div>
    <div id="shop-content" class="shop-grid"></div>
  </div>
</div>

<div id="bonus-overlay">
  <div id="bonus-box">
    <div id="bonus-title">🎰 BONUS!</div>
    <div id="bonus-sub">Berputar...</div>
    <div id="bonus-wrap"><canvas id="bonusCanvas" width="260" height="260"></canvas><div id="bonus-cd"></div></div>
    <div id="bonus-result"></div>
    <button id="bonus-close" onclick="closeBonus()">KLAIM REWARD</button>
  </div>
</div>

<div id="gameover">
  <div id="gameover-box">
    <div id="go-title">GAME OVER</div>
    <div id="go-sub">Saldo habis! Kunjungi toko untuk persiapan.</div>
    <button id="go-btn" onclick="restartGame()">MAIN LAGI</button>
  </div>
</div>

<div id="pin-overlay">
  <div id="pin-box">
    <div id="pin-title">🔐 ADMIN ACCESS</div>
    <div id="pin-err"></div>
    <input id="pin-input" type="password" maxlength="4" placeholder="••••" oninput="tryPin(this.value)">
    <div class="pin-row">
      <button class="pin-btn" onclick="closePinModal()">BATAL</button>
    </div>
  </div>
</div>

<div id="god-overlay">
  <div id="god-box">
    <div id="god-title">☢ GOD MODE</div>
    <div id="god-sub">Admin Panel — Akses Penuh</div>
    <input id="god-amount" class="god-input" type="number" placeholder="Jumlah saldo..." min="0">
    <div class="god-row">
      <button class="god-btn safe" onclick="godAddBalance()">+ ISI SALDO</button>
      <button class="god-btn safe" onclick="godSetBalance()">= SET SALDO</button>
    </div>
    <div class="god-row">
      <button class="god-btn" onclick="godUnlockAll()">🔓 UNLOCK SEMUA</button>
      <button class="god-btn" onclick="godMaxUpgrade()">⬆ MAX UPGRADE</button>
    </div>
    <div class="god-row">
      <button class="god-btn danger" onclick="godClearBalance()">🗑 RESET SALDO</button>
      <button class="god-btn danger" onclick="godKillAll()">💀 KILL ALL FISH</button>
    </div>
    <div id="god-status"></div>
    <button id="god-close" onclick="closeGod()">TUTUP</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  OCEAN EMPEROR v3 — Ultimate Weapon Edition
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ── STATE ──────────────────────────────────────────────────
let balance     = 10000;
let bet         = 10;
let autoFire    = false;
let totalWin    = 0;
let level       = 1;
let jackpotPool = 9999999;
let frameCount  = 0;
let shakeAmt    = 0;
let gameOver    = false;
let mouse       = { x: W/2, y: H/2 };
let cannonX     = 0, cannonY = 0;

// special weapon runtime
let activeSpecials = [];  // array of running SpecialWeapon instances
let spTimer = 0, spMax = 0, spType = '';

// ── WEAPON DEFINITIONS ────────────────────────────────────
const WEAPON_DEFS = {
  single: { id:'single', name:'Single Shot', ico:'🔫', desc:'Satu peluru, cepat & akurat', dmg:1, multi:1, winMod:1.0, price:0, color:'#00e5ff' },
  double: { id:'double', name:'Double Shot',  ico:'🔫🔫', desc:'2 peluru menyebar setiap tembak', dmg:1, multi:2, winMod:1.15, price:500, color:'#ffd700' },
  triple: { id:'triple', name:'Triple Shot',  ico:'💥', desc:'3 peluru kipas sudut 15°', dmg:1, multi:3, winMod:1.25, price:1200, color:'#ff9100' },
  laser:  { id:'laser',  name:'Laser Beam',   ico:'⚡', desc:'Tembus semua ikan sekaligus', dmg:2, multi:1, winMod:1.35, piercing:true, price:2500, color:'#e040fb' },
  missile:{ id:'missile',name:'Missile',      ico:'🚀', desc:'Eksplosif radius 80px per hit', dmg:3, multi:1, winMod:1.4, explosive:true, price:3500, color:'#ff1744' },
  shotgun:{ id:'shotgun',name:'Shotgun',      ico:'💢', desc:'5 peluru menyebar lebar', dmg:1, multi:5, winMod:1.3, price:2000, color:'#ff8a65' },

// ── FISH CLASS ────────────────────────────────────────────
class Fish {
  constructor(){ this.init(); }
  init(overType){
    const t = overType ? FISH_TYPES.find(x=>x.id===overType)||pickFishType() : pickFishType();
    this.id      = t.id;
    this.hp      = t.hp;
    this.maxHp   = t.hp;
    this.val     = t.val;
    // REVISI: Kecepatan ikan konstan, tidak ditambah lagi dengan modifier level
    this.speed   = t.speed;
    this.size    = t.size;
    this.color   = t.color;
    this.glow    = t.glow;
    this.dir     = Math.random()>0.5?1:-1;
    this.x       = this.dir===1?-80:W+80;
    this.baseY   = 80 + Math.random()*(H-220);
    this.y       = this.baseY;
    this.wave    = Math.random()*Math.PI*2;
    this.waveAmp = 8+Math.random()*14;
    this.waveFreq= 0.018+Math.random()*0.02;
    this.tailPh  = Math.random()*Math.PI*2;
    this.alive   = true;
    this.flash   = 0;
    if(this.id==='jackpot') this.countUp = 100+Math.floor(Math.random()*300);
  }
  update(){
    this.x += this.speed * this.dir;
    this.y  = this.baseY + Math.sin(frameCount*this.waveFreq+this.wave)*this.waveAmp;
    this.tailPh += 0.14;
    if(this.id==='jackpot' && frameCount%25===0) this.countUp += Math.floor(8+Math.random()*12);
    if(this.flash>0) this.flash--;
    if((this.dir===1&&this.x>W+110)||(this.dir===-1&&this.x<-110)) this.init();
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    const fl = this.dir===-1?-1:1;
    ctx.scale(fl, 1);
    if(this.flash>0) ctx.globalAlpha = 0.45+0.55*Math.sin(this.flash*0.9);
    ctx.shadowBlur=18+Math.sin(frameCount*0.06)*6; ctx.shadowColor=this.glow;

    // body
    ctx.beginPath(); ctx.ellipse(0,0,this.size,this.size*0.54,0,0,Math.PI*2);
    ctx.fillStyle=this.color; ctx.fill();
    // tail
    const tw=Math.sin(this.tailPh)*11;
    ctx.beginPath(); ctx.moveTo(-this.size+4,0);
    ctx.lineTo(-this.size-18,-12+tw); ctx.lineTo(-this.size-18,12+tw);
    ctx.closePath(); ctx.fillStyle=this.color; ctx.fill();
    // dorsal fin
    ctx.beginPath();
    ctx.moveTo(-this.size*0.2,-this.size*0.54); ctx.lineTo(this.size*0.1,-this.size*0.88);
    ctx.lineTo(this.size*0.4,-this.size*0.54); ctx.fillStyle=this.color; ctx.fill();
    // eye
    ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(this.size*0.44,-this.size*0.1,this.size*0.13,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(this.size*0.46,-this.size*0.1,this.size*0.07,0,Math.PI*2);
    ctx.fillStyle='#111'; ctx.fill();
    // special overlay
    const ICONS = {drill:'⚡',bomb:'💣',roulette:'🎰',random:'🎁',boss:'👑',twin:'✦'};
    if(ICONS[this.id]){
      ctx.fillStyle='rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(0,0,this.size*0.6,this.size*0.35,0,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.scale(fl,1); ctx.font=`${Math.floor(this.size*0.42)}px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(ICONS[this.id],0,2); ctx.restore();
    }
    // count-up label
    if(this.id==='jackpot'){
      ctx.scale(fl,1); ctx.shadowBlur=0;
      ctx.fillStyle='#ffd700'; ctx.font='bold 12px Orbitron,Arial';
      ctx.textAlign='center'; ctx.fillText('+'+this.countUp,0,-this.size-10);
    }
    ctx.restore();
    // hp bar
    if(this.maxHp>5){
      const bw=this.size*1.6, bh=4, bx=this.x-bw/2, by=this.y-this.size-22;
      const pct=this.hp/this.maxHp;
      ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=pct>0.5?'#4caf50':pct>0.25?'#ffc107':'#f44336';
      ctx.fillRect(bx,by,bw*pct,bh);
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=0.5; ctx.strokeRect(bx,by,bw,bh);
    }
  }
}

// ── BULLET CLASS ──────────────────────────────────────────
class Bullet {
  constructor(ox,oy,ang,wDef){
    this.x=ox; this.y=oy;
    this.vx=Math.cos(ang)*16; this.vy=Math.sin(ang)*16;
    this.wDef=wDef;
    this.alive=true; this.trail=[];
    this.piercing=!!wDef.piercing;
    this.explosive=!!wDef.explosive;
    this.plasma=!!wDef.plasma;
    // slow down plasma
    if(this.plasma){ this.vx*=0.55; this.vy*=0.55; }
  }
  dmg(){
    let d = this.wDef.dmg * (1 + upgrades.dmg*0.2);
    return d;
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<-10||this.x>W+10||this.y<-10||this.y>H+10){ this.alive=false; return; }
    for(let f of fishes){
      if(!f.alive) continue;
      if(Math.hypot(this.x-f.x,this.y-f.y)<f.size+8){
        f.hp -= this.dmg(); f.flash=8;
        spawnHit(this.x,this.y);
        if(this.explosive) explodeAt(this.x,this.y,80,this.dmg()*2);
        if(this.plasma)    explodeAt(this.x,this.y,120,this.dmg()*3);
        if(f.hp<=0) killFish(f);
        if(!this.piercing){ this.alive=false; return; }
      }
    }
  }
  draw(){
    const wc = this.wDef.color;
    for(let i=0;i<this.trail.length;i++){
      const a=(i/this.trail.length)*0.6;
      const sz=4*(i/this.trail.length);
      ctx.beginPath(); ctx.arc(this.trail[i].x,this.trail[i].y,sz,0,Math.PI*2);
      ctx.fillStyle=wc.replace('#','rgba(').replace(/^rgba\((..)(..)(..)$/,(m,r,g,b)=>`rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},${a})`)||`rgba(255,215,0,${a})`;
      ctx.fillStyle=`rgba(255,255,255,${a*0.5})`; ctx.fill();
    }
    ctx.save();
    const sz = this.plasma?9:this.explosive?8:this.piercing?6:5;
    ctx.shadowBlur=18; ctx.shadowColor=wc;
    ctx.beginPath(); ctx.arc(this.x,this.y,sz,0,Math.PI*2);
    ctx.fillStyle=wc; ctx.fill();
    if(this.plasma){
      ctx.beginPath(); ctx.arc(this.x,this.y,sz*1.6,0,Math.PI*2);
      ctx.strokeStyle=wc; ctx.lineWidth=1.5; ctx.globalAlpha=0.4; ctx.stroke();
    }
    ctx.restore();
  }
}

// ── LASER CLASS ───────────────────────────────────────────
class Laser {
  constructor(ox,oy,ang){
    this.ox=ox; this.oy=oy;
    this.ang=ang;
    this.life=18; // frames
    this.len=Math.max(W,H)*1.5;
    // immediate hit all fish along ray
    const dx=Math.cos(ang), dy=Math.sin(ang);
    for(let f of fishes){
      if(!f.alive) continue;
      // ray-circle intersection
      const fx=f.x-ox, fy=f.y-oy;
      const proj=fx*dx+fy*dy;
      if(proj<0) continue;
      const perp=Math.abs(fx*dy - fy*dx);
      if(perp<f.size+10){
        const dmgVal = 2*(1+upgrades.dmg*0.2);
        f.hp -= dmgVal; f.flash=10; spawnHit(f.x,f.y);
        if(f.hp<=0) killFish(f);
      }
    }
  }
  update(){ this.life--; }
  draw(){
    const a=this.life/18;
    ctx.save(); ctx.globalAlpha=a;
    ctx.shadowBlur=30; ctx.shadowColor='#e040fb';
    ctx.strokeStyle='#e040fb'; ctx.lineWidth=3+a*4;
    ctx.beginPath();
    ctx.moveTo(this.ox,this.oy);
    ctx.lineTo(this.ox+Math.cos(this.ang)*this.len, this.oy+Math.sin(this.ang)*this.len);
    ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.restore();
  }
}

class SpecialBomb {
  constructor(){
    this.x=W/2; this.y=H/2;
    this.vx=(Math.random()-0.5)*9; this.vy=(Math.random()-0.5)*9;
    this.pulse=0;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    this.vx*=0.99; this.vy*=0.99;
    if(this.x<40||this.x>W-40) this.vx*=-1;

    ctx.strokeStyle='rgba(255,100,100,0.35)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,38+p,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#b71c1c'; ctx.beginPath(); ctx.arc(0,0,28+p,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff1744'; ctx.beginPath(); ctx.arc(0,0,22+p,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.beginPath(); ctx.arc(-6,-6,8,0,Math.PI*2); ctx.fill();
    ctx.restore();
    for(let i=0;i<1;i++) spawnParticle(this.x+(Math.random()-0.5)*38,this.y+(Math.random()-0.5)*38,'#ff5722',3,0.9);

// ── PARTICLE SYSTEM ───────────────────────────────────────
function spawnParticle(x,y,color,size,life){
  particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-1,color,size:size||4,life:life||1,maxLife:life||1,isCoin:false});
}
function spawnHit(x,y){ for(let i=0;i<5;i++) spawnParticle(x,y,'#fff',2.5,0.6); }
function spawnExplosion(x,y,color){
  for(let i=0;i<22;i++) particles.push({x,y,vx:(Math.random()-0.5)*14,vy:(Math.random()-0.5)*14-2,color,size:3+Math.random()*7,life:1,maxLife:1,isCoin:false});
  for(let i=0;i<10;i++) particles.push({x,y,vx:(Math.random()-0.5)*20,vy:(Math.random()-0.5)*20,color:'#fff',size:2,life:0.7,maxLife:0.7,isCoin:false});
}
function spawnCoins(x,y,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,color:'#ffd700',size:5,life:1.3,maxLife:1.3,isCoin:true,rotate:Math.random()*Math.PI*2});
  }
}

// ── FLOAT TEXT ────────────────────────────────────────────
function floatText(str,x,y,color,sz){
  const el=document.createElement('div');
  el.className='floater'; el.textContent=str;
  el.style.cssText=`left:${x}px;top:${y}px;color:${color||'#ffd700'};font-size:${sz||18}px;`;
  document.getElementById('floaters').appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ── AREA EXPLOSION (missile/nuke) ─────────────────────────
function explodeAt(x,y,radius,dmg){
  spawnExplosion(x,y,'#ff9100'); spawnExplosion(x,y,'#ff1744');
  shakeScreen();
  for(let f of fishes){
    if(!f.alive) continue;
    const d=Math.hypot(f.x-x,f.y-y);
    if(d<radius+f.size){ f.hp-=dmg*(1-d/(radius+f.size)*0.5); f.flash=12; if(f.hp<=0) killFish(f); }
  }
}

// ── KILL FISH ─────────────────────────────────────────────
function killFish(f){
  if(!f.alive) return; f.alive=false;
  spawnExplosion(f.x,f.y,f.glow);
  spawnCoins(f.x,f.y,f.id==='boss'?12:f.id==='jackpot'?8:4);
  if(f.id==='drill')    { activateDrill(); f.init(); return; }
  if(f.id==='bomb')     { activateBombMode(); f.init(); return; }
  if(f.id==='roulette') { openBonus('roulette',f); return; }
  if(f.id==='random')   { openBonus('random',f); return; }
  if(f.id==='twin')     {
    // spawn two small fish at position
    for(let i=0;i<2;i++){const nf=new Fish(); nf.init('small'); nf.x=f.x+(i-0.5)*30; nf.y=f.y; fishes.push(nf);}
  }
  let win=0;
  const goldMod = buffs.goldFish ? 1.5 : 1.0;
  const winMod  = getCurrentWinMod();
  if(f.id==='jackpot'){
    win=f.countUp; jackpotPool=Math.max(0,jackpotPool-win); updateJackpot();
    floatText('JACKPOT! +'+win,f.x,f.y-30,'#ffd700',22);
  } else {
    win = Math.floor(f.val * (bet/10) * winMod * goldMod * (1 + upgrades.winrate*0.05));
  }
  balance+=win; totalWin+=win;
  if(win>0) floatText('+'+win,f.x,f.y-18,'#ffd700',16);
  updateUI(); f.init();
}

function getCurrentWinMod(){
  const wid = equippedSlots.find(s=>s!==null)||'single';
  return WEAPON_DEFS[wid]?.winMod || 1.0;
}

// ── FIRE ──────────────────────────────────────────────────
let lastFire = 0;
function shoot(){
  if(gameOver) return;
  const rateBonus = 1 + upgrades.rate*0.15;
  const fireDelay = Math.max(50, 140/rateBonus);
  const now = performance.now();
  if(now - lastFire < fireDelay) return;
  lastFire = now;

  const slot = equippedSlots[activeSlot] || 'single';
  const wDef = WEAPON_DEFS[slot];
  if(!wDef) return;

  const cost = buffs.autoReload && balance < 200 ? 0 : bet;
  if(balance < cost && !buffs.autoReload) return;
  if(balance < bet){
    // only fire if autoReload
    if(!buffs.autoReload) return;
  } else {
    balance -= bet;
  }

  updateUI();
  const ang = Math.atan2(mouse.y - cannonY, mouse.x - cannonX);

  if(wDef.id === 'laser'){
    lasers.push(new Laser(cannonX, cannonY, ang));
    spawnParticle(cannonX,cannonY,'#e040fb',4,0.8);
    return;
  }
  if(wDef.nuke){ activateNuke(); return; }

  // multi-bullet weapons
  const multi = wDef.multi || 1;
  const spread = wDef.id==='shotgun' ? 0.22 : wDef.id==='triple' ? 0.22 : wDef.id==='double' ? 0.12 : 0;
  for(let i=0;i<multi;i++){
    const offset = multi>1 ? spread*(i - (multi-1)/2) : 0;
    bullets.push(new Bullet(cannonX, cannonY, ang+offset, wDef));
  }
  spawnParticle(cannonX,cannonY,wDef.color,3,0.5);
}

// ── CANNON DRAW ───────────────────────────────────────────
function drawCannon(){
  cannonX = W/2; cannonY = H-62;
  const ang = Math.atan2(mouse.y-cannonY, mouse.x-cannonX);
  const slot = equippedSlots[activeSlot] || 'single';
  const wDef = WEAPON_DEFS[slot] || WEAPON_DEFS.single;

  ctx.save(); ctx.translate(cannonX, cannonY);
  ctx.shadowBlur=22; ctx.shadowColor=wDef.color;
  ctx.fillStyle='#0d1f2d';
  ctx.beginPath(); ctx.ellipse(0,0,52,22,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=wDef.color; ctx.lineWidth=1.5; ctx.stroke();

  ctx.rotate(ang);
  const barrelCount = equippedSlots.filter(s=>s!==null).length;
  for(let i=0;i<barrelCount;i++){
    const offset = barrelCount>1 ? (i-(barrelCount-1)/2)*12 : 0;
    ctx.fillStyle='#1c3042'; ctx.beginPath(); ctx.rect(0,offset-9,62,18); ctx.fill();
    ctx.strokeStyle=wDef.color; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle=wDef.color; ctx.beginPath(); ctx.rect(55,offset-11,20,22); ctx.fill();
  }
  ctx.restore();

  const pulse=Math.sin(frameCount*0.1)*4;
  ctx.save(); ctx.translate(cannonX, cannonY);
  ctx.shadowBlur=20+pulse; ctx.shadowColor=wDef.color;
  ctx.fillStyle='#0d2a36';
  ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=wDef.color; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=wDef.color; ctx.globalAlpha=0.5;
  ctx.beginPath(); ctx.arc(-5,-5,7,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── BACKGROUND ────────────────────────────────────────────
const bubbles=[];
for(let i=0;i<35;i++) bubbles.push({x:Math.random()*2000,y:Math.random()*800,r:1+Math.random()*4,s:0.3+Math.random()*0.7});
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000c1f'); g.addColorStop(0.5,'#001632'); g.addColorStop(1,'#000811');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=0.035;
  for(let i=0;i<8;i++){
    const rx=W*0.5+Math.cos(i*0.8+frameCount*0.002)*W*0.3;
    const rg=ctx.createLinearGradient(rx,0,rx+60,H);
    rg.addColorStop(0,'rgba(0,140,255,0.8)'); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.moveTo(rx-30,0); ctx.lineTo(rx+110,H); ctx.lineTo(rx-80,H); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  ctx.save();
  for(let b of bubbles){
    b.y-=b.s; b.x+=Math.sin(frameCount*0.01+b.r)*0.3;
    if(b.y<-10){b.y=H+10;b.x=Math.random()*W;}
    ctx.globalAlpha=0.13; ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
  ctx.fillStyle='rgba(0,25,55,0.55)'; ctx.fillRect(0,H-40,W,40);
  ctx.strokeStyle='rgba(0,200,255,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-40); ctx.lineTo(W,H-40); ctx.stroke();
}

// ── WEAPON SLOT UI ────────────────────────────────────────
function renderWeaponRow(){
  const row=document.getElementById('weapon-row');
  row.innerHTML='';
  for(let i=0;i<MAX_SLOTS;i++){
    const wid=equippedSlots[i];
    const wDef=wid?WEAPON_DEFS[wid]:null;
    const div=document.createElement('div');
    div.className='w-slot'+(i===activeSlot?' active':'')+(wDef?'':' locked');
    div.innerHTML=wDef
      ?`<div class="wico">${wDef.ico}</div><div class="wlvl">SLOT ${i+1}</div><div class="wname">${wDef.name.split(' ')[0]}</div>`
      :`<div class="wico">🔒</div><div class="wname">KOSONG</div>`;
    if(wDef) div.onclick=()=>{ activeSlot=i; renderWeaponRow(); };
    row.appendChild(div);
  }
}

// ── SHOP ──────────────────────────────────────────────────
let shopTabActive = 'weapons';
function openShop(){
  document.getElementById('shop-overlay').style.display='flex';
  document.getElementById('sh-bal').textContent=Math.floor(balance).toLocaleString();
  renderShop();
}
function closeShop(){ document.getElementById('shop-overlay').style.display='none'; }
function shopTab(t){
  shopTabActive=t;
  document.querySelectorAll('.shop-tab').forEach((el,i)=>{
    el.classList.toggle('active',['weapons','upgrades','buffs'][i]===t);
  });
  renderShop();
}

function renderShop(){
  const c=document.getElementById('shop-content');
  c.innerHTML='';
  document.getElementById('sh-bal').textContent=Math.floor(balance).toLocaleString();

  if(shopTabActive==='weapons'){
    for(let wid in WEAPON_DEFS){
      const w=WEAPON_DEFS[wid];
      const owned=!!inventory[wid];
      const equipped=equippedSlots.includes(wid);
      const card=document.createElement('div');
      card.className='shop-card'+(equipped?' equipped':owned?' owned':'');
      let btnHtml='', btnAction='';
      if(equipped){
        btnHtml=`<button class="card-btn equipped-tag" onclick="unequipWeapon('${wid}')">✓ EQUIPPED</button>`;
      } else if(owned){
        btnHtml=`<button class="card-btn equip" onclick="equipWeapon('${wid}')">EQUIP</button>`;
      } else {
        btnHtml=`<button class="card-btn buy" onclick="buyWeapon('${wid}')">BELI 💰${w.price.toLocaleString()}</button>`;
      }
      card.innerHTML=`
        <div class="card-ico">${w.ico}</div>
        <div class="card-name">${w.name}</div>
        <div class="card-desc">${w.desc}</div>
        <div class="card-stat">DMG: ${w.dmg} | MULTI: ${w.multi||1} | WIN: +${Math.round((w.winMod-1)*100)}%</div>
        ${btnHtml}`;
      c.appendChild(card);
    }
  } else if(shopTabActive==='upgrades'){
    for(let upg of UPGRADE_DEFS){
      const cur=upgrades[upg.id]||0;
      const maxed=cur>=upg.max;
      const price=maxed?0:upg.prices[cur];
      const card=document.createElement('div');
      card.className='shop-card'+(maxed?' owned':'');
      const stars='★'.repeat(cur)+'☆'.repeat(upg.max-cur);
      card.innerHTML=`
        <div class="card-ico">${upg.ico}</div>
        <div class="card-name">${upg.name}</div>
        <div class="card-desc">${upg.desc}</div>
        <div class="card-stat">Level: ${stars} (${cur}/${upg.max})</div>
        <button class="card-btn ${maxed?'maxed':'buy'}" onclick="${maxed?'':'buyUpgrade(\''+upg.id+'\')'}">${maxed?'MAX LEVEL':'UPGRADE 💰'+price.toLocaleString()}</button>`;
      c.appendChild(card);
    }
  } else if(shopTabActive==='buffs'){
    for(let buf of BUFF_DEFS){
      const owned=!!buffs[buf.id];
      const card=document.createElement('div');
      card.className='shop-card'+(owned?' owned':'');
      card.innerHTML=`
        <div class="card-ico">${buf.ico}</div>
        <div class="card-name">${buf.name}</div>
        <div class="card-desc">${buf.desc}</div>
        <div class="card-stat">Harga: 💰${buf.price.toLocaleString()}</div>
        <button class="card-btn ${owned?'equipped-tag':'buy'}" onclick="${owned?'':'buyBuff(\''+buf.id+'\')'}">${owned?'✓ AKTIF':'BELI 💰'+buf.price.toLocaleString()}</button>`;
      c.appendChild(card);
    }
  }
}

function buyWeapon(wid){
  const w=WEAPON_DEFS[wid];
  if(balance<w.price){ floatText('Saldo kurang!',W/2,H/2,'#ff1744',18); return; }
  balance-=w.price; inventory[wid]=true;
  updateUI(); renderShop();
  floatText('Senjata dibeli!',W/2,H/2,'#00ff88',18);
}
function equipWeapon(wid){
  const idx=equippedSlots.indexOf(null);
  if(idx!==-1){ equippedSlots[idx]=wid; }
  else { equippedSlots[activeSlot]=wid; }
  renderWeaponRow(); renderShop();
}
function unequipWeapon(wid){
  const idx=equippedSlots.indexOf(wid);
  if(idx!==-1) equippedSlots[idx]=null;
  if(!equippedSlots.some(s=>s)) equippedSlots[0]='single';
  renderWeaponRow(); renderShop();
}
function buyUpgrade(id){
  const upg=UPGRADE_DEFS.find(u=>u.id===id);
  const cur=upgrades[id]||0;
  if(cur>=upg.max) return;
  const price=upg.prices[cur];
  if(balance<price){ floatText('Saldo kurang!',W/2,H/2,'#ff1744',18); return; }
  balance-=price; upgrades[id]++;
  updateUI(); renderShop();
  floatText('Upgrade berhasil!',W/2,H/2,'#00ff88',18);
}
function buyBuff(id){
  const buf=BUFF_DEFS.find(b=>b.id===id);
  if(balance<buf.price){ floatText('Saldo kurang!',W/2,H/2,'#ff1744',18); return; }
  balance-=buf.price; buffs[id]=true;
  updateUI(); renderShop();
  floatText('Buff aktif!',W/2,H/2,'#00ff88',18);
}

const ROULETTE_PRIZES=[
  {label:'2× BET',mult:2,color:'#4caf50'},{label:'5× BET',mult:5,color:'#8bc34a'},
  {label:'10× BET',mult:10,color:'#ffd700'},{label:'20× BET',mult:20,color:'#ff9800'},
  {label:'50× BET',mult:50,color:'#ff5722'},{label:'JACKPOT!',mult:200,color:'#e91e63'},
  {label:'3× BET',mult:3,color:'#009688'},{label:'MISS',mult:0,color:'#607d8b'},
  {label:'8× BET',mult:8,color:'#2196f3'},{label:'15× BET',mult:15,color:'#9c27b0'},
  {label:'1× BET',mult:1,color:'#795548'},{label:'30× BET',mult:30,color:'#f44336'},
];
const RANDOM_BONUSES=[
  {label:'Free Drill',type:'drill',color:'#00e5ff'},{label:'5× BET',type:'coins',mult:5,color:'#ffd700'},
  {label:'Free Bomb',type:'bomb',color:'#ff1744'},{label:'10× BET',type:'coins',mult:10,color:'#ff9800'},
  {label:'20× BET',type:'coins',mult:20,color:'#ff5722'},{label:'50× BET',type:'coins',mult:50,color:'#e91e63'},
  {label:'2× BET',type:'coins',mult:2,color:'#4caf50'},{label:'Free Roulette',type:'roulette',color:'#e040fb'},
];
let bonusAnimId=null, bonusPrizes=[], bonusFish=null, bonusType='';

function openBonus(type,fish){
  bonusType=type; bonusFish=fish;
  bonusPrizes=type==='roulette'?ROULETTE_PRIZES:RANDOM_BONUSES;
  document.getElementById('bonus-overlay').style.display='flex';
  document.getElementById('bonus-title').textContent=type==='roulette'?'🎰 ROULETTE BONUS!':'🎁 LUCKY BONUS!';
  document.getElementById('bonus-sub').textContent='Berputar...';
  document.getElementById('bonus-result').textContent='';
  document.getElementById('bonus-close').style.display='none';
  document.getElementById('bonus-cd').textContent='';
  const cv=document.getElementById('bonusCanvas'), cx=cv.getContext('2d');
  const seg=Math.floor(Math.random()*bonusPrizes.length);
  const segAng=(Math.PI*2)/bonusPrizes.length;
  const targetAng=Math.PI*6+Math.PI*2-(seg*segAng+segAng/2)-Math.PI/2;
  let elapsed=0; const dur=185;
  if(bonusAnimId) cancelAnimationFrame(bonusAnimId);
  function spin(){
    elapsed++;
    const t=Math.min(elapsed/dur,1), ease=1-Math.pow(1-t,4);
    const ang=targetAng*ease;
    drawWheel(ang,bonusPrizes,cv,cx);
    if(elapsed<dur){ bonusAnimId=requestAnimationFrame(spin); }
    else { drawWheel(targetAng,bonusPrizes,cv,cx); showBonusResult(bonusPrizes[seg]); }
  }
  spin();
}
function drawWheel(angle,prizes,cv,cx){
  const R=cv.width/2-10, ox=cv.width/2, oy=cv.height/2;
  const seg=(Math.PI*2)/prizes.length;
  cx.clearRect(0,0,cv.width,cv.height);
  for(let i=0;i<prizes.length;i++){
    const a=angle+i*seg;
    cx.beginPath(); cx.moveTo(ox,oy); cx.arc(ox,oy,R,a,a+seg); cx.closePath();
    cx.fillStyle=prizes[i].color; cx.fill();
    cx.strokeStyle='rgba(0,0,0,0.3)'; cx.lineWidth=1.5; cx.stroke();
  }
  for(let i=0;i<prizes.length;i++){
    const a=angle+i*seg+seg/2;
    cx.save(); cx.translate(ox+Math.cos(a)*R*0.68, oy+Math.sin(a)*R*0.68);
    cx.rotate(a+Math.PI/2); cx.fillStyle='#fff'; cx.font='bold 10px Orbitron,Arial';
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.shadowBlur=3; cx.shadowColor='rgba(0,0,0,0.9)'; cx.fillText(prizes[i].label,0,0); cx.restore();
  }
  cx.beginPath(); cx.arc(ox,oy,18,0,Math.PI*2);
  cx.fillStyle='#ffd700'; cx.fill(); cx.strokeStyle='#fff'; cx.lineWidth=2; cx.stroke();
  cx.beginPath(); cx.moveTo(ox,oy-R-4); cx.lineTo(ox-9,oy-R+13); cx.lineTo(ox+9,oy-R+13);
  cx.closePath(); cx.fillStyle='#fff'; cx.shadowBlur=10; cx.shadowColor='#fff'; cx.fill();
}
function showBonusResult(prize){
  document.getElementById('bonus-sub').textContent='Hasil:';
  let resultText='';
  if(prize.type==='drill'){ resultText='⚡ FREE DRILL!'; setTimeout(()=>{closeBonus();activateDrill();},1800); }
  else if(prize.type==='bomb'){ resultText='💣 FREE BOMB!'; setTimeout(()=>{closeBonus();activateBombMode();},1800); }
  else if(prize.type==='roulette'){ resultText='🎰 FREE SPIN!'; setTimeout(()=>{closeBonus();openBonus('roulette',bonusFish);},1800); }
  else {
    const mult=prize.mult||0, win=mult*bet;
    resultText=mult===0?'Sayang...':'+'+win+' Koin!';
    if(win>0){ balance+=win; totalWin+=win; floatText('+'+win,W/2,H/2,'#ffd700',22); updateUI(); }
  }
  let cd=3; const cdEl=document.getElementById('bonus-cd');
  function tick(){
    cdEl.textContent=cd>0?cd:'';
    if(cd>0){cd--;setTimeout(tick,400);}
    else{cdEl.textContent='';document.getElementById('bonus-result').textContent=resultText;document.getElementById('bonus-close').style.display='inline-block';if(bonusFish)bonusFish.init();}
  }
  tick();
}
function closeBonus(){ document.getElementById('bonus-overlay').style.display='none'; if(bonusAnimId)cancelAnimationFrame(bonusAnimId); }

// ── MAIN LOOP ─────────────────────────────────────────────
let afId = 0;
let lastLoopTime = 0;

function loop(timestamp){
  // Pastikan variabel timestamp tidak error pada eksekusi pertama
  if (!timestamp) timestamp = performance.now();
  
  // Limiter frame rate ke maksimal ~60 FPS
  if (timestamp - lastLoopTime < 16) {
    afId = requestAnimationFrame(loop);
    return;
  }
  lastLoopTime = timestamp;

  frameCount++;

  if(shakeAmt>0){
    ctx.save(); ctx.translate((Math.random()-0.5)*shakeAmt,(Math.random()-0.5)*shakeAmt);
    shakeAmt*=0.8; if(shakeAmt<0.5)shakeAmt=0;
  }

  ctx.clearRect(0,0,W,H);
  drawBG();

  // fishes
  for(let f of fishes){ if(f.alive){f.update();f.draw();} }

  // special
  if(specialInst){
    specialInst.update(); specialInst.draw();
    spTimer--;
    document.getElementById('sp-fill').style.width=((spTimer/spMax)*100)+'%';
    if(spTimer<=0) endSpecial();
  }

  // bullets
  for(let i=bullets.length-1;i>=0;i--){ bullets[i].update(); bullets[i].draw(); if(!bullets[i].alive)bullets.splice(i,1); }

  // lasers
  for(let i=lasers.length-1;i>=0;i--){ lasers[i].update(); lasers[i].draw(); if(lasers[i].life<=0)lasers.splice(i,1); }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life-=0.024;
    const a=Math.max(0,p.life/p.maxLife);
    ctx.save(); ctx.globalAlpha=a; ctx.shadowBlur=7; ctx.shadowColor=p.color;
    if(p.isCoin){
      ctx.fillStyle=p.color; ctx.beginPath();
      ctx.ellipse(p.x,p.y,p.size,p.size*0.5,p.rotate+frameCount*0.1,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    if(p.life<=0)particles.splice(i,1);
  }

  drawCannon();
  if(shakeAmt>0) ctx.restore();

  // auto fire — minigun fires every frame, others rate-limited
  if(autoFire && !gameOver){
    const slot=equippedSlots[activeSlot]||'single';
    const wDef=WEAPON_DEFS[slot];
    if(wDef?.minigun){ shoot(); }
    else if(frameCount%10===0){ shoot(); }
  }

  // jackpot pool drift
  if(frameCount%160===0 && jackpotPool<9999999){ jackpotPool+=Math.floor(Math.random()*60+15); updateJackpot(); }

  // level up
  if(totalWin > level*600){ level++; floatText('⬆ LEVEL '+level,W/2,H/3,'#00e5ff',26); updateUI(); }

  // game over check
  if(!gameOver && balance<bet && !specialInst && !autoFire) showGameOver();

  afId=requestAnimationFrame(loop);
}
