<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ocean Emperor V6 — Crazy Bots & Bouncing Bosses</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --c-blue:#00e5ff;--c-gold:#ffd700;--c-red:#ff2266;--c-green:#00ffaa;
  --c-purple:#c040ff;--c-orange:#ff7700;--c-pink:#ff4fa0;--c-teal:#00ffd0;
  --bg0:#000a1a;--border:rgba(0,229,255,0.18);--border-gold:rgba(255,215,0,0.35);
  --font-hud:'Orbitron',sans-serif;--font-main:'Exo 2',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg0);font-family:var(--font-main);user-select:none;cursor:crosshair;}
#gameCanvas{display:block;position:fixed;top:0;left:0;z-index:1;}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;}

/* HUD TOP */
.hud-top{display:flex;align-items:stretch;background:linear-gradient(180deg,rgba(0,4,18,0.98),rgba(0,4,18,0.7));border-bottom:1px solid var(--border);padding:6px 8px;gap:5px;}
.hud-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,229,255,0.04);border:1px solid var(--border);border-radius:8px;padding:4px 8px;min-width:64px;flex:1;}
.hud-cell.jp{flex:1.8;border-color:var(--border-gold);background:rgba(255,215,0,0.04);}
.hud-label{font-size:6.5px;letter-spacing:2.5px;color:#3a8aaa;text-transform:uppercase;font-family:var(--font-hud);margin-bottom:1px;}
.hud-val{font-size:13px;font-weight:700;color:#fff;font-family:var(--font-hud);}
.hud-val.gold{color:var(--c-gold);}
.hud-val.green{color:var(--c-green);}
.hud-val.blue{color:var(--c-blue);}
.jp-val{font-size:17px;font-weight:900;color:var(--c-gold);font-family:var(--font-hud);}

/* COMBO */
#combo-display{position:absolute;top:72px;left:50%;transform:translateX(-50%);font-family:var(--font-hud);font-size:24px;font-weight:900;pointer-events:none;opacity:0;transition:opacity 0.3s;text-align:center;white-space:nowrap;text-shadow:0 0 40px currentColor;}
#combo-display.show{opacity:1;}

/* STREAK */
#streak-bar{position:absolute;right:8px;top:70px;display:flex;flex-direction:column;align-items:flex-end;gap:2px;pointer-events:none;}
.streak-pip{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all 0.2s;}
.streak-pip.lit{background:var(--c-gold);box-shadow:0 0 10px var(--c-gold);}
#streak-count{font-size:8.5px;color:var(--c-gold);font-family:var(--font-hud);}

/* WEAPON ROW */
#weapon-row{position:absolute;bottom:calc(var(--hud-bot-h,88px) + 8px);left:50%;transform:translateX(-50%);display:flex;gap:7px;pointer-events:auto;}
.w-slot{width:54px;height:54px;border:1.5px solid var(--border);border-radius:10px;background:rgba(0,10,30,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.w-slot.active{border-color:var(--c-gold);box-shadow:0 0 18px rgba(255,215,0,0.45);}
.w-slot.locked{opacity:0.35;cursor:not-allowed;}
.w-slot .wico{font-size:20px;}
.w-slot .wlvl{font-size:6.5px;color:var(--c-gold);font-family:var(--font-hud);font-weight:700;}
.w-slot .wname{font-size:6.5px;color:#5ab8d4;text-transform:uppercase;}

/* BOTTOM HUD */
.hud-bot{pointer-events:auto;background:rgba(0,4,18,0.98);border-top:1px solid var(--border);padding:7px 8px calc(7px + var(--safe-bottom));display:flex;align-items:center;justify-content:space-between;gap:5px;flex-shrink:0;}
.hud-btn{background:rgba(0,200,255,0.06);border:1.5px solid rgba(0,200,255,0.28);color:var(--c-blue);padding:7px 9px;font-size:8.5px;font-weight:700;letter-spacing:1px;border-radius:7px;cursor:pointer;transition:all 0.18s;font-family:var(--font-hud);white-space:nowrap;flex-shrink:0;}
.hud-btn:active{transform:scale(0.92);}
.hud-btn.on{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.45);color:var(--c-green);}
.hud-btn.gold{border-color:var(--border-gold);color:var(--c-gold);background:rgba(255,215,0,0.05);}
.hud-btn.purple{border-color:rgba(192,64,255,0.45);color:var(--c-purple);background:rgba(192,64,255,0.05);}
.bet-group{display:flex;flex-direction:column;align-items:center;gap:1px;}
.bet-ctrl{display:flex;align-items:center;gap:5px;}
.bet-btn{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:#cde;width:26px;height:26px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.bet-btn:active{transform:scale(0.85);}
#h-bet{font-family:var(--font-hud);font-size:16px;font-weight:700;color:#fff;min-width:36px;text-align:center;}

/* SOUND BTN */
#sound-btn{position:absolute;left:8px;top:70px;background:rgba(0,8,25,0.85);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:9px;color:var(--c-blue);font-family:var(--font-hud);cursor:pointer;pointer-events:auto;z-index:20;}

/* FLOATERS */
#floaters{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.floater{position:absolute;font-weight:900;pointer-events:none;animation:floatUp 1.4s cubic-bezier(0.22,1,0.36,1) forwards;font-family:var(--font-hud);text-shadow:0 2px 12px rgba(0,0,0,0.9);}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0.4);}15%{opacity:1;transform:translateY(-16px) scale(1.25);}80%{opacity:1;}100%{opacity:0;transform:translateY(-140px) scale(0.8);}}

/* MINI MAP */
#minimap{position:absolute;bottom:calc(var(--hud-bot-h,88px) + 72px);right:8px;width:80px;height:50px;border:1px solid var(--border);border-radius:6px;background:rgba(0,5,20,0.85);overflow:hidden;pointer-events:none;}
#minimap canvas{display:block;width:100%;height:100%;}

/* LEADERBOARD */
#leaderboard{position:absolute;left:8px;top:calc(var(--hud-top-h,62px) + 34px);width:118px;background:rgba(0,5,20,0.9);border:1px solid var(--border);border-radius:10px;padding:8px;pointer-events:none;display:none;}
.lb-title{font-size:7.5px;color:var(--c-blue);font-family:var(--font-hud);letter-spacing:2px;margin-bottom:6px;text-align:center;}
.lb-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.lb-rank{font-size:8px;color:#4a9bc0;font-family:var(--font-hud);width:11px;}
.lb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lb-name{font-size:8px;color:#cde;flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{font-size:8px;color:var(--c-gold);font-family:var(--font-hud);}

/* SHOP */
#shop-overlay{position:fixed;inset:0;background:rgba(0,0,12,0.94);display:none;align-items:flex-start;justify-content:center;z-index:300;pointer-events:auto;overflow-y:auto;padding:10px;backdrop-filter:blur(6px);}
#shop-box{background:rgba(0,6,22,0.99);border:1.5px solid rgba(0,229,255,0.25);border-radius:16px;padding:18px;max-width:700px;width:100%;margin:auto;}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;}
.shop-title{font-size:16px;font-weight:900;color:var(--c-blue);font-family:var(--font-hud);letter-spacing:3px;}
.shop-balance{font-size:12px;color:var(--c-gold);font-family:var(--font-hud);white-space:nowrap;}
.shop-close{background:none;border:1.5px solid rgba(255,255,255,0.18);color:#aaa;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;}
.shop-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.shop-tab{background:rgba(0,229,255,0.05);border:1.5px solid rgba(0,229,255,0.18);color:#5a9bb8;padding:6px 11px;font-size:8.5px;font-weight:700;letter-spacing:1.5px;border-radius:6px;cursor:pointer;font-family:var(--font-hud);transition:all 0.18s;}
.shop-tab.active{background:rgba(0,229,255,0.14);border-color:var(--c-blue);color:var(--c-blue);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px;}
.shop-card{background:rgba(0,10,30,0.92);border:1.5px solid rgba(0,229,255,0.14);border-radius:11px;padding:12px 10px;text-align:center;transition:all 0.2s;}
.shop-card:hover{border-color:rgba(0,229,255,0.4);transform:translateY(-2px);}
.shop-card.owned{border-color:rgba(0,255,170,0.35);}
.shop-card.equipped{border-color:var(--c-gold);}
.shop-card .card-ico{font-size:26px;margin-bottom:5px;}
.shop-card .card-name{font-size:9.5px;font-weight:700;color:#e8f4ff;letter-spacing:0.5px;margin-bottom:2px;font-family:var(--font-hud);}
.shop-card .card-stat{font-size:8px;color:#4a9cc0;margin-bottom:7px;line-height:1.5;}
.shop-card .card-btn{width:100%;padding:6px;font-size:8px;font-weight:700;letter-spacing:1px;border-radius:5px;cursor:pointer;border:none;font-family:var(--font-hud);}
.card-btn.buy{background:linear-gradient(135deg,var(--c-gold),#ff9100);color:#000;}
.card-btn.equip{background:rgba(0,229,255,0.15);color:var(--c-blue);border:1px solid var(--c-blue);}
.card-btn.equipped-tag{background:rgba(255,215,0,0.12);color:var(--c-gold);border:1px solid var(--c-gold);}
.card-btn.maxed{background:rgba(0,255,136,0.1);color:var(--c-green);border:1px solid rgba(0,255,136,0.3);}

/* ACHIEVEMENT TOAST */
#achievement-toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-90px);background:linear-gradient(135deg,rgba(0,6,22,0.98),rgba(0,18,48,0.98));border:1.5px solid var(--c-gold);border-radius:12px;padding:12px 20px;min-width:240px;max-width:90vw;z-index:500;pointer-events:none;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);text-align:center;box-shadow:0 4px 30px rgba(255,215,0,0.2);}
#achievement-toast.show{transform:translateX(-50%) translateY(0);}
#ach-icon{font-size:22px;}
#ach-title{font-size:9px;color:var(--c-gold);font-family:var(--font-hud);letter-spacing:2px;margin:3px 0 2px;}
#ach-desc{font-size:10.5px;color:#cde;}

/* GAME OVER */
#gameover{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:400;}
#gameover-box{background:rgba(0,4,18,0.98);border:2px solid rgba(255,215,0,0.4);border-radius:18px;padding:34px 48px;text-align:center;display:none;pointer-events:auto;box-shadow:0 0 60px rgba(255,215,0,0.08);max-width:90vw;}
#go-title{font-size:28px;font-weight:900;color:var(--c-gold);margin-bottom:6px;font-family:var(--font-hud);}
#go-stats{font-size:11px;color:#7ab;margin-bottom:6px;font-family:var(--font-hud);}
#go-sub{font-size:10.5px;color:#446;margin-bottom:20px;}
#go-btn{background:linear-gradient(135deg,var(--c-gold),#ff9100);color:#000;border:none;padding:13px 32px;font-size:11px;font-weight:900;border-radius:8px;cursor:pointer;letter-spacing:2px;font-family:var(--font-hud);}

/* JACKPOT WIN */
#jackpot-win{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:600;background:rgba(0,0,0,0.88);pointer-events:auto;}
.jw-inner{text-align:center;animation:jPop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes jPop{from{transform:scale(0.2);opacity:0;}to{transform:scale(1);opacity:1;}}
.jw-coins{font-size:60px;animation:jSpin 1.5s linear infinite;}
@keyframes jSpin{to{filter:hue-rotate(360deg) brightness(1.3);}}
.jw-title{font-size:38px;font-weight:900;color:var(--c-gold);font-family:var(--font-hud);text-shadow:0 0 40px var(--c-gold);margin:10px 0 5px;}
.jw-amount{font-size:56px;font-weight:900;color:#fff;font-family:var(--font-hud);text-shadow:0 0 30px var(--c-gold);}
.jw-btn{margin-top:22px;background:var(--c-gold);color:#000;border:none;padding:14px 36px;font-size:12px;font-weight:900;border-radius:10px;cursor:pointer;font-family:var(--font-hud);letter-spacing:2px;}

/* MOBILE */
@media(max-width:480px){
  .hud-val{font-size:11px;}.jp-val{font-size:14px;}.hud-label{font-size:5.5px;}
  .hud-cell{min-width:52px;padding:3px 5px;}
  .w-slot{width:48px;height:48px;}.w-slot .wico{font-size:17px;}
  .hud-btn{padding:5px 7px;font-size:7.5px;}
  #gameover-box{padding:26px 28px;}
  .jw-title{font-size:26px;}.jw-amount{font-size:36px;}.jw-coins{font-size:46px;}
}
#shop-overlay::-webkit-scrollbar{width:5px;}
#shop-overlay::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.3);border-radius:3px;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="floaters"></div>
<div id="achievement-toast"><div id="ach-icon">🏆</div><div id="ach-title">ACHIEVEMENT</div><div id="ach-desc">desc</div></div>
<div id="combo-display"></div>

<div id="ui">
  <div class="hud-top" id="hud-top-bar">
    <div class="hud-cell"><div class="hud-label">SALDO</div><div class="hud-val gold" id="h-bal">10,000</div></div>
    <div class="hud-cell" style="border-color:rgba(0,255,170,0.2);"><div class="hud-label">WIN</div><div class="hud-val green" id="h-win">0</div></div>
    <div class="hud-cell jp"><div class="hud-label">🏆 JACKPOT</div><div class="jp-val" id="h-jack">9,999,999</div></div>
    <div class="hud-cell"><div class="hud-label">LVL</div><div class="hud-val blue" id="h-lvl">1</div></div>
    <div class="hud-cell" style="cursor:pointer;pointer-events:auto;" onclick="openShop()"><div class="hud-label">SHOP</div><div class="hud-val" style="font-size:17px;">🏪</div></div>
  </div>
  <div id="sound-btn" onclick="toggleSound()">🔊 SFX</div>
  <div id="streak-bar"><div id="streak-count"></div><div style="display:flex;gap:3px;" id="streak-pips"></div></div>
  <div id="minimap"><canvas id="minimap-canvas" width="80" height="50"></canvas></div>
  <div id="leaderboard"><div class="lb-title">RANKING</div><div id="lb-rows"></div></div>
  <div id="weapon-row"></div>
  <div style="flex:1;"></div>
  <div class="hud-bot" id="hud-bot-bar">
    <button class="hud-btn" id="btn-auto" onclick="toggleAuto()">⚡AUTO</button>
    <div class="bet-group">
      <div class="hud-label" style="font-size:6px;">BET</div>
      <div class="bet-ctrl">
        <div class="bet-btn" onclick="changeBet(-10)">−</div>
        <span id="h-bet">10</span>
        <div class="bet-btn" onclick="changeBet(10)">+</div>
      </div>
    </div>
    <button class="hud-btn gold" onclick="changeBet(0,'max')">MAX</button>
    <button class="hud-btn" id="btn-lb" onclick="toggleLeaderboard()">🏅LB</button>
    <button class="hud-btn purple" onclick="openShop()">🏪 SHOP</button>
  </div>
</div>

<div id="shop-overlay">
  <div id="shop-box">
    <div class="shop-header">
      <div class="shop-title">⚓ ARMORY</div>
      <div class="shop-balance">💰 <span id="sh-bal">0</span></div>
      <button class="shop-close" onclick="closeShop()">✕</button>
    </div>
    <div class="shop-tabs">
      <div class="shop-tab active" onclick="shopTab('weapons')">⚔ SENJATA</div>
      <div class="shop-tab" onclick="shopTab('upgrades')">⬆ UPGRADE</div>
      <div class="shop-tab" onclick="shopTab('buffs')">✨ BUFF</div>
      <div class="shop-tab" onclick="shopTab('missions')">📋 MISI</div>
    </div>
    <div id="shop-content" class="shop-grid"></div>
  </div>
</div>

<div id="gameover"><div id="gameover-box">
  <div id="go-title">GAME OVER</div>
  <div id="go-stats"></div>
  <div id="go-sub">Saldo habis. Kunjungi Armory!</div>
  <button id="go-btn" onclick="restartGame()">🎮 MAIN LAGI</button>
</div></div>

<div id="jackpot-win"><div class="jw-inner">
  <div class="jw-coins">🌟💰🌟</div>
  <div class="jw-title">JACKPOT!!!</div>
  <div class="jw-amount" id="jw-amount">+999,999</div>
  <button class="jw-btn" onclick="closeJackpot()">KLAIM HADIAH</button>
</div></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  OCEAN EMPEROR V6.5 — Bouncing Bosses & Competitive Bots
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx = mmCanvas.getContext('2d');
let W, H, hudTopH=62, hudBotH=88;

// ── AUDIO ENGINE ────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
let soundOn = true;
let musicGain, ambiGain, sfxGain;

function initAudio(){
  musicGain = AC.createGain(); musicGain.gain.value = 0.18; musicGain.connect(AC.destination);
  ambiGain  = AC.createGain(); ambiGain.gain.value  = 0.06; ambiGain.connect(AC.destination);
  sfxGain   = AC.createGain(); sfxGain.gain.value   = 0.55; sfxGain.connect(AC.destination);
  startBGM();
  startAmbience();
}
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }

function startBGM(){
  const notes=[220,246,261,294,329,349,392,440,493,523];
  const melody=[0,2,4,7,5,3,1,4,6,8,7,5,3,0,2,4];
  let idx=0;
  const playNote=()=>{
    if(!soundOn) return;
    const osc=AC.createOscillator();
    const env=AC.createGain();
    const filt=AC.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=800; filt.Q.value=1.5;
    osc.connect(filt); filt.connect(env); env.connect(musicGain);
    const freq=notes[melody[idx%melody.length]];
    osc.type=idx%4===0?'sawtooth':'square';
    osc.frequency.setValueAtTime(freq,AC.currentTime);
    env.gain.setValueAtTime(0,AC.currentTime);
    env.gain.linearRampToValueAtTime(0.3,AC.currentTime+0.02);
    env.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.22);
    osc.start(AC.currentTime); osc.stop(AC.currentTime+0.25);
    idx++; setTimeout(playNote,200);
  };
  playNote();
}

function startAmbience(){
  const playBubble=()=>{
    if(!soundOn){setTimeout(playBubble,800+Math.random()*1200);return;}
    const osc=AC.createOscillator();
    const env=AC.createGain();
    const filt=AC.createBiquadFilter();
    filt.type='lowpass'; filt.frequency.value=300+Math.random()*400;
    osc.connect(filt); filt.connect(env); env.connect(ambiGain);
    osc.frequency.setValueAtTime(60+Math.random()*80,AC.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200+Math.random()*200,AC.currentTime+0.12);
    env.gain.setValueAtTime(0,AC.currentTime);
    env.gain.linearRampToValueAtTime(1,AC.currentTime+0.02);
    env.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.15);
    osc.type='sine'; osc.start(AC.currentTime); osc.stop(AC.currentTime+0.18);
    setTimeout(playBubble,400+Math.random()*900);
  };
  playBubble();
}

const SFX = {
  shoot() { _sfx([{t:'square',f:800,ef:200,d:0.05,v:0.3}]); },
  hit() {   _sfx([{t:'sawtooth',f:300,ef:80,d:0.08,v:0.4}]); },
  coin() {  _sfx([{t:'sine',f:1200,ef:1600,d:0.1,v:0.5},{t:'sine',f:1500,ef:1800,d:0.08,v:0.4,delay:0.05}]); },
  explosion() { _sfx([{t:'sawtooth',f:80,ef:20,d:0.4,v:0.8,noise:true}]);_screenRumble(); },
  laser() {   _sfx([{t:'sawtooth',f:2000,ef:200,d:0.25,v:0.5}]); },
  bonus_appear() { _sfx([{t:'sine',f:600,ef:1200,d:0.15,v:0.6},{t:'triangle',f:800,ef:1600,d:0.2,v:0.5,delay:0.1}]); },
  jackpot_appear() { _sfx([{t:'sine',f:440,ef:880,d:0.2,v:0.7},{t:'sine',f:660,ef:1320,d:0.2,v:0.7,delay:0.1},{t:'sine',f:880,ef:1760,d:0.2,v:0.7,delay:0.2}]); },

function _sfx(layers){
  if(!soundOn||!AC) return;
  layers.forEach(l=>{
    const delay=l.delay||0;
    setTimeout(()=>{
      const osc=AC.createOscillator();
      const env=AC.createGain();
      if(l.noise){
        const bufLen=AC.sampleRate*l.d;
        const buf=AC.createBuffer(1,bufLen,AC.sampleRate);
        const d=buf.getChannelData(0);
        for(let i=0;i<bufLen;i++) d[i]=(Math.random()*2-1);
        const src=AC.createBufferSource();
        const filt=AC.createBiquadFilter();
        filt.type='lowpass'; filt.frequency.value=l.f;
        src.buffer=buf; src.connect(filt); filt.connect(env); env.connect(sfxGain);
        env.gain.setValueAtTime(l.v,AC.currentTime);
        env.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+l.d);
        src.start(AC.currentTime); src.stop(AC.currentTime+l.d);
      } else {
        osc.type=l.t||'sine';
        osc.connect(env); env.connect(sfxGain);
        osc.frequency.setValueAtTime(l.f,AC.currentTime);
        osc.frequency.exponentialRampToValueAtTime(l.ef,AC.currentTime+l.d);
        env.gain.setValueAtTime(l.v,AC.currentTime);
        env.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+l.d);
        osc.start(AC.currentTime); osc.stop(AC.currentTime+l.d);
      }
    }, delay*1000);
  });
}

const frozenFish=new Set();
const fishes=[],bullets=[],_particles=[],lasers=[],inWorldRoulettes=[],chainLightnings=[];

const bonusSounds={
  boss:'boss_appear',drill:'drill_appear',bomb:'bomb_appear',
  roulette:'bonus_appear',random:'bonus_appear',jackpot:'jackpot_appear',
  twin:'bonus_appear',ghost:'ghost_appear',electric:'electric_appear'
};
const fishInitSounds=new WeakSet();

class Fish {
  constructor(){this.init();}
  init(overType){
    const t=overType?FISH_TYPES.find(x=>x.id===overType)||pickFishType():pickFishType();
    Object.assign(this,{
      id:t.id,hp:t.hp,maxHp:t.hp,val:t.val,
      baseSpeed:t.speed,size:t.size,color:t.color,glow:t.glow,
      dir:Math.random()>0.5?1:-1,wave:Math.random()*Math.PI*2,
      waveAmp:8+Math.random()*14,waveFreq:0.018+Math.random()*0.02,
      tailPh:Math.random()*Math.PI*2,alive:true,flash:0,frozen:0,
      auraPhase:Math.random()*Math.PI*2,
      orbitAngle:Math.random()*Math.PI*2,
      scaleAnim:1,scaleDir:0.003,
      appeared:false,
      vx:0, vy:0, lastHitBy:-1
    });
    this.x=this.dir===1?-90:W+90;
    this.baseY=(hudTopH+45)+Math.random()*(H-hudTopH-hudBotH-140);
    this.y=this.baseY;

    // BOUNCING DRILL
    if(this.id === 'drill') {
      this.drillTimer = 600 + Math.floor(Math.random() * 300); // 10-15s (60fps)
      this.vx = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 4);
      this.vy = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 4);
    }
    // HOPPING BOMB
    if(this.id === 'bomb') {
      this.bombTimer = 480 + Math.floor(Math.random() * 240); // 8-12s
      this.vx = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 3);
      this.vy = -5 - Math.random() * 5;
      this.gravity = 0.2;
      this.beepPhase = 0;
    }

    if(this.id==='jackpot') this.countUp=100+Math.floor(Math.random()*400);
    if(this.id==='boss')    this.roarTimer=0;
    if(this.id==='ghost')   this.ghostPhase=0;
    if(this.id==='electric'){this.zapTimer=0;this.zapTarget=null;}
    if(this.id==='roulette'){this.spinAngle=0;}
    if(this.id==='twin'){this.splitReady=false;}
  }
  
  get speed(){return frozenFish.has(this)?this.baseSpeed*0.2:this.baseSpeed;}
  
  update(){
    this.tailPh+=0.15;
    this.auraPhase+=0.04;
    this.orbitAngle+=0.03;
    this.scaleAnim+=this.scaleDir;
    if(this.scaleAnim>1.06||this.scaleAnim<0.94) this.scaleDir*=-1;
    if(this.flash>0) this.flash--;
    if(this.frozen>0){this.frozen--;if(this.frozen===0)frozenFish.delete(this);}

    if(!this.appeared && this.x > 0 && this.x < W) {
      this.appeared = true;
      if(soundOn && bonusSounds[this.id]) SFX[bonusSounds[this.id]]();
    }

    // ── BOUNCING DRILL LOGIC ──
    if (this.id === 'drill') {
      this.x += this.vx; this.y += this.vy;
      // Bounce Check (Only after it enters the screen)
      if (this.appeared) {
        if (this.x < 20 && this.vx < 0) { this.x = 20; this.vx *= -1; }
        if (this.x > W - 20 && this.vx > 0) { this.x = W - 20; this.vx *= -1; }
        if (this.y < hudTopH + 30 && this.vy < 0) { this.y = hudTopH + 30; this.vy *= -1; }
        if (this.y > H - hudBotH - 30 && this.vy > 0) { this.y = H - hudBotH - 30; this.vy *= -1; }
      }
      this.orbitAngle = Math.atan2(this.vy, this.vx); // Rotate visual towards movement

      this.drillTimer--;
      if (this.drillTimer <= 0) {
        explodeAt(this.x, this.y, 450 * (1 + upgrades.radius * 0.15), 40, this.lastHitBy);
        floatText('💥 TIME UP!', this.x, this.y, '#ff2266', 28);
        this.init(); 
      }
      return; 
    }

    // ── HOPPING BOMB LOGIC ──
    if (this.id === 'bomb') {
      this.x += this.vx;
      this.vy += this.gravity;
      this.y += this.vy;
      this.beepPhase += 0.2 + (1 - this.bombTimer / 600) * 0.5; // beep faster

      if (this.appeared) {
        if (this.x < 20 && this.vx < 0) { this.x = 20; this.vx *= -1; }
        if (this.x > W - 20 && this.vx > 0) { this.x = W - 20; this.vx *= -1; }
      }

      // Hit Ground
      if (this.y > H - hudBotH - 40 && this.vy > 0) {
        this.y = H - hudBotH - 40;
        this.vy = -6 - Math.random() * 4; // Hop again
        this.vx = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random() * 4);
        
        // Small explosion when hitting ground (damages others, not itself)
        explodeAt(this.x, this.y, 100, 10, this.lastHitBy, this);
        if(soundOn) SFX.bomb_appear();
      }

      this.bombTimer--;
      if (this.bombTimer <= 0) {
        // Massive explosion at the end
        nukeAll(this.lastHitBy);
        floatText('💥 MEGA BOOM!', this.x, this.y, '#ff2266', 36);
        this.init();
      }
      return; 
    }

    // NORMAL FISH MOVEMENT
    this.x += this.speed * this.dir;
    this.y = this.baseY + Math.sin(frameCount * this.waveFreq + this.wave) * this.waveAmp;

    if(this.id==='jackpot'&&frameCount%18===0) this.countUp+=Math.floor(12+Math.random()*16);
    if(this.id==='boss'){this.roarTimer++;if(this.roarTimer%180===0){floatText('👹ROAR!',this.x,this.y-70,'#ff9800',22);SFX.boss_appear&&soundOn&&SFX.boss_appear();}}
    if(this.id==='ghost') this.ghostPhase=Math.sin(frameCount*0.06+this.wave);
    if(this.id==='electric'){
      this.zapTimer++;
      if(this.zapTimer%40===0&&soundOn) SFX.electric_appear();
    }
    if(this.id==='roulette'){this.spinAngle+=0.04;}

    const marg=this.size+95;
    if((this.dir===1&&this.x>W+marg)||(this.dir===-1&&this.x<-marg)) this.init();
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    let fl=this.dir===-1?-1:1;

    if(this.flash>0) ctx.globalAlpha=0.35+0.65*Math.sin(this.flash*1.1);

    if (this.id === 'drill') {
      ctx.rotate(this.orbitAngle); // Point in movement direction
      fl = 1; // Don't flip horizontally if rotating
    }

    ctx.scale(fl,1);
    switch(this.id){
      case 'boss':     this._drawBoss(); break;
      case 'drill':    this._drawDrill(); break;
      case 'bomb':     this._drawBomb(); break;
      case 'roulette': this._drawRouletteFish(); break;
      case 'random':   this._drawRandomBox(); break;
      case 'jackpot':  this._drawJackpot(); break;
      case 'twin':     this._drawTwin(); break;
      case 'ghost':    this._drawGhost(); break;
      case 'electric': this._drawElectric(); break;
      default:         this._drawBasicFish();
    }
    ctx.restore();

    this._drawHPBar();
  }

  // ── DRAWING METHODS ───────────────────────────────────────────
  _drawBasicFish(){
    const c=this.frozen>0?'#b3e5fc':this.color;
    const g=this.frozen>0?'#80d8ff':this.glow;
    ctx.shadowBlur=18+Math.sin(this.auraPhase)*6; ctx.shadowColor=g;
    ctx.beginPath(); ctx.ellipse(0,0,this.size,this.size*0.52,0,0,Math.PI*2);
    ctx.fillStyle=c; ctx.fill();
    const tw=Math.sin(this.tailPh)*10;
    ctx.beginPath(); ctx.moveTo(-this.size+4,0);
    ctx.lineTo(-this.size-18,-12+tw); ctx.lineTo(-this.size-18,12+tw); ctx.closePath();
    ctx.fillStyle=c; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-this.size*0.2,-this.size*0.52);
    ctx.lineTo(this.size*0.1,-this.size*0.88); ctx.lineTo(this.size*0.4,-this.size*0.52);
    ctx.fillStyle=c; ctx.fill();
    ctx.shadowBlur=0;
    this._drawEye();
    if(this.frozen>0) this._drawFrostRing();
  }

  _drawBoss(){
    const s=this.size;
    const pulseR=s+(Math.sin(this.auraPhase)*8);
    for(let r=0;r<3;r++){
      const ringR=pulseR+r*14;
      const a=0.15-r*0.04;
      ctx.globalAlpha=a*(0.5+0.5*Math.sin(this.auraPhase+r)); ctx.strokeStyle='#ff6f00';
      ctx.lineWidth=3-r; ctx.shadowBlur=25; ctx.shadowColor='#ff9800';
      ctx.beginPath(); ctx.arc(0,0,ringR,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.shadowBlur=30; ctx.shadowColor='#ff9800';
    ctx.fillStyle='#cc3300';
    ctx.beginPath();
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;
      const spiky=i%2===0?s*1.2:s*0.75;
      const sr=spiky+Math.sin(this.auraPhase*2+i)*4;
      i===0?ctx.moveTo(Math.cos(a)*sr,Math.sin(a)*sr):ctx.lineTo(Math.cos(a)*sr,Math.sin(a)*sr);
    }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff4400';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.8,s*0.55,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,200,0,0.3)';
    for(let i=0;i<6;i++){
      const a=this.orbitAngle+i*(Math.PI/3);
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*0.45,Math.sin(a)*s*0.45,4,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.floor(s*0.55)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('👑',0,-s*0.1);
    ctx.shadowBlur=10; ctx.shadowColor='#ff0000';
    ctx.fillStyle='#ff0000';
    ctx.beginPath(); ctx.arc(s*0.35,-s*0.18,s*0.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(s*0.37,-s*0.18,s*0.08,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.scale(-1,1); ctx.fillStyle='#ff9800';
    ctx.font=`bold ${Math.floor(s*0.28)}px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.fillText('BOSS',0,-s-20);
    ctx.scale(-1,1);
  }

  _drawDrill(){
    const s=this.size;
    const spin=frameCount*0.12;
    ctx.shadowBlur=25+Math.sin(this.auraPhase)*10; ctx.shadowColor='#00e5ff';
    for(let i=0;i<8;i++){
      const a=spin+i*(Math.PI/4);
      const r=s+8+Math.sin(this.auraPhase*2+i)*5;
      ctx.globalAlpha=0.15+0.1*Math.sin(this.auraPhase+i);
      ctx.strokeStyle='#00e5ff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='#004060';
    ctx.beginPath(); ctx.ellipse(0,0,s,s*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#00a0c0';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.7,s*0.36,0,0,Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(s*0.7,0); ctx.rotate(spin*2);
    ctx.fillStyle='#00e5ff'; ctx.shadowBlur=15; ctx.shadowColor='#00e5ff';
    for(let i=0;i<4;i++){
      const a=i*(Math.PI/2); ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*16,Math.sin(a)*16);
      ctx.lineTo(Math.cos(a+0.4)*10,Math.sin(a+0.4)*10); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    ctx.shadowBlur=0;
    if(frameCount%6<3){
      ctx.fillStyle='#00ffff'; ctx.globalAlpha=0.8;
      for(let i=0;i<4;i++){
        const a=spin*3+i*(Math.PI/2);
        const r=s+12;
        ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,2,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    ctx.shadowBlur=0;
    
    // Fix text rotation so it always stays upright
    ctx.save();
    ctx.rotate(-this.orbitAngle); 
    ctx.fillStyle='#00e5ff'; ctx.font=`bold 11px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.fillText('DRILL',0,-s-14);
    ctx.restore();
  }

  _drawBomb(){
    const s=this.size;
    const blink=Math.sin(this.beepPhase)*0.5+0.5;
    const pct=1-this.hp/this.maxHp;
    const ringSpeed=1+pct*3;
    ctx.shadowBlur=20+blink*20; ctx.shadowColor=`rgba(255,${Math.floor(100-blink*100)},0,1)`;
    const ringR=s+((frameCount*ringSpeed)%30);
    ctx.globalAlpha=Math.max(0,(30-(frameCount*ringSpeed)%30)/30)*0.5;
    ctx.strokeStyle='#ff2266'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,ringR,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle=`rgb(${Math.floor(180+blink*75)},${Math.floor(20-blink*20)},${Math.floor(20-blink*20)})`;
    ctx.beginPath(); ctx.arc(0,0,s*0.88,0,Math.PI*2); ctx.fill();
    ctx.save(); ctx.clip();
    ctx.fillStyle='rgba(0,0,0,0.3)';
    for(let i=-3;i<4;i++){
      ctx.fillRect(i*12-s,-(s),8,s*2.2);
    }
    ctx.restore();
    ctx.strokeStyle='#886633'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,-s*0.88);
    ctx.quadraticCurveTo(s*0.4,-s*1.3,s*0.2,-s*1.6); ctx.stroke();
    ctx.fillStyle=`rgba(255,${Math.floor(200+blink*55)},0,${0.7+blink*0.3})`;
    ctx.shadowBlur=12+blink*8; ctx.shadowColor='#ff8800';
    ctx.beginPath(); ctx.arc(s*0.2,-s*1.6,4+blink*2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.font=`bold ${Math.floor(s*0.65)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💣',0,s*0.05);
    ctx.scale(-1,1); ctx.fillStyle='#ff2266'; ctx.font=`bold 11px Orbitron,Arial`;
    ctx.fillText('BOMB',0,-s-16); ctx.scale(-1,1);
  }

  _drawRouletteFish(){
    const s=this.size;
    const spin=this.spinAngle;
    for(let i=0;i<6;i++){
      const a=spin+i*(Math.PI/3);
      const r=s+10+Math.sin(this.auraPhase+i)*5;
      const hue=((frameCount*2+i*60)%360);
      ctx.globalAlpha=0.2; ctx.strokeStyle=`hsl(${hue},100%,60%)`; ctx.lineWidth=2;
      ctx.shadowBlur=8; ctx.shadowColor=`hsl(${hue},100%,60%)`;
      ctx.beginPath(); ctx.arc(0,0,r,a,a+0.5); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    const WEDGE_COLORS=['#e91e63','#ff5722','#ff9800','#ffc107','#4caf50','#2196f3','#9c27b0','#607d8b'];
    for(let i=0;i<8;i++){
      const a=spin+i*(Math.PI/4);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,s,a,a+Math.PI/4); ctx.closePath();
      ctx.fillStyle=WEDGE_COLORS[i]; ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(0,0,s*0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(0,0,s*0.18,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.shadowBlur=6; ctx.shadowColor='#fff';
    ctx.beginPath(); ctx.moveTo(0,-s-2); ctx.lineTo(-5,-s+8); ctx.lineTo(5,-s+8); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    ctx.scale(-1,1); ctx.fillStyle='#c040ff'; ctx.font=`bold 11px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.fillText('ROULETTE',0,-s-16); ctx.scale(-1,1);
  }

  _drawRandomBox(){
    const s=this.size;
    const bobScale=0.96+0.04*Math.sin(this.auraPhase*2);
    ctx.scale(bobScale,bobScale);
    const hue=(frameCount*3)%360;
    ctx.shadowBlur=22+Math.sin(this.auraPhase)*8; ctx.shadowColor=`hsl(${hue},100%,60%)`;
    ctx.strokeStyle=`hsl(${hue},100%,60%)`; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,s+8+Math.sin(this.auraPhase)*4,0,Math.PI*2); ctx.stroke();
    const hs=s*0.8;
    ctx.fillStyle=`hsl(${(hue+60)%360},70%,40%)`;
    ctx.shadowBlur=15; ctx.shadowColor=`hsl(${hue},100%,60%)`;
    ctx.fillRect(-hs,-hs,hs*2,hs*2);
    ctx.fillStyle=`hsl(${hue},100%,60%)`;
    ctx.fillRect(-hs,-s*0.15,hs*2,s*0.3);
    ctx.fillRect(-s*0.15,-hs,s*0.3,hs*2);
    ctx.font=`${Math.floor(s*0.55)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🎁',0,0);
    ctx.shadowBlur=0; ctx.scale(1/bobScale,1/bobScale);
    ctx.scale(-1,1); ctx.fillStyle='#ffd700'; ctx.font=`bold 11px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.fillText('LUCKY BOX',0,-s-18); ctx.scale(-1,1);
  }

  _drawJackpot(){
    const s=this.size;
    const pulse=0.92+0.08*Math.sin(this.auraPhase*1.5);
    ctx.scale(pulse,pulse);
    for(let r=0;r<4;r++){
      const ra=s+r*12+Math.sin(this.auraPhase+r*0.5)*5;
      ctx.globalAlpha=(0.4-r*0.08)*(0.6+0.4*Math.sin(this.auraPhase+r));
      ctx.strokeStyle=r%2===0?'#ffd700':'#ff9800'; ctx.lineWidth=3-r*0.5;
      ctx.shadowBlur=20; ctx.shadowColor='#ffd700';
      ctx.beginPath(); ctx.arc(0,0,ra,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1;
    for(let i=0;i<6;i++){
      const a=this.orbitAngle+i*(Math.PI/3);
      const r=s+20;
      ctx.fillStyle='#ffd700'; ctx.shadowBlur=12; ctx.shadowColor='#ffd700';
      ctx.font=`${Math.floor(s*0.25)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('★',Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.shadowBlur=30; ctx.shadowColor='#ff9800';
    ctx.fillStyle='#cc8800';
    ctx.beginPath(); ctx.ellipse(0,0,s,s*0.52,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd700';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.78,s*0.4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,200,0,0.4)';
    for(let i=0;i<8;i++){
      const a=this.orbitAngle*0.5+i*(Math.PI/4);
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*0.4,Math.sin(a)*s*0.4,4+Math.sin(this.auraPhase+i)*2,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='#8b5e00'; ctx.font=`bold ${Math.floor(s*0.6)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',0,2);
    this._drawEye();
    ctx.scale(1/pulse,1/pulse);
    ctx.shadowBlur=12; ctx.shadowColor='#ffd700';
    ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.floor(s*0.3)}px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.scale(-1,1);
    ctx.fillText('+'+this.countUp,0,-s-22); ctx.scale(-1,1);
    ctx.shadowBlur=0;
  }

  _drawTwin(){
    const s=this.size;
    ctx.strokeStyle='rgba(128,222,234,0.4)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(-s*0.6,0); ctx.lineTo(s*0.6,0); ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur=18; ctx.shadowColor='#26c6da';
    ctx.fillStyle='#0097a7';
    ctx.beginPath(); ctx.ellipse(0,0,s,s*0.52,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#80deea';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.7,s*0.36,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,150,180,0.5)';
    ctx.beginPath(); ctx.ellipse(-s*0.2,0,s*0.3,s*0.18,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s*0.2,0,s*0.3,s*0.18,0,0,Math.PI*2); ctx.fill();
    const tw=Math.sin(this.tailPh)*10;
    ctx.fillStyle='#0097a7';
    ctx.beginPath(); ctx.moveTo(-s+4,0); ctx.lineTo(-s-16,-11+tw); ctx.lineTo(-s-16,11+tw); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    this._drawEye();
    ctx.fillStyle='#80deea'; ctx.font=`bold 10px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.scale(-1,1); ctx.fillText('✦ TWIN',0,-s-14); ctx.scale(-1,1);
  }

  _drawGhost(){
    const s=this.size;
    const alpha=0.35+0.35*Math.abs(this.ghostPhase);
    ctx.globalAlpha=ctx.globalAlpha*alpha;
    for(let i=0;i<3;i++){
      const dx=(i-1)*s*0.35;
      const dy=s*0.5+Math.abs(Math.sin(frameCount*0.08+i))*s*0.3;
      ctx.fillStyle='rgba(160,190,255,0.4)';
      ctx.beginPath(); ctx.arc(dx,dy,s*0.15,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=35; ctx.shadowColor='#7090ff';
    ctx.fillStyle='rgba(176,196,255,0.75)';
    ctx.beginPath(); ctx.ellipse(0,0,s,s*0.55,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(176,196,255,0.75)';
    ctx.beginPath(); ctx.moveTo(-s,0);
    for(let x=-s;x<=s;x+=s*0.2){
      const yOff=Math.sin(x*0.1+frameCount*0.1)*s*0.3;
      ctx.lineTo(x,s*0.55+yOff);
    }
    ctx.lineTo(s,0); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(50,80,200,0.9)';
    ctx.beginPath(); ctx.ellipse(s*0.3,-s*0.1,s*0.18,s*0.22,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.beginPath(); ctx.ellipse(s*0.32,-s*0.1,s*0.1,s*0.14,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(140,160,255,0.9)'; ctx.font=`bold 10px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.scale(-1,1); ctx.fillText('👻 GHOST',0,-s-14); ctx.scale(-1,1);
  }

  _drawElectric(){
    const s=this.size;
    for(let i=0;i<8;i++){
      if(Math.random()>0.6) continue;
      const a1=(i/8)*Math.PI*2+(frameCount*0.08);
      const a2=a1+0.4;
      const r1=s+4, r2=s+14+Math.random()*8;
      ctx.strokeStyle=`rgba(255,${200+Math.floor(Math.random()*55)},0,0.8)`;
      ctx.lineWidth=1.5+Math.random(); ctx.shadowBlur=10; ctx.shadowColor='#ffd700';
      ctx.beginPath();
      ctx.moveTo(Math.cos(a1)*r1,Math.sin(a1)*r1);
      const mx=Math.cos((a1+a2)/2)*(r1+r2)/2+(Math.random()-0.5)*12;
      const my=Math.sin((a1+a2)/2)*(r1+r2)/2+(Math.random()-0.5)*12;
      ctx.quadraticCurveTo(mx,my,Math.cos(a2)*r2,Math.sin(a2)*r2);
      ctx.stroke();
    }
    ctx.shadowBlur=28+Math.sin(this.auraPhase)*10; ctx.shadowColor='#ffd700';
    ctx.fillStyle='#886600';
    ctx.beginPath(); ctx.ellipse(0,0,s,s*0.52,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd740';
    ctx.beginPath(); ctx.ellipse(0,0,s*0.72,s*0.38,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(200,150,0,0.4)';
    for(let i=-2;i<=2;i++){
      ctx.fillRect(i*s*0.25-3,-s*0.38,6,s*0.76);
    }
    const tw=Math.sin(this.tailPh)*11;
    ctx.fillStyle='#886600';
    ctx.beginPath(); ctx.moveTo(-s+4,0); ctx.lineTo(-s-18,-12+tw); ctx.lineTo(-s-18,12+tw); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; this._drawEye();
    ctx.fillStyle='#ffd700'; ctx.shadowBlur=10; ctx.shadowColor='#fff';
    ctx.font=`${Math.floor(s*0.45)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('⚡',0,2);
    ctx.shadowBlur=0;
    ctx.scale(-1,1); ctx.fillStyle='#ffd700'; ctx.font=`bold 11px Orbitron,Arial`;
    ctx.textAlign='center'; ctx.fillText('ELECTRIC',0,-s-16); ctx.scale(-1,1);
  }

  _drawEye(){
    ctx.shadowBlur=0;
    const ex=this.size*0.44, ey=-this.size*0.1;
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ex,ey,this.size*0.14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ex+this.size*0.02,ey,this.size*0.075,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(ex-this.size*0.04,ey-this.size*0.06,this.size*0.03,0,Math.PI*2); ctx.fill();
  }
  _drawFrostRing(){
    ctx.globalAlpha=0.35; ctx.strokeStyle='#80d8ff'; ctx.lineWidth=3;
    ctx.setLineDash([6,4]); ctx.beginPath(); ctx.arc(0,0,this.size+7,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
  }
  _drawHPBar(){
    if(this.maxHp<=5) return;
    const bw=this.size*1.8, bh=5, bx=this.x-bw/2, by=this.y-this.size-26;
    const pct=this.hp/this.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,bw,bh);
    const barC=pct>0.5?'#4caf50':pct>0.25?'#ffc107':'#f44336';
    ctx.fillStyle=barC; ctx.fillRect(bx,by,bw*pct,bh);
    if(this.id==='boss'){
      ctx.strokeStyle='rgba(255,150,0,0.5)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
    }
  }
}

class Bullet{
  constructor(ox,oy,ang,wDef,ownerId){
    this.x=ox;this.y=oy;
    const spd=wDef.plasma?8:wDef.minigun?18:15;
    this.vx=Math.cos(ang)*spd;this.vy=Math.sin(ang)*spd;
    this.wDef=wDef;this.ownerId=ownerId;this.alive=true;
    this.trail=[];this.piercedFish=new Set();
    this.piercing=!!wDef.piercing;this.explosive=!!wDef.explosive;
    this.plasma=!!wDef.plasma;this.nuke=!!wDef.nuke;
    this.frost=!!wDef.frost;this.chain=!!wDef.chain;
  }
  dmg(){let b=this.wDef.dmg;if(this.ownerId===0)b*=(1+upgrades.dmg*0.2);return b;}
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<-20||this.x>W+20||this.y<-20||this.y>H+20){this.alive=false;return;}
    for(let f of fishes){
      if(!f.alive||this.piercedFish.has(f))continue;
      if(Math.hypot(this.x-f.x,this.y-f.y)<f.size+9){
        f.lastHitBy = this.ownerId; // RECORD LAST HIT
        const dv=this.dmg();
        f.hp-=dv;f.flash=9;
        if(this.frost){f.frozen=120;frozenFish.add(f);spawnIce(this.x,this.y);}
        spawnSpark(this.x,this.y,players[this.ownerId].color);
        if(this.explosive)explodeAt(this.x,this.y,90*(1+upgrades.radius*0.15),dv*2,this.ownerId);
        if(this.plasma)   explodeAt(this.x,this.y,130*(1+upgrades.radius*0.15),dv*3,this.ownerId);
        if(this.nuke)     nukeAll(this.ownerId);
        if(this.chain)    chainLightning(f,this.ownerId,dv);
        if(f.hp<=0)killFish(f,this.ownerId);
        if(this.piercing){this.piercedFish.add(f);}else{this.alive=false;return;}
      }
    }
  }
  draw(){
    const oc=players[this.ownerId].color;
    for(let i=0;i<this.trail.length;i++){
      const a=(i/this.trail.length)*0.5;
      const sz=3*(i/this.trail.length);
      ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=6;ctx.shadowColor=oc;
      ctx.beginPath();ctx.arc(this.trail[i].x,this.trail[i].y,sz,0,Math.PI*2);
      ctx.fillStyle=oc;ctx.fill();ctx.restore();
    }
    ctx.save();
    const sz=this.plasma?10:this.explosive?9:this.piercing?7:this.nuke?13:5;
    ctx.shadowBlur=22;ctx.shadowColor=oc;
    ctx.beginPath();ctx.arc(this.x,this.y,sz,0,Math.PI*2);
    ctx.fillStyle=oc;ctx.fill();
    if(this.plasma||this.nuke){
      ctx.beginPath();ctx.arc(this.x,this.y,sz*1.7,0,Math.PI*2);
      ctx.strokeStyle=oc;ctx.lineWidth=1.5;ctx.globalAlpha=0.35;ctx.stroke();
    }
    ctx.restore();
  }
}

class Laser{
  constructor(ox,oy,ang,ownerId){
    this.ox=ox;this.oy=oy;this.ang=ang;this.ownerId=ownerId;this.life=20;
    const dx=Math.cos(ang),dy=Math.sin(ang);
    for(let f of fishes){
      if(!f.alive)continue;
      const fx=f.x-ox,fy=f.y-oy;
      if(fx*dx+fy*dy<0)continue;
      if(Math.abs(fx*dy-fy*dx)<f.size+12){
        f.lastHitBy = ownerId;
        const d=3*(ownerId===0?1+upgrades.dmg*0.2:1);
        f.hp-=d;f.flash=10;spawnSpark(f.x,f.y,players[ownerId].color);
        if(f.hp<=0)killFish(f,ownerId);
      }
    }
    if(soundOn)SFX.laser();
  }
  update(){this.life--;}
  draw(){
    if(this.life<=0)return;
    const a=this.life/20,oc=players[this.ownerId].color;
    ctx.save();ctx.globalAlpha=a;
    ctx.shadowBlur=35;ctx.shadowColor=oc;
    ctx.strokeStyle=oc;ctx.lineWidth=4+a*5;
    ctx.beginPath();ctx.moveTo(this.ox,this.oy);
    ctx.lineTo(this.ox+Math.cos(this.ang)*Math.max(W,H)*1.6,this.oy+Math.sin(this.ang)*Math.max(W,H)*1.6);
    ctx.stroke();ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
  }
}

function chainLightning(orig,ownerId,dmg,depth=0){
  if(depth>3)return;
  const nearby=fishes.filter(f=>f.alive&&f!==orig&&Math.hypot(f.x-orig.x,f.y-orig.y)<160);
  if(!nearby.length)return;
  const tgt=nearby[Math.floor(Math.random()*nearby.length)];
  chainLightnings.push({x1:orig.x,y1:orig.y,x2:tgt.x,y2:tgt.y,life:12});
  tgt.lastHitBy = ownerId;
  tgt.hp-=dmg*0.6;tgt.flash=8;spawnSpark(tgt.x,tgt.y,'#ffd740');
  if(tgt.hp<=0)killFish(tgt,ownerId);else chainLightning(tgt,ownerId,dmg*0.6,depth+1);
}

// ── ROULETTE ──────────────────────────────────────────────────────
const ROULETTE_PRIZES=[
  {label:'2×',mult:2,color:'#4caf50'},{label:'5×',mult:5,color:'#8bc34a'},
  {label:'10×',mult:10,color:'#ffd700'},{label:'20×',mult:20,color:'#ff9800'},
  {label:'50×',mult:50,color:'#ff5722'},{label:'JACKPOT',mult:200,color:'#e91e63'},
  {label:'3×',mult:3,color:'#009688'},{label:'MISS',mult:0,color:'#607d8b'},
];
class InWorldRoulette{
  constructor(x,y,ownerId,isRandom){
    this.x=x;this.y=y;this.ownerId=ownerId;this.isRandom=isRandom;
    this.angle=0;this.speed=0.55;this.done=false;this.result=null;
    this.doneTimer=-1;this.spins=130+Math.floor(Math.random()*80);
    this.prizes=ROULETTE_PRIZES;
  }
  update(){
    if(!this.done){
      this.angle+=this.speed;this.speed*=0.987;this.spins--;
      if(this.spins%8===0&&soundOn)SFX.roulette_spin();
      if(this.spins<=0||this.speed<0.015){this.done=true;this._giveResult();}
    }else{this.doneTimer++;}
  }
  _giveResult(){
    this.result=this.prizes[Math.floor(Math.random()*this.prizes.length)];
    if(this.ownerId === -1) return; // Prevent crash if nobody killed it
    
    const o=players[this.ownerId],win=this.result.mult*o.bet;
    if(win>0){
      o.bal+=win;if(this.ownerId===0){totalWin+=win;updateMissionProgress('win',win);updateUI();}
      floatText('+'+win,this.x,this.y-55,o.color,22);
      spawnCoins(this.x,this.y,10,o);
      if(soundOn)SFX.roulette_win();
    }else{floatText('MISS!',this.x,this.y-50,'#aaa',18);}
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);
    const R=46,seg=(Math.PI*2)/this.prizes.length;
    ctx.shadowBlur=20;ctx.shadowColor='#c040ff';
    for(let i=0;i<this.prizes.length;i++){
      const a=this.angle+i*seg;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,a,a+seg);ctx.closePath();
      ctx.fillStyle=this.prizes[i].color;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.stroke();
    }
    for(let i=0;i<this.prizes.length;i++){
      const a=this.angle+i*seg+seg/2;
      ctx.save();ctx.translate(Math.cos(a)*R*0.66,Math.sin(a)*R*0.66);
      ctx.rotate(a+Math.PI/2);ctx.fillStyle='#fff';ctx.font='bold 8px Orbitron,Arial';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.prizes[i].label,0,0);ctx.restore();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.shadowBlur=6;ctx.shadowColor='#fff';
    ctx.beginPath();ctx.moveTo(0,-R-3);ctx.lineTo(-7,-R+9);ctx.lineTo(7,-R+9);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
    if(this.done&&this.result){
      ctx.fillStyle=this.result.color;ctx.shadowBlur=12;ctx.shadowColor=this.result.color;
      ctx.font='bold 16px Orbitron';ctx.textAlign='center';ctx.fillText(this.result.label,0,-R-18);
    }else{
      ctx.fillStyle='#fff';ctx.font='bold 11px Orbitron';ctx.textAlign='center';
      ctx.fillText(this.isRandom?'LUCKY BOX':'ROULETTE',0,-R-15);
    }
    ctx.restore();
  }
}

function explodeAt(x, y, radius, dmg, ownerId, immuneFish = null){
  spawnExplosion(x,y,'#ff9100'); spawnExplosion(x,y,'#ff2266');
  if(ownerId===0) shakeAmt=Math.max(shakeAmt,10);
  if(soundOn) SFX.explosion();
  for(let f of fishes){
    if(!f.alive || f === immuneFish) continue;
    const d=Math.hypot(f.x-x,f.y-y);
    if(d<radius+f.size){
      f.hp-=dmg*(1-d/(radius+f.size)*0.4); 
      f.flash=14; 
      f.lastHitBy=ownerId;
      if(f.hp<=0) killFish(f,ownerId);
    }
  }
}
function nukeAll(ownerId){
  shakeAmt=Math.max(shakeAmt,22);spawnNukeParticles();nukeFlash=35;
  if(soundOn)SFX.nuke();
  floatText('☢ NUKE!',W/2,H/2,'#00ff88',40);
  for(let f of fishes){
    if(!f.alive)continue; 
    f.hp=0; f.lastHitBy = ownerId;
    killFish(f,ownerId);
  }
}

// ── KILL FISH ─────────────────────────────────────────────────────
function killFish(f, ownerId){
  if(!f.alive)return; f.alive=false;
  const owner = ownerId !== -1 ? players[ownerId] : null;

  spawnExplosion(f.x,f.y,f.glow);
  
  if (owner) {
    spawnCoins(f.x,f.y,f.id==='boss'?14:f.id==='jackpot'?10:5,owner);
    owner.totalKills++;
    if(ownerId===0){totalKills++;checkAchievements();}
  }
  
  if(soundOn){
    if(f.id==='boss')SFX.explosion();
    else if(f.id==='jackpot')SFX.jackpot_win();
    else SFX.coin();
  }

  // Chain events
  if(f.id==='drill'||f.id==='bomb'){
    floatText('💥 BOOM!',f.x,f.y,'#ff2266',24);
    explodeAt(f.x,f.y,280*(1+upgrades.radius*0.15),14,ownerId);
    f.init();return;
  }
  if(f.id==='roulette'){inWorldRoulettes.push(new InWorldRoulette(f.x,f.y,ownerId,false));f.init();return;}
  if(f.id==='random'){inWorldRoulettes.push(new InWorldRoulette(f.x,f.y,ownerId,true));f.init();return;}
  if(f.id==='twin'){
    for(let i=0;i<2;i++){const nf=new Fish();nf.init('small');nf.x=f.x+(i-0.5)*38;nf.y=f.y;fishes.push(nf);}
  }

  if(ownerId===0){
    comboKills++;const cTime=buffs.comboMaster?200:110;comboTimer=cTime;
    if(comboKills>=2)showCombo(comboKills);
    if(comboKills>=5)updateMissionProgress('combo',comboKills);
    if(comboKills>=5&&!ACHIEVEMENTS.find(a=>a.id==='combo_x5').done)unlockAchievement('combo_x5');
    if(comboKills>=10&&!ACHIEVEMENTS.find(a=>a.id==='combo_x10').done)unlockAchievement('combo_x10');
    if(soundOn)SFX.combo();
  }

  let win=0;
  if(owner) {
    if(f.id==='jackpot'){
      win=f.countUp;jackpotPool=Math.max(0,jackpotPool-win);updateJackpot();
      if(ownerId===0){
        showJackpotWin(win);
        if(!ACHIEVEMENTS.find(a=>a.id==='jackpot_hit').done)unlockAchievement('jackpot_hit');
        updateMissionProgress('jackpot',1);
      }else floatText('JACKPOT! +'+win,f.x,f.y-30,'#ffd700',22);
    }else{
      const goldMod=(ownerId===0&&buffs.goldFish)?1.5:1;
      const wid = ownerId===0 ? (equippedSlots.find(s=>s!==null)||'single') : owner.activeWeapon;
      const winMod = ownerId===0 ? (WEAPON_DEFS[wid]?.winMod||1) : 1;
      const wrB = ownerId===0 ? (1+upgrades.winrate*0.05) : 1;
      const comboMod = ownerId===0 ? Math.max(1,comboKills*0.08+1) : 1;
      win=Math.floor(f.val*(owner.bet/10)*winMod*goldMod*wrB*comboMod);
    }
    owner.bal+=win; owner.totalWin+=win;
    if(ownerId===0){totalWin+=win;updateMissionProgress('win',win);updateMissionProgress(f.id,1);checkAchievements();updateUI();}
    if(win>0) floatText('+'+win, f.x, f.y-22, owner.color, 16);
  }
  
  f.init();
}

// ── SHOOT ─────────────────────────────────────────────────────────
function performShoot(player,ang){
  let wDef=WEAPON_DEFS['single'];
  if(!player.isBot){
    const sl=equippedSlots[activeSlot]||'single';
    wDef=WEAPON_DEFS[sl]||WEAPON_DEFS['single'];
  } else {
    wDef = WEAPON_DEFS[player.activeWeapon || 'single'];
  }

  const cost=(player.id===0&&buffs.autoReload&&player.bal<300)?0:player.bet;
  if(player.bal<cost)return;
  
  player.bal-=cost; player.ang=ang; player.fireCount++;
  if(player.id===0) updateUI();
  if(soundOn&&player.id===0) SFX.shoot();
  
  if(wDef.id==='laser'){lasers.push(new Laser(player.x,player.y,ang,player.id));spawnSpark(player.x,player.y,player.color);return;}
  const multi=wDef.multi||1;
  const spread=wDef.id==='shotgun'?0.26:wDef.id==='triple'?0.24:wDef.id==='double'?0.12:0;
  for(let i=0;i<multi;i++){
    const off=multi>1?spread*(i-(multi-1)/2):0;
    bullets.push(new Bullet(player.x,player.y,ang+off,wDef,player.id));
  }
}

let lastFire2=0;
function shootMainPlayer(){
  if(gameOver)return;
  const rb=1+upgrades.rate*0.15;
  const delay=Math.max(40,130/rb);
  const now=performance.now();
  if(now-lastFire2<delay)return;lastFire2=now;
  const ang=Math.atan2(mouse.y-players[0].y,mouse.x-players[0].x);
  performShoot(players[0],ang);
}

// ── COMPETITIVE BOT AI ──────────────────────────────────────────
function updateBots(){
  players.forEach((p,idx)=>{
    if(!p.isBot||gameOver)return;
    
    p.cooldown--;
    if(p.cooldown>0)return;

    // RANDOM COOLDOWN (Cepat atau Lambat)
    p.cooldown = Math.floor(Math.random() * 35) + 5; 

    // GANTI SENJATA RANDOM SESEKALI (5% chance per tembakan)
    if(Math.random() < 0.05) {
      const weapons = Object.keys(WEAPON_DEFS);
      p.activeWeapon = weapons[Math.floor(Math.random() * weapons.length)];
    }

    const live=fishes.filter(f=>f.alive&&f.x>20&&f.x<W-20);
    if(!live.length)return;

    // INCAR IKAN PALING BERHARGA DULUAN
    const tgt=live.sort((a,b)=>b.val-a.val)[Math.floor(Math.random()*Math.min(5,live.length))];
    let ang=Math.atan2(tgt.y-p.y,tgt.x-p.x);
    ang+=(Math.random()-0.5)*0.1; // sedikit meleset

    if(p.bal<p.bet)p.bal+=500; // anti-miskin bot
    performShoot(p,ang);
  });
}

// ── CANNONS ───────────────────────────────────────────────────────
function drawCannons(){
  players.forEach(p=>{
    ctx.save();ctx.translate(p.x,p.y);
    ctx.shadowBlur=20;ctx.shadowColor=p.color;
    ctx.fillStyle='#071828';ctx.beginPath();ctx.ellipse(0,0,42,21,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
    ctx.rotate(p.ang);

    // Bot draws multiple barrels based on random weapon
    let bCount = 1;
    if (p.id === 0) {
      bCount = equippedSlots.filter(s=>s!==null).length;
    } else {
       bCount = WEAPON_DEFS[p.activeWeapon]?.multi || 1;
       if (bCount > 3) bCount = 3; // cap visual barrels
    }

    for(let i=0;i<bCount;i++){
      const off=bCount>1?(i-(bCount-1)/2)*10:0;
      ctx.fillStyle='#1a3b50';ctx.beginPath();ctx.rect(0,off-7,52,14);ctx.fill();
      ctx.strokeStyle=p.color;ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle=p.color;ctx.beginPath();ctx.rect(42,off-9,16,18);ctx.fill();
    }
    ctx.restore();
    ctx.save();ctx.translate(p.x,p.y);
    ctx.shadowBlur=25;ctx.shadowColor=p.color;
    ctx.fillStyle='#0d2a3c';ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=2.5;ctx.stroke();
    const rg=ctx.createRadialGradient(0,0,2,0,0,18);
    rg.addColorStop(0,p.color+'55');rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    if(p.isBot){

const bubbles=[];for(let i=0;i<40;i++)bubbles.push({x:Math.random()*2000,y:Math.random()*1000,r:1+Math.random()*3.5,s:0.25+Math.random()*0.6,ph:Math.random()*Math.PI*2});
const seaWeed=[];for(let i=0;i<10;i++)seaWeed.push({x:Math.random()*0.9+0.05,h:30+Math.random()*50,ph:Math.random()*Math.PI*2,color:`hsl(${140+Math.random()*30},60%,${22+Math.random()*14}%)`});

function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000c20');g.addColorStop(0.5,'#001430');g.addColorStop(1,'#00080e');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=0.04;
  for(let i=0;i<7;i++){
    const rx=W*0.5+Math.cos(i*1.1+frameCount*0.0018)*W*0.38;
    const shG=ctx.createLinearGradient(rx,0,rx+70,H);
    shG.addColorStop(0,'rgba(0,180,255,0.8)');shG.addColorStop(1,'transparent');
    ctx.fillStyle=shG;ctx.beginPath();ctx.moveTo(rx-20,0);ctx.lineTo(rx+110,H);ctx.lineTo(rx-80,H);ctx.closePath();ctx.fill();
  }
  ctx.restore();
  for(let sw of seaWeed){
    const bx=sw.x*W,by=H-hudBotH+2;
    ctx.save();ctx.strokeStyle=sw.color;ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(bx,by);
    for(let j=1;j<=6;j++){const sy=Math.sin(frameCount*0.025+sw.ph+j*0.5)*12;ctx.quadraticCurveTo(bx+sy,by-j*(sw.h/6)+sw.h*0.05,bx+sy*0.5,by-j*(sw.h/6));}
    ctx.stroke();ctx.restore();
  }
  ctx.save();
  for(let b of bubbles){
    b.y-=b.s;b.x+=Math.sin(frameCount*0.012+b.ph)*0.4;
    if(b.y<-10){b.y=H+10;b.x=Math.random()*W;}
    ctx.globalAlpha=0.1+Math.sin(frameCount*0.03+b.ph)*0.04;
    ctx.strokeStyle='#4fc3f7';ctx.lineWidth=0.8;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=0.15;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.25,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  ctx.save();ctx.globalAlpha=0.012;ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;
  const sc=(frameCount*0.7)%(H);ctx.beginPath();ctx.moveTo(0,sc);ctx.lineTo(W,sc);ctx.stroke();ctx.restore();
}

function updateLeaderboard(){

  sorted.forEach((p,i)=>{
    const row=document.createElement('div');row.className='lb-row';
    row.innerHTML=`<span class="lb-rank">${i+1}</span><div class="lb-dot" style="background:${p.color};box-shadow:0 0 6px ${p.color};"></div><span class="lb-name">${p.name}</span><span class="lb-score">${Math.floor(p.totalWin/100)}k</span>`;
    rows.appendChild(row);
  });
}
function toggleLeaderboard(){showLB=!showLB;document.getElementById('leaderboard').style.display=showLB?'block':'none';document.getElementById('btn-lb').classList.toggle('on',showLB);}
function updateStreakUI(){
  const pips=document.getElementById('streak-pips');pips.innerHTML='';
  for(let i=0;i<10;i++){const d=document.createElement('div');d.className='streak-pip'+(i<comboKills?' lit':'');pips.appendChild(d);}
  document.getElementById('streak-count').textContent=comboKills>0?`×${comboKills} COMBO`:'';
}

function renderWeaponRow(){
  const row=document.getElementById('weapon-row');row.innerHTML='';
  for(let i=0;i<MAX_SLOTS;i++){
    const wid=equippedSlots[i],wDef=wid?WEAPON_DEFS[wid]:null;
    const div=document.createElement('div');
    div.className='w-slot'+(i===activeSlot?' active':'')+(wDef?'':' locked');
    div.innerHTML=wDef?`<div class="wico">${wDef.ico}</div><div class="wlvl">SLOT ${i+1}</div><div class="wname">${wDef.name.split(' ')[0]}</div>`:`<div class="wico">🔒</div><div class="wname">EMPTY</div>`;
    if(wDef)div.onclick=()=>{activeSlot=i;renderWeaponRow();};
    row.appendChild(div);
  }
}

// ── SHOP ─────────────────────────────────────────────────────────
let shopTabActive='weapons';
function openShop(){document.getElementById('shop-overlay').style.display='flex';renderShop();}
function closeShop(){document.getElementById('shop-overlay').style.display='none';}
function shopTab(t){
  shopTabActive=t;
  document.querySelectorAll('.shop-tab').forEach((el,i)=>el.classList.toggle('active',['weapons','upgrades','buffs','missions'][i]===t));
  renderShop();
}
function renderShop(){
  const c=document.getElementById('shop-content');c.innerHTML='';
  document.getElementById('sh-bal').textContent=Math.floor(players[0].bal).toLocaleString();
  if(shopTabActive==='weapons'){
    c.style.gridTemplateColumns='repeat(auto-fill,minmax(145px,1fr))';
    for(let wid in WEAPON_DEFS){
      const w=WEAPON_DEFS[wid],owned=!!inventory[wid],equipped=equippedSlots.includes(wid);
      const card=document.createElement('div');card.className='shop-card'+(equipped?' equipped':owned?' owned':'');
      let btn=equipped?`<button class="card-btn equipped-tag" onclick="unequipWeapon('${wid}')">✓ EQUIPPED</button>`:
               owned?`<button class="card-btn equip" onclick="equipWeapon('${wid}')">EQUIP</button>`:
               `<button class="card-btn buy" onclick="buyWeapon('${wid}')">💰 ${w.price.toLocaleString()}</button>`;
      card.innerHTML=`<div class="card-ico">${w.ico}</div><div class="card-name">${w.name}</div><div class="card-stat">DMG:${w.dmg} | ×${w.multi||1}<br><span style="color:#2a7a9a;font-size:7px;">${w.desc}</span></div>${btn}`;
      c.appendChild(card);
    }
  }else if(shopTabActive==='upgrades'){
    c.style.gridTemplateColumns='repeat(auto-fill,minmax(145px,1fr))';
    for(let upg of UPGRADE_DEFS){
      const cur=upgrades[upg.id]||0,maxed=cur>=upg.max,price=maxed?0:upg.prices[cur];
      const card=document.createElement('div');card.className='shop-card'+(maxed?' owned':'');
      card.innerHTML=`<div class="card-ico">${upg.ico}</div><div class="card-name">${upg.name}</div><div class="card-stat">${upg.desc}<br>Lv: ${cur}/${upg.max}</div><button class="card-btn ${maxed?'maxed':'buy'}" onclick="${maxed?'':(`buyUpgrade('${upg.id}')`)}">  ${maxed?'MAX':'💰 '+price.toLocaleString()}</button>`;
      c.appendChild(card);
    }
  }else if(shopTabActive==='buffs'){
    c.style.gridTemplateColumns='repeat(auto-fill,minmax(145px,1fr))';
    for(let buf of BUFF_DEFS){
      const owned=!!buffs[buf.id];const card=document.createElement('div');card.className='shop-card'+(owned?' owned':'');
      card.innerHTML=`<div class="card-ico">${buf.ico}</div><div class="card-name">${buf.name}</div><div class="card-stat">${buf.desc}</div><button class="card-btn ${owned?'equipped-tag':'buy'}" onclick="${owned?'':(`buyBuff('${buf.id}')`)}">  ${owned?'✓ AKTIF':'💰 '+buf.price.toLocaleString()}</button>`;
      c.appendChild(card);
    }
  }else if(shopTabActive==='missions'){
    c.style.gridTemplateColumns='1fr';
    MISSIONS.forEach(m=>{
      const card=document.createElement('div');card.className='shop-card'+(m.done?' owned':'');
      const pct=Math.min(1,m.prog/m.goal);
      const bar=`<div style="width:100%;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;margin:5px 0 3px;overflow:hidden;"><div style="width:${(pct*100).toFixed(0)}%;height:100%;background:${m.done?'#00ffaa':'#00e5ff'};border-radius:3px;"></div></div>`;
      card.innerHTML=`<div style="display:flex;align-items:center;gap:10px;text-align:left;"><div style="font-size:20px;">${m.done?'✅':'📋'}</div><div style="flex:1;"><div class="card-name" style="text-align:left;">${m.desc}</div><div class="card-stat" style="text-align:left;">${m.done?'SELESAI':`${Math.min(m.prog,m.goal)}/${m.goal}`} — Reward 💰${m.reward}</div>${bar}</div></div>`;
      c.appendChild(card);
    });
  }
}
function buyWeapon(wid){if(players[0].bal<WEAPON_DEFS[wid].price){floatText('Saldo kurang!',W/2,H/2,'#ff2266',18);return;}players[0].bal-=WEAPON_DEFS[wid].price;inventory[wid]=true;updateUI();renderShop();checkAchievements();}
function equipWeapon(wid){const idx=equippedSlots.indexOf(null);if(idx!==-1)equippedSlots[idx]=wid;else equippedSlots[activeSlot]=wid;renderWeaponRow();renderShop();}
function unequipWeapon(wid){const idx=equippedSlots.indexOf(wid);if(idx!==-1)equippedSlots[idx]=null;if(!equippedSlots.some(s=>s))equippedSlots[0]='single';renderWeaponRow();renderShop();}
function buyUpgrade(id){const upg=UPGRADE_DEFS.find(u=>u.id===id),cur=upgrades[id]||0;if(cur>=upg.max)return;const price=upg.prices[cur];if(players[0].bal<price){floatText('Saldo kurang!',W/2,H/2,'#ff2266',18);return;}players[0].bal-=price;upgrades[id]++;updateUI();renderShop();}
function buyBuff(id){const buf=BUFF_DEFS.find(b=>b.id===id);if(!buf||players[0].bal<buf.price){floatText('Saldo kurang!',W/2,H/2,'#ff2266',18);return;}players[0].bal-=buf.price;buffs[id]=true;updateUI();renderShop();}

function updateUI(){
  document.getElementById('h-bal').textContent=Math.floor(players[0].bal).toLocaleString();
  document.getElementById('h-win').textContent=Math.floor(totalWin).toLocaleString();
  document.getElementById('h-lvl').textContent=level;
  document.getElementById('h-bet').textContent=players[0].bet;
  if(buffs.shieldX2&&players[0].bal<150)players[0].bal=150;
}
function updateJackpot(){document.getElementById('h-jack').textContent=jackpotPool.toLocaleString();}

function showGameOver(){
  if(gameOver)return;gameOver=true;
  document.getElementById('go-stats').textContent=`Ikan: ${totalKills} | Win: ${totalWin.toLocaleString()} | Lv: ${level}`;
  document.getElementById('gameover-box').style.display='block';
}
function restartGame(){
  players[0].bal=10000;totalWin=0;level=1;players[0].bet=10;gameOver=false;autoFire=false;
  comboKills=0;comboTimer=0;totalKills=0;nukeFlash=0;shakeAmt=0;
  bullets.length=0;_particles.length=0;lasers.length=0;inWorldRoulettes.length=0;chainLightnings.length=0;
  frozenFish.clear();
  document.getElementById('btn-auto').textContent='⚡AUTO';document.getElementById('btn-auto').classList.remove('on');
  document.getElementById('gameover-box').style.display='none';
  MISSIONS.forEach(m=>{if(!m.done)m.prog=0;});
  for(let f of fishes)f.init();
  updateUI();updateJackpot();
}
function toggleAuto(){autoFire=!autoFire;const b=document.getElementById('btn-auto');b.textContent=autoFire?'⚡AUTO ON':'⚡AUTO';b.classList.toggle('on',autoFire);}
function changeBet(d,type){
  if(type==='max')players[0].bet=Math.min(players[0].bal,500);
  else players[0].bet=Math.max(10,Math.min(500,players[0].bet+d));
  document.getElementById('h-bet').textContent=players[0].bet;
}

// ── MAIN LOOP ─────────────────────────────────────────────────────
let lastLoopTime=0;
function loop(ts){
  if(!ts)ts=performance.now();
  if(ts-lastLoopTime<14){requestAnimationFrame(loop);return;}
  lastLoopTime=ts;
  frameCount++;

  if(shakeAmt>0.5){shakeX=(Math.random()-0.5)*shakeAmt;shakeY=(Math.random()-0.5)*shakeAmt;shakeAmt*=0.76;}
  else{shakeX=0;shakeY=0;shakeAmt=0;}

  ctx.save();if(shakeX||shakeY)ctx.translate(shakeX,shakeY);
  ctx.clearRect(-30,-30,W+60,H+60);
  drawBG();

  if(nukeFlash>0){ctx.save();ctx.globalAlpha=nukeFlash/35*0.65;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.restore();nukeFlash--;}

  for(let f of fishes){if(f.alive){f.update();f.draw();}}

  for(let i=inWorldRoulettes.length-1;i>=0;i--){
    const r=inWorldRoulettes[i];r.update();r.draw();
    if(r.done&&r.doneTimer>80)inWorldRoulettes.splice(i,1);
  }

  for(let i=bullets.length-1;i>=0;i--){bullets[i].update();bullets[i].draw();if(!bullets[i].alive)bullets.splice(i,1);}
  for(let i=lasers.length-1;i>=0;i--){lasers[i].update();lasers[i].draw();if(lasers[i].life<=0)lasers.splice(i,1);}

  // Chain lightnings
  for(let i=chainLightnings.length-1;i>=0;i--){
    const cl=chainLightnings[i];
    ctx.save();ctx.globalAlpha=cl.life/12;ctx.shadowBlur=12;ctx.shadowColor='#ffd740';
    ctx.strokeStyle='#ffd740';ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(cl.x1,cl.y1);ctx.lineTo(cl.x2,cl.y2);ctx.stroke();
    ctx.restore();cl.life--;if(cl.life<=0)chainLightnings.splice(i,1);
  }

  // Particles
  for(let i=_particles.length-1;i>=0;i--){
    const p=_particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.022;
    const a=Math.max(0,p.life/p.maxLife);
    if(p.isCoin&&p.life<0.5&&players[p.ownerId]){
      const op=players[p.ownerId];p.x+=(op.x-p.x)*0.18;p.y+=(op.y-p.y)*0.18;
    }
    ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=6;ctx.shadowColor=p.color;
    if(p.isCoin){ctx.fillStyle=p.color;ctx.beginPath();ctx.ellipse(p.x,p.y,p.size,p.size*0.5,(p.rotate||0)+frameCount*0.12,0,Math.PI*2);ctx.fill();}
    else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    ctx.restore();if(p.life<=0)_particles.splice(i,1);
  }

  drawCannons();
  ctx.restore();

  if(comboTimer>0){comboTimer--;if(comboTimer===0){comboKills=0;hideCombo();}}

  if(frameCount%3===0){drawMiniMap();if(showLB)updateLeaderboard();}
  if(frameCount%5===0)updateStreakUI();

  updateBots();

  if(autoFire&&!gameOver){
    const sl=equippedSlots[activeSlot]||'single';const wDef=WEAPON_DEFS[sl];
    if(wDef?.minigun)shootMainPlayer();else if(frameCount%9===0)shootMainPlayer();
  }

  if(frameCount%120===0&&jackpotPool<9999999){jackpotPool+=Math.floor(Math.random()*80+30);updateJackpot();}

  if(totalWin>level*850){level++;floatText(`⭐ LEVEL ${level}!`,W/2,H*0.35,'#00e5ff',30);updateUI();checkAchievements();if(soundOn)SFX.levelup();}

  if(!gameOver&&players[0].bal<players[0].bet&&!autoFire)showGameOver();
  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────────
window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
window.addEventListener('mousedown',e=>{
  if(e.target.closest('.hud-bot')||e.target.closest('#weapon-row')||e.target.closest('#shop-overlay')||e.target.closest('#gameover')||e.target.closest('.hud-top')||e.target.closest('#jackpot-win')||e.target.closest('#sound-btn'))return;
  resumeAC();if(!audioStarted){audioStarted=true;initAudio();}
  shootMainPlayer();
});
window.addEventListener('touchstart',e=>{
  if(e.target.closest('.hud-bot')||e.target.closest('#weapon-row')||e.target.closest('#shop-overlay')||e.target.closest('#gameover')||e.target.closest('.hud-top')||e.target.closest('#jackpot-win')||e.target.closest('#sound-btn')||e.target.closest('#achievement-toast'))return;
  resumeAC();if(!audioStarted){audioStarted=true;initAudio();}
  const t=e.touches[0];mouse.x=t.clientX;mouse.y=t.clientY;shootMainPlayer();e.preventDefault();
},{passive:false});
window.addEventListener('touchmove',e=>{const t=e.touches[0];mouse.x=t.clientX;mouse.y=t.clientY;},{passive:true});
let lastTap=0;window.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<300)e.preventDefault();lastTap=now;},{passive:false});

window.addEventListener('keydown',e=>{
  if(e.key==='1')activeSlot=0,renderWeaponRow();
  if(e.key==='2')activeSlot=1,renderWeaponRow();
  if(e.key==='3')activeSlot=2,renderWeaponRow();
  if(e.key==='a'||e.key==='A')toggleAuto();
  if(e.key==='+'||e.key==='=')changeBet(10);
  if(e.key==='-')changeBet(-10);
  if(e.key==='Escape')closeShop();
  if(e.key==='m'||e.key==='M')toggleSound();
});

// ── INIT ─────────────────────────────────────────────────────────
for(let i=0;i<22;i++)fishes.push(new Fish());
fishes.forEach(f=>{f.x=Math.random()*W;});
renderWeaponRow();updateUI();updateJackpot();
setTimeout(()=>{resize();renderWeaponRow();},120);
requestAnimationFrame(loop);
</script>
