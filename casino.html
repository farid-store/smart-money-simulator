<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ocean Emperor V5 — 6 Players Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --c-blue:#00e5ff;--c-gold:#ffd700;--c-red:#ff2266;--c-green:#00ffaa;
  --c-purple:#c040ff;--c-orange:#ff7700;--c-pink:#ff4fa0;--c-teal:#00ffd0;
  --bg0:#000a1a;--bg1:#001228;--bg2:#001f3f;
  --panel:rgba(0,10,30,0.96);--panel2:rgba(0,18,40,0.92);
  --glow-blue:0 0 20px rgba(0,229,255,0.6);
  --glow-gold:0 0 20px rgba(255,215,0,0.6);
  --border:rgba(0,229,255,0.18);
  --border-gold:rgba(255,215,0,0.35);
  --font-main:'Exo 2',sans-serif;
  --font-hud:'Orbitron',sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;background:var(--bg0);font-family:var(--font-main);user-select:none;cursor:crosshair;}

#gameCanvas{display:block;position:fixed;top:0;left:0;z-index:1;}

/* ─── HUD LAYER ─── */
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;}

/* TOP BAR */
.hud-top{
  display:flex;align-items:stretch;
  background:linear-gradient(180deg,rgba(0,5,20,0.98) 0%,rgba(0,5,20,0.7) 100%);
  border-bottom:1px solid var(--border);
  padding:6px 8px;gap:6px;
}
.hud-cell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,229,255,0.04);border:1px solid var(--border);border-radius:8px;
  padding:4px 10px;min-width:72px;flex:1;
}
.hud-cell.jackpot-cell{
  flex:1.8;border-color:var(--border-gold);background:rgba(255,215,0,0.04);
}
.hud-label{font-size:7px;letter-spacing:3px;color:#4a9bc0;text-transform:uppercase;font-family:var(--font-hud);margin-bottom:2px;}
.hud-val{font-size:14px;font-weight:700;color:#fff;font-family:var(--font-hud);line-height:1;}
.hud-val.gold{color:var(--c-gold);}
.hud-val.blue{color:var(--c-blue);}
.hud-val.green{color:var(--c-green);}
.jackpot-val{font-size:18px;font-weight:900;color:var(--c-gold);font-family:var(--font-hud);}

/* COMBO / MULTIPLIER INDICATOR */
#combo-display{
  position:absolute;top:70px;left:50%;transform:translateX(-50%);
  font-family:var(--font-hud);font-size:22px;font-weight:900;
  color:var(--c-gold);text-shadow:0 0 30px rgba(255,215,0,0.8);
  pointer-events:none;opacity:0;transition:opacity 0.3s;
  text-align:center;white-space:nowrap;
}
#combo-display.show{opacity:1;}

/* SPECIAL WEAPON BAR */
#sp-bar{
  position:absolute;left:50%;transform:translateX(-50%);top:68px;
  width:min(280px,85vw);display:none;flex-direction:column;align-items:center;gap:3px;
}
#sp-label{font-size:9px;font-weight:700;letter-spacing:3px;color:#fff;font-family:var(--font-hud);}
#sp-track{width:100%;height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.12);}
#sp-fill{height:100%;border-radius:4px;transition:width 0.12s linear;}

/* STREAK DISPLAY */
#streak-bar{
  position:absolute;right:8px;top:68px;
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  pointer-events:none;
}
.streak-pip{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.12);transition:all 0.2s;}
.streak-pip.lit{background:var(--c-gold);box-shadow:0 0 8px var(--c-gold);}
#streak-count{font-size:9px;color:var(--c-gold);font-family:var(--font-hud);text-align:right;}

/* WEAPON SLOTS */
#weapon-row{
  position:absolute;bottom:calc(var(--hud-bot-h,88px) + 8px);left:50%;transform:translateX(-50%);
  display:flex;gap:7px;pointer-events:auto;
}
.w-slot{
  width:54px;height:54px;border:1.5px solid var(--border);border-radius:10px;
  background:rgba(0,10,30,0.9);display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.2s;position:relative;overflow:hidden;
  backdrop-filter:blur(4px);
}
.w-slot::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,229,255,0.05),transparent);opacity:0;transition:opacity 0.2s;}
.w-slot:hover::before,.w-slot.active::before{opacity:1;}
.w-slot.active{border-color:var(--c-gold);box-shadow:0 0 18px rgba(255,215,0,0.4),inset 0 0 12px rgba(255,215,0,0.08);}
.w-slot.locked{opacity:0.38;cursor:not-allowed;}
.w-slot .wico{font-size:20px;line-height:1;}
.w-slot .wlvl{font-size:7px;color:var(--c-gold);font-family:var(--font-hud);font-weight:700;margin-top:1px;}
.w-slot .wname{font-size:7px;color:#5ab8d4;letter-spacing:0.5px;text-transform:uppercase;}
.w-slot .wcd{position:absolute;inset:0;background:rgba(0,5,20,0.75);display:none;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--c-blue);font-family:var(--font-hud);}

/* BOTTOM HUD */
.hud-bot{
  pointer-events:auto;
  background:rgba(0,5,20,0.98);border-top:1px solid var(--border);
  padding:8px 8px calc(8px + var(--safe-bottom));
  display:flex;align-items:center;justify-content:space-between;gap:5px;
  flex-shrink:0;
}
.hud-btn{
  background:rgba(0,200,255,0.06);border:1.5px solid rgba(0,200,255,0.28);
  color:var(--c-blue);padding:7px 10px;font-size:9px;font-weight:700;
  letter-spacing:1px;border-radius:7px;cursor:pointer;transition:all 0.18s;
  font-family:var(--font-hud);white-space:nowrap;display:flex;align-items:center;gap:4px;
  flex-shrink:0;
}
.hud-btn:active{transform:scale(0.94);}
.hud-btn.on{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.45);color:var(--c-green);}
.hud-btn.gold{border-color:var(--border-gold);color:var(--c-gold);background:rgba(255,215,0,0.05);}
.hud-btn.red{border-color:rgba(255,34,102,0.45);color:var(--c-red);background:rgba(255,34,102,0.05);}
.bet-group{display:flex;flex-direction:column;align-items:center;gap:2px;}
.bet-ctrl{display:flex;align-items:center;gap:5px;}
.bet-btn{
  background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);
  color:#cde;width:26px;height:26px;border-radius:50%;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;
}
.bet-btn:active{transform:scale(0.88);background:rgba(255,255,255,0.16);}
#h-bet{font-family:var(--font-hud);font-size:16px;font-weight:700;color:#fff;min-width:38px;text-align:center;}

/* FLOATERS */
#floaters{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.floater{
  position:absolute;font-weight:900;pointer-events:none;
  animation:floatUp 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
  font-family:var(--font-hud);text-shadow:0 2px 12px rgba(0,0,0,0.8);
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) scale(0.4);}
  15%{opacity:1;transform:translateY(-14px) scale(1.2);}
  80%{opacity:1;}
  100%{opacity:0;transform:translateY(-130px) scale(0.85);}
}

/* ─── MINI-MAP ─── */
#minimap{
  position:absolute;bottom:calc(var(--hud-bot-h,88px) + 72px);right:8px;
  width:80px;height:50px;border:1px solid var(--border);border-radius:6px;
  background:rgba(0,5,20,0.85);overflow:hidden;pointer-events:none;
}
#minimap canvas{display:block;width:100%;height:100%;}

/* ─── SHOP OVERLAY ─── */
#shop-overlay{
  position:fixed;inset:0;background:rgba(0,0,15,0.94);
  display:none;align-items:flex-start;justify-content:center;
  z-index:300;pointer-events:auto;overflow-y:auto;padding:10px;
  backdrop-filter:blur(6px);
}
#shop-box{
  background:rgba(0,8,25,0.99);border:1.5px solid rgba(0,229,255,0.25);
  border-radius:16px;padding:18px;max-width:700px;width:100%;
  box-shadow:0 0 60px rgba(0,100,200,0.15);margin:auto;
}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;}
.shop-title{font-size:17px;font-weight:900;color:var(--c-blue);font-family:var(--font-hud);letter-spacing:3px;}
.shop-balance{font-size:12px;color:var(--c-gold);font-family:var(--font-hud);white-space:nowrap;}
.shop-close{background:none;border:1.5px solid rgba(255,255,255,0.18);color:#aaa;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;transition:all 0.2s;flex-shrink:0;}
.shop-close:hover{border-color:var(--c-red);color:var(--c-red);}
.shop-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.shop-tab{
  background:rgba(0,229,255,0.05);border:1.5px solid rgba(0,229,255,0.18);
  color:#5a9bb8;padding:6px 12px;font-size:9px;font-weight:700;letter-spacing:2px;
  border-radius:6px;cursor:pointer;font-family:var(--font-hud);transition:all 0.18s;
}
.shop-tab.active{background:rgba(0,229,255,0.14);border-color:var(--c-blue);color:var(--c-blue);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px;}
.shop-card{
  background:rgba(0,12,32,0.9);border:1.5px solid rgba(0,229,255,0.14);
  border-radius:11px;padding:12px 10px;text-align:center;transition:all 0.2s;cursor:pointer;
}
.shop-card:hover{border-color:rgba(0,229,255,0.4);transform:translateY(-2px);}
.shop-card.owned{border-color:rgba(0,255,170,0.35);background:rgba(0,255,136,0.04);}
.shop-card.equipped{border-color:var(--c-gold);background:rgba(255,215,0,0.06);}
.shop-card .card-ico{font-size:26px;margin-bottom:5px;}
.shop-card .card-name{font-size:10px;font-weight:700;color:#e8f4ff;letter-spacing:0.5px;margin-bottom:2px;font-family:var(--font-hud);}
.shop-card .card-stat{font-size:8.5px;color:#4a9cc0;margin-bottom:7px;line-height:1.5;}
.shop-card .card-btn{width:100%;padding:6px;font-size:8px;font-weight:700;letter-spacing:1px;border-radius:5px;cursor:pointer;border:none;font-family:var(--font-hud);transition:all 0.15s;}
.card-btn.buy{background:linear-gradient(135deg,var(--c-gold),#ff9100);color:#000;}
.card-btn.buy:hover{filter:brightness(1.1);}
.card-btn.equip{background:rgba(0,229,255,0.15);color:var(--c-blue);border:1px solid var(--c-blue);}
.card-btn.equipped-tag{background:rgba(255,215,0,0.12);color:var(--c-gold);border:1px solid var(--c-gold);}
.card-btn.maxed{background:rgba(0,255,136,0.1);color:var(--c-green);border:1px solid rgba(0,255,136,0.3);}

/* ─── ACHIEVEMENT TOAST ─── */
#achievement-toast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:linear-gradient(135deg,rgba(0,8,25,0.97),rgba(0,20,50,0.97));
  border:1.5px solid var(--c-gold);border-radius:12px;padding:12px 20px;
  min-width:250px;max-width:90vw;z-index:500;pointer-events:none;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);text-align:center;
  box-shadow:0 4px 30px rgba(255,215,0,0.25);
}
#achievement-toast.show{transform:translateX(-50%) translateY(0);}
#ach-icon{font-size:24px;}
#ach-title{font-size:10px;color:var(--c-gold);font-family:var(--font-hud);letter-spacing:2px;margin:4px 0 2px;}
#ach-desc{font-size:11px;color:#cde;}

/* ─── LEADERBOARD PANEL ─── */
#leaderboard{
  position:absolute;left:8px;top:calc(var(--hud-top-h,62px) + 8px);
  width:120px;background:rgba(0,6,20,0.88);border:1px solid var(--border);
  border-radius:10px;padding:8px;pointer-events:none;
  display:none;
}
.lb-title{font-size:8px;color:var(--c-blue);font-family:var(--font-hud);letter-spacing:2px;margin-bottom:6px;text-align:center;}
.lb-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.lb-rank{font-size:9px;color:#4a9bc0;font-family:var(--font-hud);width:12px;}
.lb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lb-name{font-size:9px;color:#cde;flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-score{font-size:9px;color:var(--c-gold);font-family:var(--font-hud);}

/* ─── GAME OVER ─── */
#gameover{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:400;}
#gameover-box{
  background:rgba(0,5,20,0.98);border:2px solid rgba(255,215,0,0.4);border-radius:18px;
  padding:36px 50px;text-align:center;display:none;pointer-events:auto;
  box-shadow:0 0 60px rgba(255,215,0,0.1);max-width:90vw;
}
#go-title{font-size:28px;font-weight:900;color:var(--c-gold);margin-bottom:6px;font-family:var(--font-hud);}
#go-stats{font-size:12px;color:#7ab;margin-bottom:6px;font-family:var(--font-hud);}
#go-sub{font-size:11px;color:#558;margin-bottom:22px;}
#go-btn{background:linear-gradient(135deg,var(--c-gold),#ff9100);color:#000;border:none;padding:13px 32px;font-size:11px;font-weight:900;border-radius:8px;cursor:pointer;letter-spacing:2px;font-family:var(--font-hud);transition:all 0.2s;}
#go-btn:hover{filter:brightness(1.12);transform:scale(1.04);}

/* ─── JACKPOT WINNER ─── */
#jackpot-win{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:600;
  background:rgba(0,0,0,0.85);pointer-events:auto;
}
.jw-inner{
  text-align:center;animation:jackpotPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes jackpotPop{from{transform:scale(0.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.jw-glow{font-size:80px;animation:jackpotSpin 2s linear infinite;}
@keyframes jackpotSpin{to{filter:hue-rotate(360deg);}}
.jw-title{font-size:40px;font-weight:900;color:var(--c-gold);font-family:var(--font-hud);text-shadow:0 0 40px var(--c-gold);margin:10px 0;}
.jw-amount{font-size:60px;font-weight:900;color:#fff;font-family:var(--font-hud);text-shadow:0 0 30px var(--c-gold);}
.jw-btn{margin-top:20px;background:var(--c-gold);color:#000;border:none;padding:14px 36px;font-size:13px;font-weight:900;border-radius:10px;cursor:pointer;font-family:var(--font-hud);letter-spacing:2px;}

/* ─── MOBILE RESPONSIVE ─── */
@media(max-width:480px){
  .hud-cell{padding:3px 6px;min-width:52px;}
  .hud-val{font-size:12px;}.jackpot-val{font-size:14px;}
  .hud-label{font-size:6px;letter-spacing:1.5px;}
  .w-slot{width:48px;height:48px;}.w-slot .wico{font-size:18px;}
  .hud-btn{padding:5px 7px;font-size:8px;letter-spacing:0.5px;}
  #h-bet{font-size:14px;}
  .bet-btn{width:22px;height:22px;font-size:14px;}
  .shop-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
  #leaderboard{width:100px;}
  .lb-name{font-size:8px;}.lb-score{font-size:8px;}
  #gameover-box{padding:28px 30px;}
  .jw-title{font-size:28px;}.jw-amount{font-size:40px;}.jw-glow{font-size:60px;}
}
@media(max-width:360px){
  .hud-cell{min-width:44px;padding:2px 4px;}
  .hud-val{font-size:11px;}.jackpot-val{font-size:12px;}
  .hud-btn{font-size:7.5px;}
}

/* ─── SCROLLBAR ─── */
#shop-overlay::-webkit-scrollbar{width:6px;}
#shop-overlay::-webkit-scrollbar-track{background:rgba(0,10,30,0.5);}
#shop-overlay::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.3);border-radius:3px;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="floaters"></div>

<!-- ACHIEVEMENT TOAST -->
<div id="achievement-toast">
  <div id="ach-icon">🏆</div>
  <div id="ach-title">ACHIEVEMENT UNLOCKED</div>
  <div id="ach-desc">First Kill!</div>
</div>

<!-- COMBO DISPLAY -->
<div id="combo-display"></div>

<!-- UI -->
<div id="ui">
  <div class="hud-top" id="hud-top-bar">
    <div class="hud-cell">
      <div class="hud-label">SALDO</div>
      <div class="hud-val gold" id="h-bal">10,000</div>
    </div>
    <div class="hud-cell" style="border-color:rgba(0,255,170,0.2);background:rgba(0,255,136,0.03);">
      <div class="hud-label">WIN</div>
      <div class="hud-val green" id="h-win">0</div>
    </div>
    <div class="hud-cell jackpot-cell">
      <div class="hud-label">🏆 JACKPOT</div>
      <div class="jackpot-val" id="h-jack">9,999,999</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">LEVEL</div>
      <div class="hud-val blue" id="h-lvl">1</div>
    </div>
    <div class="hud-cell" style="cursor:pointer;pointer-events:auto;" onclick="openShop()">
      <div class="hud-label">SHOP</div>
      <div class="hud-val" style="font-size:18px;">🏪</div>
    </div>
  </div>

  <div id="sp-bar"><div id="sp-label">DRILL</div><div id="sp-track"><div id="sp-fill"></div></div></div>

  <div id="streak-bar">
    <div id="streak-count"></div>
    <div style="display:flex;gap:3px;" id="streak-pips"></div>
  </div>

  <!-- MINI MAP -->
  <div id="minimap"><canvas id="minimap-canvas" width="80" height="50"></canvas></div>

  <!-- LEADERBOARD -->
  <div id="leaderboard">
    <div class="lb-title">RANKING</div>
    <div id="lb-rows"></div>
  </div>

  <div id="weapon-row"></div>

  <div style="flex:1;"></div>

  <div class="hud-bot" id="hud-bot-bar">
    <button class="hud-btn" id="btn-auto" onclick="toggleAuto()">⚡AUTO</button>
    <div class="bet-group">
      <div class="hud-label" style="font-size:6px;">BET</div>
      <div class="bet-ctrl">
        <div class="bet-btn" onclick="changeBet(-10)">−</div>
        <span id="h-bet">10</span>
        <div class="bet-btn" onclick="changeBet(10)">+</div>
      </div>
    </div>
    <button class="hud-btn gold" onclick="changeBet(0,'max')">MAX</button>
    <button class="hud-btn" id="btn-lb" onclick="toggleLeaderboard()">🏅LB</button>
    <button class="hud-btn" style="border-color:rgba(192,64,255,0.5);color:var(--c-purple);background:rgba(192,64,255,0.06);" onclick="openShop()">🏪 SHOP</button>
  </div>
</div>

<!-- SHOP -->
<div id="shop-overlay">
  <div id="shop-box">
    <div class="shop-header">
      <div class="shop-title">⚓ ARMORY</div>
      <div class="shop-balance">💰 <span id="sh-bal">0</span></div>
      <button class="shop-close" onclick="closeShop()">✕</button>
    </div>
    <div class="shop-tabs">
      <div class="shop-tab active" onclick="shopTab('weapons')">⚔️ SENJATA</div>
      <div class="shop-tab" onclick="shopTab('upgrades')">⬆️ UPGRADE</div>
      <div class="shop-tab" onclick="shopTab('buffs')">✨ BUFF</div>
      <div class="shop-tab" onclick="shopTab('missions')">📋 MISI</div>
    </div>
    <div id="shop-content" class="shop-grid"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div id="gameover-box">
    <div id="go-title">GAME OVER</div>
    <div id="go-stats"></div>
    <div id="go-sub">Saldo habis. Kunjungi Armory untuk persiapan!</div>
    <button id="go-btn" onclick="restartGame()">🎮 MAIN LAGI</button>
  </div>
</div>

<!-- JACKPOT WIN -->
<div id="jackpot-win">
  <div class="jw-inner">
    <div class="jw-glow">🌟</div>
    <div class="jw-title">JACKPOT!!!</div>
    <div class="jw-amount" id="jw-amount">+999,999</div>
    <button class="jw-btn" onclick="closeJackpot()">KLAIM HADIAH</button>
  </div>

// ── FISH CLASS ─────────────────────────────────────────
class Fish {
  constructor(){ this.init(); }
  init(overType){
    const t = overType ? FISH_TYPES.find(x=>x.id===overType)||pickFishType() : pickFishType();
    Object.assign(this, {
      id:t.id, hp:t.hp, maxHp:t.hp, val:t.val,
      baseSpeed:t.speed, size:t.size, color:t.color, glow:t.glow,
      dir:Math.random()>0.5?1:-1, wave:Math.random()*Math.PI*2,
      waveAmp:8+Math.random()*14, waveFreq:0.018+Math.random()*0.02,
      tailPh:Math.random()*Math.PI*2, alive:true, flash:0, frozen:0,
    });
    this.x = this.dir===1 ? -90 : W+90;
    this.baseY = (hudTopH+40) + Math.random()*(H - hudTopH - hudBotH - 130);
    this.y = this.baseY;
    if(this.id==='jackpot') this.countUp = 100+Math.floor(Math.random()*400);
  }
  get speed(){ return frozenFish.has(this) ? this.baseSpeed*0.2 : this.baseSpeed; }
  update(){
    this.x += this.speed*this.dir;
    this.y = this.baseY + Math.sin(frameCount*this.waveFreq+this.wave)*this.waveAmp;
    this.tailPh += 0.15;
    if(this.id==='jackpot' && frameCount%20===0) this.countUp += Math.floor(10+Math.random()*15);
    if(this.flash>0) this.flash--;
    if(this.frozen>0) this.frozen--;
    if(this.frozen===0) frozenFish.delete(this);
    const marginX = this.size+90, marginY = this.size+90;
    if((this.dir===1&&this.x>W+marginX)||(this.dir===-1&&this.x<-marginX)) this.init();
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    const fl = this.dir===-1?-1:1;
    ctx.scale(fl, 1);
    if(this.flash>0) ctx.globalAlpha = 0.4+0.6*Math.sin(this.flash*1.0);
    ctx.shadowBlur = 20+Math.sin(frameCount*0.05)*7;
    ctx.shadowColor = this.frozen>0 ? '#80d8ff' : this.glow;

    // Body
    ctx.beginPath(); ctx.ellipse(0,0,this.size,this.size*0.54,0,0,Math.PI*2);
    ctx.fillStyle = this.frozen>0 ? '#b3e5fc' : this.color; ctx.fill();

    // Tail
    const tw = Math.sin(this.tailPh)*11;
    ctx.beginPath(); ctx.moveTo(-this.size+4,0);
    ctx.lineTo(-this.size-20,-13+tw); ctx.lineTo(-this.size-20,13+tw);
    ctx.closePath(); ctx.fillStyle = this.frozen>0 ? '#b3e5fc' : this.color; ctx.fill();

    // Fin
    ctx.beginPath();
    ctx.moveTo(-this.size*0.2,-this.size*0.54); ctx.lineTo(this.size*0.1,-this.size*0.9);
    ctx.lineTo(this.size*0.4,-this.size*0.54); ctx.fillStyle = this.frozen>0 ? '#b3e5fc' : this.color; ctx.fill();

    ctx.shadowBlur = 0;

    // Eye
    ctx.beginPath(); ctx.arc(this.size*0.44,-this.size*0.1,this.size*0.14,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(this.size*0.46,-this.size*0.1,this.size*0.075,0,Math.PI*2);
    ctx.fillStyle='#111'; ctx.fill();

    // Icons
    const ICONS = {drill:'⚡',bomb:'💣',roulette:'🎰',random:'🎁',boss:'👑',twin:'✦',ghost:'👻',electric:'⚡'};
    if(ICONS[this.id]){
      ctx.fillStyle='rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(0,0,this.size*0.65,this.size*0.38,0,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.scale(fl,1); ctx.font=`${Math.floor(this.size*0.44)}px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(ICONS[this.id],0,2); ctx.restore();
    }
    if(this.id==='jackpot'){
      ctx.scale(fl,1); ctx.shadowBlur=0;
      ctx.fillStyle='#ffd700'; ctx.font='bold 12px Orbitron,Arial';
      ctx.textAlign='center'; ctx.fillText('+'+this.countUp,0,-this.size-12);
    }
    // Frost effect
    if(this.frozen>0){
      ctx.globalAlpha=0.3; ctx.strokeStyle='#80d8ff'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,this.size+5,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();

    // HP bar
    if(this.maxHp>5){
      const bw=this.size*1.7, bh=5, bx=this.x-bw/2, by=this.y-this.size-24;
      const pct=this.hp/this.maxHp;
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=pct>0.5?'#4caf50':pct>0.25?'#ffc107':'#f44336';
      ctx.fillRect(bx,by,bw*pct,bh);
    }
  }
}

// ── BULLET CLASS ───────────────────────────────────────
class Bullet {
  constructor(ox,oy,ang,wDef,ownerId){
    this.x=ox; this.y=oy;
    const spd = wDef.plasma ? 8 : wDef.minigun ? 18 : 15;
    this.vx=Math.cos(ang)*spd; this.vy=Math.sin(ang)*spd;
    this.wDef=wDef; this.ownerId=ownerId; this.alive=true;
    this.trail=[]; this.piercedFish=new Set();
    this.piercing=!!wDef.piercing; this.explosive=!!wDef.explosive;
    this.plasma=!!wDef.plasma; this.nuke=!!wDef.nuke;
    this.frost=!!wDef.frost; this.chain=!!wDef.chain;
  }
  dmg(){
    let base = this.wDef.dmg;
    if(this.ownerId===0) base *= (1 + upgrades.dmg*0.2);
    return base;
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12) this.trail.shift();
    this.x+=this.vx; this.y+=this.vy;
    if(this.x<-20||this.x>W+20||this.y<-20||this.y>H+20){ this.alive=false; return; }
    for(let f of fishes){
      if(!f.alive||this.piercedFish.has(f)) continue;
      if(Math.hypot(this.x-f.x,this.y-f.y)<f.size+9){
        const dmgVal = this.dmg();
        f.hp-=dmgVal; f.flash=9;
        if(this.frost){ f.frozen=120; frozenFish.add(f); spawnIceParticles(this.x,this.y); }
        spawnHitSpark(this.x,this.y, players[this.ownerId].color);
        if(this.explosive) explodeAt(this.x,this.y, 90*(1+upgrades.radius*0.15), dmgVal*2, this.ownerId);
        if(this.plasma)    explodeAt(this.x,this.y, 130*(1+upgrades.radius*0.15), dmgVal*3, this.ownerId);
        if(this.nuke)      nukeAll(this.ownerId);
        if(this.chain)     chainLightning(f, this.ownerId, dmgVal);
        if(f.hp<=0) killFish(f, this.ownerId);
        if(this.piercing){ this.piercedFish.add(f); }
        else { this.alive=false; return; }
      }
    }
  }
  draw(){
    const oc = players[this.ownerId].color;
    // Trail
    for(let i=0;i<this.trail.length;i++){
      const a=(i/this.trail.length)*0.55;
      const sz=3*(i/this.trail.length);
      ctx.save(); ctx.globalAlpha=a; ctx.shadowBlur=8; ctx.shadowColor=oc;
      ctx.beginPath(); ctx.arc(this.trail[i].x,this.trail[i].y,sz,0,Math.PI*2);
      ctx.fillStyle=oc; ctx.fill(); ctx.restore();
    }
    // Bullet
    ctx.save();
    const sz=this.plasma?10:this.explosive?9:this.piercing?7:this.nuke?13:5;
    ctx.shadowBlur=22; ctx.shadowColor=oc;
    ctx.beginPath(); ctx.arc(this.x,this.y,sz,0,Math.PI*2);
    ctx.fillStyle=oc; ctx.fill();
    if(this.plasma||this.nuke){
      ctx.beginPath(); ctx.arc(this.x,this.y,sz*1.7,0,Math.PI*2);
      ctx.strokeStyle=oc; ctx.lineWidth=1.5; ctx.globalAlpha=0.35; ctx.stroke();
    }
    ctx.restore();
  }
}

// ── LASER CLASS ───────────────────────────────────────
class Laser {
  constructor(ox,oy,ang,ownerId){
    this.ox=ox; this.oy=oy; this.ang=ang; this.ownerId=ownerId; this.life=20;
    const len=Math.max(W,H)*1.6;
    const dx=Math.cos(ang), dy=Math.sin(ang);
    for(let f of fishes){
      if(!f.alive) continue;
      const fx=f.x-ox, fy=f.y-oy;
      const proj=fx*dx+fy*dy;
      if(proj<0) continue;
      const perp=Math.abs(fx*dy-fy*dx);
      if(perp<f.size+12){
        const d=3*(ownerId===0?1+upgrades.dmg*0.2:1);
        f.hp-=d; f.flash=10; spawnHitSpark(f.x,f.y,players[ownerId].color);
        if(f.hp<=0) killFish(f,ownerId);
      }
    }
  }
  update(){ this.life--; }
  draw(){
    if(this.life<=0) return;
    const a=this.life/20;
    const oc=players[this.ownerId].color;
    ctx.save(); ctx.globalAlpha=a;
    ctx.shadowBlur=35; ctx.shadowColor=oc;
    ctx.strokeStyle=oc; ctx.lineWidth=4+a*5;
    ctx.beginPath();
    ctx.moveTo(this.ox,this.oy);
    ctx.lineTo(this.ox+Math.cos(this.ang)*Math.max(W,H)*1.6,
               this.oy+Math.sin(this.ang)*Math.max(W,H)*1.6);
    ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  }
}

// ── CHAIN LIGHTNING ───────────────────────────────────
function chainLightning(originFish, ownerId, dmg, depth=0){
  if(depth>3) return;
  const nearby = fishes.filter(f=>f.alive&&f!==originFish&&Math.hypot(f.x-originFish.x,f.y-originFish.y)<160);
  if(!nearby.length) return;
  const target = nearby[Math.floor(Math.random()*nearby.length)];
  chainLightnings.push({x1:originFish.x,y1:originFish.y,x2:target.x,y2:target.y,life:12});
  target.hp -= dmg*0.6; target.flash=8;
  spawnHitSpark(target.x,target.y,'#ffd740');
  if(target.hp<=0) killFish(target,ownerId);
  else chainLightning(target,ownerId,dmg*0.6,depth+1);
}

// ── ROULETTE ──────────────────────────────────────────
const ROULETTE_PRIZES=[
  {label:'2×',mult:2,color:'#4caf50'},{label:'5×',mult:5,color:'#8bc34a'},
  {label:'10×',mult:10,color:'#ffd700'},{label:'20×',mult:20,color:'#ff9800'},
  {label:'50×',mult:50,color:'#ff5722'},{label:'JACKPOT',mult:200,color:'#e91e63'},
  {label:'3×',mult:3,color:'#009688'},{label:'MISS',mult:0,color:'#607d8b'},
];
class InWorldRoulette {
  constructor(x,y,ownerId,isRandom){
    this.x=x; this.y=y; this.ownerId=ownerId; this.isRandom=isRandom;
    this.angle=0; this.speed=0.5; this.done=false; this.result=null;
    this.doneTimer=-1; this.prizes=ROULETTE_PRIZES;
    this.spins = 120 + Math.floor(Math.random()*80);
  }
  update(){
    if(!this.done){
      this.angle+=this.speed; this.speed*=0.988; this.spins--;
      if(this.spins<=0||this.speed<0.02){ this.done=true; this._giveResult(); }
    } else {
      this.doneTimer++;
    }
  }
  _giveResult(){
    this.result=this.prizes[Math.floor(Math.random()*this.prizes.length)];
    const owner=players[this.ownerId];
    const win=this.result.mult*owner.bet;
    if(win>0){
      owner.bal+=win;
      if(this.ownerId===0){ totalWin+=win; updateMissionProgress('win',win); updateUI(); }
      floatText('+'+win,this.x,this.y-55,owner.color,22);
      spawnCoins(this.x,this.y,10,owner);
    } else { floatText('MISS!',this.x,this.y-50,'#aaa',18); }
  }
  draw(){
    ctx.save(); ctx.translate(this.x,this.y);
    const R=44;
    const seg=(Math.PI*2)/this.prizes.length;
    for(let i=0;i<this.prizes.length;i++){
      const a=this.angle+i*seg;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,a,a+seg); ctx.closePath();
      ctx.fillStyle=this.prizes[i].color; ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.stroke();
    }
    for(let i=0;i<this.prizes.length;i++){
      const a=this.angle+i*seg+seg/2;
      ctx.save(); ctx.translate(Math.cos(a)*R*0.65,Math.sin(a)*R*0.65);
      ctx.rotate(a+Math.PI/2); ctx.fillStyle='#fff'; ctx.font='bold 8px Orbitron,Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.prizes[i].label,0,0); ctx.restore();
    }
    ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.moveTo(0,-R-3); ctx.lineTo(-7,-R+9); ctx.lineTo(7,-R+9); ctx.closePath(); ctx.fill();
    if(this.done&&this.result){
      ctx.shadowBlur=12; ctx.shadowColor=this.result.color;
      ctx.fillStyle=this.result.color; ctx.font='bold 15px Orbitron'; ctx.textAlign='center';
      ctx.fillText(this.result.label,0,-R-16);
    } else {
      ctx.fillStyle='#fff'; ctx.font='bold 11px Orbitron'; ctx.textAlign='center';
      ctx.fillText(this.isRandom?'LUCKY BOX':'ROULETTE',0,-R-14);
    }
    ctx.restore();
  }
}

function explodeAt(x,y,radius,dmg,ownerId){

  if(ownerId===0) shakeScreen(10);
  for(let f of fishes){

    if(d<radius+f.size){ f.hp-=dmg*(1-d/(radius+f.size)*0.4); f.flash=14; if(f.hp<=0) killFish(f,ownerId); }
  }
}

// ── KILL FISH ─────────────────────────────────────────
function killFish(f,ownerId){
  if(!f.alive) return; f.alive=false;
  const owner=players[ownerId];

  spawnExplosion(f.x,f.y,f.glow);
  spawnCoins(f.x,f.y,f.id==='boss'?14:f.id==='jackpot'?10:5,owner);
  owner.totalKills++;
  if(ownerId===0){ totalKills++; checkAchievements(); }

  // Drill/Bomb
  if(f.id==='drill'||f.id==='bomb'){
    floatText('💥 BOOM!',f.x,f.y,'#ff2266',22);
    explodeAt(f.x,f.y,270*(1+upgrades.radius*0.15),12,ownerId);
    f.init(); return;
  }
  // Roulette / Random
  if(f.id==='roulette'){ inWorldRoulettes.push(new InWorldRoulette(f.x,f.y,ownerId,false)); f.init(); return; }
  if(f.id==='random'){   inWorldRoulettes.push(new InWorldRoulette(f.x,f.y,ownerId,true)); f.init(); return; }
  // Twin
  if(f.id==='twin'){
    for(let i=0;i<2;i++){const nf=new Fish();nf.init('small');nf.x=f.x+(i-0.5)*36;nf.y=f.y;fishes.push(nf);}
  }

  // Combo system (player only)
  if(ownerId===0){
    comboKills++;
    const comboTime = buffs.comboMaster ? 200 : 120;
    comboTimer = comboTime;
    if(comboKills>=2) showCombo(comboKills);
    if(comboKills>=5) updateMissionProgress('combo', comboKills);
    if(comboKills>=5 && !ACHIEVEMENTS.combo_x5.done) unlockAchievement('combo_x5');
    if(comboKills>=10 && !ACHIEVEMENTS.combo_x10.done) unlockAchievement('combo_x10');
  }

  // Jackpot fish
  let win=0;
  if(f.id==='jackpot'){
    win=f.countUp;
    jackpotPool=Math.max(0,jackpotPool-win);
    updateJackpot();
    if(ownerId===0){
      showJackpotWin(win);
      if(!ACHIEVEMENTS.jackpot_hit.done) unlockAchievement('jackpot_hit');
      updateMissionProgress('jackpot',1);
    } else {
      floatText('JACKPOT! +'+win,f.x,f.y-30,'#ffd700',22);
    }
  } else {
    const goldMod=(ownerId===0&&buffs.goldFish)?1.5:1.0;
    const wid=equippedSlots.find(s=>s!==null)||'single';
    const winMod=ownerId===0?(WEAPON_DEFS[wid]?.winMod||1.0):1.0;
    const wrBonus=ownerId===0?(1+upgrades.winrate*0.05):1;
    const comboMod=ownerId===0?Math.max(1,(comboKills*0.08)+1):1;
    win=Math.floor(f.val*(owner.bet/10)*winMod*goldMod*wrBonus*comboMod);
  }

  owner.bal+=win; owner.totalWin+=win;
  if(ownerId===0){
    totalWin+=win;
    updateMissionProgress('win',win);
    updateMissionProgress(f.id,1);
    checkAchievements();
    updateUI();
  }
  if(win>0) floatText('+'+win,f.x,f.y-20,owner.color,16);
  f.init();
}

// ── SHOOT ─────────────────────────────────────────────
function performShoot(player, ang){
  let wDef=WEAPON_DEFS['single'];
  if(!player.isBot){
    const slot=equippedSlots[activeSlot]||'single';
    wDef=WEAPON_DEFS[slot]||WEAPON_DEFS['single'];
  }
  const cost=(player.id===0&&buffs.autoReload&&player.bal<300)?0:player.bet;
  if(player.bal<cost) return;
  player.bal-=cost;
  player.ang=ang; player.fireCount++;
  if(player.id===0) updateUI();

  if(wDef.id==='laser'){
    lasers.push(new Laser(player.x,player.y,ang,player.id));
    spawnHitSpark(player.x,player.y,player.color); return;
  }
  const multi=wDef.multi||1;
  const spread=wDef.id==='shotgun'?0.26:wDef.id==='triple'?0.24:wDef.id==='double'?0.12:0;
  for(let i=0;i<multi;i++){
    const off=multi>1?spread*(i-(multi-1)/2):0;
    bullets.push(new Bullet(player.x,player.y,ang+off,wDef,player.id));
  }
  spawnParticle(player.x,player.y,player.color,2,0.4);
}

function shootMainPlayer(){
  if(gameOver) return;
  const rateBonus=1+upgrades.rate*0.15;
  const fireDelay=Math.max(40,130/rateBonus);
  const now=performance.now();
  if(now-lastFire<fireDelay) return;
  lastFire=now;
  const ang=Math.atan2(mouse.y-players[0].y,mouse.x-players[0].x);
  performShoot(players[0],ang);
}

// ── BOT AI ────────────────────────────────────────────
const botCooldowns=[0,0,0,0,0,0];
function updateBots(){
  players.forEach((p,idx)=>{
    if(!p.isBot||gameOver) return;
    botCooldowns[idx]--;
    if(botCooldowns[idx]>0) return;
    botCooldowns[idx] = 40+idx*8+Math.floor(Math.random()*20);
    const liveFish=fishes.filter(f=>f.alive&&f.x>80&&f.x<W-80);
    if(!liveFish.length) return;
    // Bots prefer high-value targets
    const target=liveFish.sort((a,b)=>b.val-a.val)[Math.floor(Math.random()*Math.min(3,liveFish.length))];
    let ang=Math.atan2(target.y-p.y,target.x-p.x);
    ang+=(Math.random()-0.5)*0.18;
    if(p.bal<p.bet) p.bal+=200;
    performShoot(p,ang);
  });
}

// ── DRAW CANNONS ─────────────────────────────────────
function drawCannons(){
  players.forEach(p=>{
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowBlur=20; ctx.shadowColor=p.color;
    // Base
    ctx.fillStyle='#071828';
    ctx.beginPath(); ctx.ellipse(0,0,42,21,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=p.color; ctx.lineWidth=2; ctx.stroke();
    // Barrel(s)
    ctx.rotate(p.ang);
    const bCount=p.id===0?equippedSlots.filter(s=>s!==null).length:1;
    for(let i=0;i<bCount;i++){
      const off=bCount>1?(i-(bCount-1)/2)*10:0;
      ctx.fillStyle='#1a3b50';
      ctx.beginPath(); ctx.rect(0,off-7,52,14); ctx.fill();
      ctx.strokeStyle=p.color; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.rect(42,off-9,16,18); ctx.fill();
    }
    ctx.restore();
    // Core
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowBlur=25; ctx.shadowColor=p.color;
    ctx.fillStyle='#0d2a3c';
    ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=p.color; ctx.lineWidth=2.5; ctx.stroke();
    // Inner glow
    const rg=ctx.createRadialGradient(0,0,2,0,0,18);
    rg.addColorStop(0,p.color+'55'); rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // Bot label
    if(p.isBot){
      ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='bold 9px Exo 2';
      ctx.textAlign='center';
      const ty=p.y<H/2?-30:30;
      ctx.fillText('💰'+Math.floor(p.bal),0,ty);
    }
    ctx.restore();
  });
}

// ── BACKGROUND ────────────────────────────────────────
const bubbles=[];
for(let i=0;i<40;i++) bubbles.push({x:Math.random()*3000,y:Math.random()*1000,r:1+Math.random()*3.5,s:0.25+Math.random()*0.6,phase:Math.random()*Math.PI*2});
const seaWeed=[];
for(let i=0;i<12;i++) seaWeed.push({x:Math.random()*0.9+0.05,h:30+Math.random()*50,phase:Math.random()*Math.PI*2,color:`hsl(${140+Math.random()*30},60%,${25+Math.random()*15}%)`});

function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000d22'); g.addColorStop(0.4,'#001530'); g.addColorStop(0.8,'#000f25'); g.addColorStop(1,'#00080f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Light shafts
  ctx.save(); ctx.globalAlpha=0.04;
  for(let i=0;i<7;i++){
    const rx=W*0.5+Math.cos(i*1.1+frameCount*0.0018)*W*0.38;
    const shG=ctx.createLinearGradient(rx,0,rx+70,H);
    shG.addColorStop(0,'rgba(0,180,255,0.9)'); shG.addColorStop(1,'transparent');
    ctx.fillStyle=shG;
    ctx.beginPath(); ctx.moveTo(rx-20,0); ctx.lineTo(rx+110,H); ctx.lineTo(rx-80,H); ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // Seaweed at bottom
  for(let sw of seaWeed){
    const bx=sw.x*W, by=H-hudBotH+2;
    ctx.save(); ctx.strokeStyle=sw.color; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(bx,by);
    for(let j=1;j<=6;j++){
      const sway=Math.sin(frameCount*0.025+sw.phase+j*0.5)*12;
      ctx.quadraticCurveTo(bx+sway,by-j*(sw.h/6)+sw.h*0.05,bx+sway*0.5,by-j*(sw.h/6));
    }
    ctx.stroke(); ctx.restore();
  }

  // Bubbles
  ctx.save();
  for(let b of bubbles){
    b.y-=b.s; b.x+=Math.sin(frameCount*0.012+b.phase)*0.4;
    if(b.y<-10){b.y=H+10;b.x=Math.random()*W;}
    ctx.globalAlpha=0.1+Math.sin(frameCount*0.03+b.phase)*0.04;
    ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
    // Glint
    ctx.globalAlpha=0.18; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.25,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Underwater scan line effect (subtle)
  ctx.save(); ctx.globalAlpha=0.015;
  const scanY=(frameCount*0.7)%(H);
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,scanY); ctx.lineTo(W,scanY); ctx.stroke();
  ctx.restore();
}

// ── DRAW CHAIN LIGHTNINGS ────────────────────────────
function drawChainLightnings(){
  for(let i=chainLightnings.length-1;i>=0;i--){
    const cl=chainLightnings[i];
    ctx.save(); ctx.globalAlpha=cl.life/12;
    ctx.shadowBlur=15; ctx.shadowColor='#ffd740';
    ctx.strokeStyle='#ffd740'; ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(cl.x1,cl.y1); ctx.lineTo(cl.x2,cl.y2); ctx.stroke();
    ctx.restore();
    cl.life--;
    if(cl.life<=0) chainLightnings.splice(i,1);
  }
}

      const w=WEAPON_DEFS[wid]; const owned=!!inventory[wid]; const equipped=equippedSlots.includes(wid);
      const card=document.createElement('div');
      card.className='shop-card'+(equipped?' equipped':owned?' owned':'');
      let btn='';
      if(equipped) btn=`<button class="card-btn equipped-tag" onclick="unequipWeapon('${wid}')">✓ EQUIPPED</button>`;
      else if(owned) btn=`<button class="card-btn equip" onclick="equipWeapon('${wid}')">EQUIP</button>`;
      else btn=`<button class="card-btn buy" onclick="buyWeapon('${wid}')">💰 ${w.price.toLocaleString()}</button>`;
      card.innerHTML=`<div class="card-ico">${w.ico}</div><div class="card-name">${w.name}</div><div class="card-stat">DMG: ${w.dmg} | MULTI: ${w.multi||1}<br><span style="color:#3a7a9a;font-size:7.5px;">${w.desc}</span></div>${btn}`;
      c.appendChild(card);
    }
  } else if(shopTabActive==='upgrades'){
    c.style.gridTemplateColumns='repeat(auto-fill,minmax(145px,1fr))';
    for(let upg of UPGRADE_DEFS){
      const cur=upgrades[upg.id]||0, maxed=cur>=upg.max, price=maxed?0:upg.prices[cur];
      const card=document.createElement('div'); card.className='shop-card'+(maxed?' owned':'');
      card.innerHTML=`<div class="card-ico">${upg.ico}</div><div class="card-name">${upg.name}</div><div class="card-stat">${upg.desc}<br>Level: ${cur}/${upg.max}</div><button class="card-btn ${maxed?'maxed':'buy'}" onclick="${maxed?'':(`buyUpgrade('${upg.id}')`)}">  ${maxed?'MAX LEVEL':'💰 '+price.toLocaleString()}</button>`;
      c.appendChild(card);
    }
  } else if(shopTabActive==='buffs'){
    c.style.gridTemplateColumns='repeat(auto-fill,minmax(145px,1fr))';
    for(let buf of BUFF_DEFS){
      const owned=!!buffs[buf.id];
      const card=document.createElement('div'); card.className='shop-card'+(owned?' owned':'');
      card.innerHTML=`<div class="card-ico">${buf.ico}</div><div class="card-name">${buf.name}</div><div class="card-stat">${buf.desc}</div><button class="card-btn ${owned?'equipped-tag':'buy'}" onclick="${owned?'':(`buyBuff('${buf.id}')`)}">  ${owned?'✓ AKTIF':'💰 '+buf.price.toLocaleString()}</button>`;
      c.appendChild(card);
    }
  } else if(shopTabActive==='missions'){
    c.style.gridTemplateColumns='1fr';
    MISSIONS.forEach(m=>{
      const card=document.createElement('div'); card.className='shop-card'+(m.done?' owned':'');
      const pct=Math.min(1,m.prog/m.goal);
      const bar=`<div style="width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin:6px 0 4px;overflow:hidden;"><div style="width:${(pct*100).toFixed(0)}%;height:100%;background:${m.done?'#00ffaa':'#00e5ff'};border-radius:3px;transition:width 0.3s;"></div></div>`;
      card.innerHTML=`<div style="display:flex;align-items:center;gap:10px;text-align:left;"><div style="font-size:22px;">${m.done?'✅':'📋'}</div><div style="flex:1;"><div class="card-name" style="text-align:left;">${m.desc}</div><div class="card-stat" style="text-align:left;">${m.done?'SELESAI':`${Math.min(m.prog,m.goal)}/${m.goal}`} — Reward: 💰${m.reward}</div>${bar}</div></div>`;
      c.appendChild(card);
    });
  }
}

function buyWeapon(wid){
  if(players[0].bal<WEAPON_DEFS[wid].price){floatText('Saldo kurang!',W/2,H/2,'#ff2266',18);return;}
  players[0].bal-=WEAPON_DEFS[wid].price; inventory[wid]=true; updateUI(); renderShop(); checkAchievements();
}
function equipWeapon(wid){
  const idx=equippedSlots.indexOf(null);
  if(idx!==-1) equippedSlots[idx]=wid; else equippedSlots[activeSlot]=wid;
  renderWeaponRow(); renderShop();
}
function unequipWeapon(wid){
  const idx=equippedSlots.indexOf(wid);
  if(idx!==-1) equippedSlots[idx]=null;
  if(!equippedSlots.some(s=>s)) equippedSlots[0]='single';
  renderWeaponRow(); renderShop();
}
function buyUpgrade(id){
  const upg=UPGRADE_DEFS.find(u=>u.id===id); const cur=upgrades[id]||0;
  if(cur>=upg.max) return;
  const price=upg.prices[cur];
  if(players[0].bal<price){floatText('Saldo kurang!',W/2,H/2,'#ff2266',18);return;}
  players[0].bal-=price; upgrades[id]++; updateUI(); renderShop();
}
function buyBuff(id){
  const buf=BUFF_DEFS.find(b=>b.id===id);
  if(!buf||players[0].bal<buf.price){floatText('Saldo kurang!',W/2,H/2,'#ff2266',18);return;}
  players[0].bal-=buf.price; buffs[id]=true; updateUI(); renderShop();
}

// ── UI UPDATES ────────────────────────────────────────
function updateUI(){
  document.getElementById('h-bal').textContent=Math.floor(players[0].bal).toLocaleString();
  document.getElementById('h-win').textContent=Math.floor(totalWin).toLocaleString();
  document.getElementById('h-lvl').textContent=level;
  document.getElementById('h-bet').textContent=players[0].bet;
  if(buffs.shieldX2&&players[0].bal<150) players[0].bal=150;
}
function updateJackpot(){ document.getElementById('h-jack').textContent=jackpotPool.toLocaleString(); }

// ── GAME OVER ─────────────────────────────────────────
function showGameOver(){
  if(gameOver) return; gameOver=true;
  document.getElementById('go-stats').textContent=`Ikan: ${totalKills} | Win: ${totalWin.toLocaleString()} | Level: ${level}`;
  document.getElementById('gameover-box').style.display='block';
}
function restartGame(){
  players[0].bal=10000; totalWin=0; level=1; players[0].bet=10; gameOver=false; autoFire=false;
  comboKills=0; comboTimer=0; totalKills=0; nukeFlash=0;
  bullets.length=0; _particles.length=0; lasers.length=0; inWorldRoulettes.length=0; chainLightnings.length=0;
  frozenFish.clear();
  document.getElementById('btn-auto').textContent='⚡AUTO'; document.getElementById('btn-auto').classList.remove('on');
  document.getElementById('gameover-box').style.display='none';
  // Reset missions partially
  MISSIONS.forEach(m=>{ if(!m.done){ m.prog=0; } });
  for(let f of fishes) f.init();
  updateUI(); updateJackpot();
}
function toggleAuto(){
  autoFire=!autoFire;
  const b=document.getElementById('btn-auto');
  b.textContent=autoFire?'⚡AUTO ON':'⚡AUTO';
  b.classList.toggle('on',autoFire);
}
function changeBet(d,type){
  if(type==='max') players[0].bet=Math.min(players[0].bal,500);
  else players[0].bet=Math.max(10,Math.min(500,players[0].bet+d));
  document.getElementById('h-bet').textContent=players[0].bet;
}

// ── MAIN GAME LOOP ────────────────────────────────────
let lastLoopTime=0;
function loop(ts){
  if(!ts) ts=performance.now();
  const dt=ts-lastLoopTime;
  if(dt<14){ requestAnimationFrame(loop); return; }
  lastLoopTime=ts;
  frameCount++;

  // Screen shake
  if(shakeAmt>0.5){
    shakeX=(Math.random()-0.5)*shakeAmt; shakeY=(Math.random()-0.5)*shakeAmt;
    shakeAmt*=0.78;
  } else { shakeX=0; shakeY=0; shakeAmt=0; }

  ctx.save();
  if(shakeX||shakeY) ctx.translate(shakeX,shakeY);

  ctx.clearRect(-shakeAmt-2,-shakeAmt-2,W+shakeAmt*2+4,H+shakeAmt*2+4);
  drawBG();

  // Nuke flash
  if(nukeFlash>0){
    ctx.save(); ctx.globalAlpha=nukeFlash/30*0.6; ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H); ctx.restore();
    nukeFlash--;
  }

  // Fishes
  for(let f of fishes){ if(f.alive){f.update();f.draw();} }

  // Roulettes
  for(let i=inWorldRoulettes.length-1;i>=0;i--){
    const r=inWorldRoulettes[i]; r.update(); r.draw();
    if(r.done&&r.doneTimer>80) inWorldRoulettes.splice(i,1);
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){ bullets[i].update(); bullets[i].draw(); if(!bullets[i].alive) bullets.splice(i,1); }

  // Lasers
  for(let i=lasers.length-1;i>=0;i--){ lasers[i].update(); lasers[i].draw(); if(lasers[i].life<=0) lasers.splice(i,1); }

  // Chain lightnings
  drawChainLightnings();

  // Particles
  for(let i=_particles.length-1;i>=0;i--){
    const p=_particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.022;
    const a=Math.max(0,p.life/p.maxLife);
    if(p.isCoin&&p.life<0.5&&players[p.ownerId]){
      const op=players[p.ownerId]; p.x+=(op.x-p.x)*0.18; p.y+=(op.y-p.y)*0.18;
    }
    ctx.save(); ctx.globalAlpha=a; ctx.shadowBlur=6; ctx.shadowColor=p.color;
    if(p.isCoin){
      ctx.fillStyle=p.color; ctx.beginPath();
      ctx.ellipse(p.x,p.y,p.size,p.size*0.5,p.rotate+frameCount*0.12,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    if(p.life<=0) _particles.splice(i,1);
  }

  drawCannons();
  ctx.restore();

  // Combo timer
  if(comboTimer>0){
    comboTimer--;
    if(comboTimer===0){ comboKills=0; hideCombo(); }
  }

  // Mini-map & leaderboard (every 3 frames)
  if(frameCount%3===0){
    drawMiniMap();
    if(showLB) updateLeaderboard();
  }

  // Streak UI (every 5 frames)
  if(frameCount%5===0) updateStreakUI();

  // Bot AI
  updateBots();

  // Player auto-fire
  if(autoFire&&!gameOver){
    const slot=equippedSlots[activeSlot]||'single';
    const wDef=WEAPON_DEFS[slot];
    if(wDef?.minigun){ shootMainPlayer(); }
    else if(frameCount%9===0){ shootMainPlayer(); }
  }

  // Jackpot growth
  if(frameCount%120===0&&jackpotPool<9999999){ jackpotPool+=Math.floor(Math.random()*80+30); updateJackpot(); }

  // Level up
  if(totalWin>level*800){ level++; floatText(`⭐ LEVEL ${level} !`,W/2,H*0.35,'#00e5ff',28); updateUI(); checkAchievements(); }

  // Check game over
  if(!gameOver&&players[0].bal<players[0].bet&&!autoFire) showGameOver();

  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────
window.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
window.addEventListener('mousedown', e=>{
  if(e.target.closest('.hud-bot')||e.target.closest('#weapon-row')||e.target.closest('#shop-overlay')||e.target.closest('#gameover')||e.target.closest('.hud-top')||e.target.closest('#jackpot-win')) return;
  shootMainPlayer();
});
window.addEventListener('touchstart', e=>{
  if(e.target.closest('.hud-bot')||e.target.closest('#weapon-row')||e.target.closest('#shop-overlay')||e.target.closest('#gameover')||e.target.closest('.hud-top')||e.target.closest('#jackpot-win')||e.target.closest('#achievement-toast')) return;
  const t=e.touches[0]; mouse.x=t.clientX; mouse.y=t.clientY; shootMainPlayer(); e.preventDefault();
},{passive:false});
window.addEventListener('touchmove', e=>{ const t=e.touches[0]; mouse.x=t.clientX; mouse.y=t.clientY; },{passive:true});
// Prevent double-tap zoom
let lastTap=0;
window.addEventListener('touchend', e=>{ const now=Date.now(); if(now-lastTap<300) e.preventDefault(); lastTap=now; },{passive:false});

// Keyboard shortcuts
window.addEventListener('keydown', e=>{
  if(e.key==='1') { activeSlot=0; renderWeaponRow(); }
  if(e.key==='2') { activeSlot=1; renderWeaponRow(); }
  if(e.key==='3') { activeSlot=2; renderWeaponRow(); }
  if(e.key==='a'||e.key==='A') toggleAuto();
  if(e.key==='+') changeBet(10);
  if(e.key==='-') changeBet(-10);
  if(e.key==='Escape') closeShop();
});

// ── INIT ─────────────────────────────────────────────
for(let i=0;i<20;i++) fishes.push(new Fish());
// Stagger initial fish positions
fishes.forEach((f,i)=>{ f.x=Math.random()*W; });

renderWeaponRow();
updateUI(); updateJackpot();

// Measure HUD heights after render
setTimeout(()=>{ resize(); renderWeaponRow(); }, 100);

requestAnimationFrame(loop);
</script>
</body>
