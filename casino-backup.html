<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ocean Emperor: Ultimate Weapon Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:#000811;
  font-family:'Segoe UI',Arial,sans-serif;
  overflow:hidden;
  width:100vw;height:100vh;
  user-select:none;
}
canvas{display:block;position:absolute;top:0;left:0;}

/* ===== UI LAYER ===== */
#ui{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  display:flex;flex-direction:column;justify-content:space-between;
}

/* ===== TOP HUD ===== */
.hud-top{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 14px;
  background:linear-gradient(to bottom,rgba(0,5,20,0.92),transparent);
}
.jackpot-display{text-align:center;flex:1;}
.jackpot-label{font-size:9px;letter-spacing:3px;color:#aaa;text-transform:uppercase;}
.jackpot-val{
  font-size:22px;font-weight:900;color:#ffd700;
  text-shadow:0 0 20px rgba(255,215,0,0.8);
}
.score-box{text-align:center;min-width:70px;}
.score-label{font-size:9px;letter-spacing:2px;color:#7af;text-transform:uppercase;}
.score-val{font-size:16px;font-weight:700;color:#fff;}

/* ===== SPECIAL WEAPON BAR ===== */
#special-bar-wrap{
  position:absolute;left:50%;transform:translateX(-50%);top:68px;
  width:280px;display:none;flex-direction:column;align-items:center;gap:3px;
}
#special-bar-label{font-size:11px;font-weight:700;letter-spacing:3px;color:#fff;}
#special-bar-bg{
  width:100%;height:8px;
  background:rgba(255,255,255,0.15);
  border-radius:4px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.2);
}
#special-bar-fill{height:100%;border-radius:4px;transition:width 0.1s linear;}

/* ===== BOTTOM HUD ===== */
.hud-bottom{
  pointer-events:auto;
  background:rgba(0,5,20,0.92);
  border-top:1px solid rgba(0,200,255,0.2);
  padding:10px 14px 14px;
  display:flex;align-items:center;justify-content:space-around;
  gap:8px;flex-wrap:wrap;
}
.stat-col{text-align:center;}
.stat-label{font-size:9px;letter-spacing:2px;color:#7af;text-transform:uppercase;margin-bottom:2px;}
.stat-val{font-size:20px;font-weight:900;color:#ffd700;}

/* ===== BUTTONS ===== */
.hud-btn{
  background:rgba(0,200,255,0.08);
  border:1px solid rgba(0,200,255,0.4);
  color:#00cfff;
  padding:6px 12px;
  font-size:11px;font-weight:700;letter-spacing:1px;
  border-radius:4px;cursor:pointer;
  transition:all 0.2s;
}
.hud-btn:hover,.hud-btn:active{background:rgba(0,200,255,0.25);}
.hud-btn.on{
  background:rgba(0,255,120,0.15);
  border-color:rgba(0,255,120,0.6);
  color:#00ff88;
}

/* ===== BET CONTROLS ===== */
.bet-ctrl{display:flex;align-items:center;gap:8px;}
.bet-btn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;width:26px;height:26px;
  border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.bet-btn:hover{background:rgba(255,255,255,0.2);}

/* ===== FLOAT TEXT ANIMATION ===== */
#floaters{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;overflow:hidden;
}
.floater{
  position:absolute;font-weight:900;font-size:22px;
  pointer-events:none;
  animation:floatUp 1.2s ease-out forwards;
}
@keyframes floatUp{
  0%  {opacity:0;transform:translateY(0) scale(0.6);}
  15% {opacity:1;transform:translateY(-15px) scale(1.2);}
  100%{opacity:0;transform:translateY(-120px) scale(0.9);}
}

/* ===== GAME OVER OVERLAY ===== */
#overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:100;
}
#overlay-box{
  background:rgba(0,5,25,0.95);
  border:2px solid rgba(255,215,0,0.6);
  border-radius:12px;padding:30px 50px;text-align:center;
  display:none;pointer-events:auto;
  box-shadow:0 0 60px rgba(255,215,0,0.3);
}
#overlay-title{font-size:28px;font-weight:900;color:#ffd700;margin-bottom:8px;}
#overlay-sub{font-size:14px;color:#aaa;margin-bottom:20px;}
#overlay-btn{
  background:linear-gradient(135deg,#ffd700,#ff9900);
  color:#000;border:none;padding:12px 30px;
  font-size:14px;font-weight:900;border-radius:6px;
  cursor:pointer;letter-spacing:2px;
}

/* ===== BONUS OVERLAY ===== */
#bonus-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.88);
  display:none;align-items:center;justify-content:center;
  z-index:200;pointer-events:auto;
}
#bonus-box{
  background:radial-gradient(circle at 50% 30%,#0a1a40,#000);
  border:2px solid rgba(255,215,0,0.7);
  border-radius:16px;padding:30px;
  min-width:300px;max-width:90vw;
  text-align:center;position:relative;
}
#bonus-title{
  font-size:22px;font-weight:900;color:#ffd700;
  margin-bottom:4px;letter-spacing:2px;
}
#bonus-subtitle{font-size:12px;color:#aaa;margin-bottom:20px;letter-spacing:1px;}
#bonus-canvas-wrap{
  width:260px;height:260px;margin:0 auto 20px;
  position:relative;
}
#bonusCanvas{border-radius:50%;border:2px solid rgba(255,215,0,0.4);}
#bonus-result{
  font-size:32px;font-weight:900;color:#fff;min-height:40px;
}
#bonus-countdown{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  font-size:72px;font-weight:900;
  color:rgba(255,255,255,0.15);
  pointer-events:none;
}
#bonus-close{
  margin-top:16px;
  background:rgba(0,200,255,0.15);
  border:1px solid rgba(0,200,255,0.4);
  color:#00cfff;padding:10px 28px;
  font-size:13px;font-weight:700;
  border-radius:6px;cursor:pointer;display:none;
}

/* ===== RESPONSIVE MOBILE ===== */
@media(max-width:480px){
  .jackpot-val{font-size:17px;}
  .stat-val{font-size:16px;}
  .hud-btn{padding:5px 8px;font-size:10px;}
  #bonus-box{padding:20px 16px;}
  #bonus-canvas-wrap{width:220px;height:220px;}
  #bonusCanvas{width:220px;height:220px;}
}
</style>
</head>
<body>

<!-- GAME CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- FLOATING SCORE TEXT -->
<div id="floaters"></div>

<!-- UI LAYER -->
<div id="ui">
  <div class="hud-top">
    <div class="score-box">
      <div class="score-label">Win</div>
      <div class="score-val" id="hud-win">0</div>
    </div>
    <div class="jackpot-display">
      <div class="jackpot-label">Grand Jackpot</div>
      <div class="jackpot-val" id="hud-jackpot">9,999,999</div>
    </div>
    <div class="score-box">
      <div class="score-label">Level</div>
      <div class="score-val" id="hud-level">1</div>
    </div>
  </div>

  <!-- Special Weapon Timer Bar -->
  <div id="special-bar-wrap">
    <div id="special-bar-label">DRILL ACTIVE</div>
    <div id="special-bar-bg">
      <div id="special-bar-fill"></div>
    </div>
  </div>

  <div class="hud-bottom">
    <div class="stat-col">
      <div class="stat-label">Saldo</div>
      <div class="stat-val" id="hud-balance">10,000</div>
    </div>
    <button class="hud-btn" id="btn-auto" onclick="toggleAuto()">AUTO OFF</button>
    <div class="stat-col">
      <div class="stat-label">Bet</div>
      <div class="bet-ctrl">
        <div class="bet-btn" onclick="changeBet(-10)">−</div>
        <span class="stat-val" id="hud-bet" style="color:#fff;font-size:18px;">10</span>
        <div class="bet-btn" onclick="changeBet(10)">+</div>
      </div>
    </div>
    <button class="hud-btn" onclick="changeBet(0,'max')">MAX BET</button>
  </div>
</div>

<!-- GAME OVER OVERLAY -->
<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title">GAME OVER</div>
    <div id="overlay-sub">Saldo habis!</div>
    <button id="overlay-btn" onclick="restartGame()">MAIN LAGI</button>
  </div>
</div>

<!-- BONUS WHEEL OVERLAY -->
<div id="bonus-overlay">
  <div id="bonus-box">
    <div id="bonus-title">BONUS JACKPOT!</div>
    <div id="bonus-subtitle">Berputar...</div>
    <div id="bonus-canvas-wrap">
      <canvas id="bonusCanvas" width="260" height="260"></canvas>
      <div id="bonus-countdown"></div>
    </div>
    <div id="bonus-result"></div>
    <button id="bonus-close" onclick="closeBonus()">KLAIM REWARD</button>
  </div>
</div>

<script>
// ============================================================
//  OCEAN EMPEROR — ULTIMATE WEAPON EDITION
//  Full source code — siap pakai, copy & paste
// ============================================================

// --- CANVAS SETUP ---
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- GAME STATE ---
let balance     = 10000;
let bet         = 10;
let autoFire    = false;
let totalWin    = 0;
let level       = 1;
let jackpotPool = 9999999;
let specialWeapon = null;
let specialTimer  = 0;
let specialMax    = 0;
let mouse       = { x: 0, y: 0 };
let gameOver    = false;
let frameCount  = 0;
let shakeAmt    = 0;
let cannonX     = 0;
let cannonY     = 0;

const fishes    = [];
const bullets   = [];
const particles = [];

// ============================================================
//  FISH TYPE DEFINITIONS
//  prob = spawn probability (total must equal 1)
// ============================================================
const FISH_TYPES = [
  { id:'small',    label:'Small Fish',    hp:3,  val:8,   speed:2.2, size:18, color:'#4fc3f7', glow:'#00bcd4', prob:0.35 },
  { id:'med',      label:'Medium Fish',   hp:8,  val:25,  speed:1.5, size:26, color:'#81c784', glow:'#4caf50', prob:0.25 },
  { id:'large',    label:'Large Fish',    hp:18, val:60,  speed:1.0, size:36, color:'#ff8a65', glow:'#f4511e', prob:0.15 },
  { id:'boss',     label:'BOSS',          hp:80, val:350, speed:0.5, size:56, color:'#ff6f00', glow:'#ff9800', prob:0.05 },
  { id:'drill',    label:'DRILL FISH',    hp:30, val:0,   speed:1.3, size:38, color:'#00e5ff', glow:'#00bcd4', prob:0.05 },
  { id:'bomb',     label:'BOMB FISH',     hp:30, val:0,   speed:1.3, size:38, color:'#ff1744', glow:'#ff5722', prob:0.05 },
  { id:'roulette', label:'ROULETTE FISH', hp:40, val:0,   speed:1.0, size:42, color:'#e040fb', glow:'#9c27b0', prob:0.04 },
  { id:'random',   label:'LUCKY FISH',    hp:25, val:0,   speed:1.8, size:34, color:'#ffd700', glow:'#ffb300', prob:0.04 },
  { id:'jackpot',  label:'COUNT UP',      hp:60, val:150, speed:0.7, size:50, color:'#ffd700', glow:'#ff6f00', prob:0.02 },
];

function pickFishType() {
  let r = Math.random(), cumul = 0;
  for (let t of FISH_TYPES) {
    cumul += t.prob;
    if (r < cumul) return t;
  }
  return FISH_TYPES[0];
}

// ============================================================
//  FISH CLASS
// ============================================================
class Fish {
  constructor() { this.init(); }

  init() {
    const t = pickFishType();
    // Deep copy type properties
    this.id      = t.id;
    this.label   = t.label;
    this.hp      = t.hp;
    this.maxHp   = t.hp;
    this.val     = t.val;
    this.speed   = t.speed;
    this.size    = t.size;
    this.color   = t.color;
    this.glow    = t.glow;

    this.dir      = Math.random() > 0.5 ? 1 : -1;
    this.x        = this.dir === 1 ? -80 : W + 80;
    this.baseY    = 80 + Math.random() * (H - 220);
    this.y        = this.baseY;
    this.wave     = Math.random() * Math.PI * 2;
    this.waveAmp  = 10 + Math.random() * 15;
    this.waveFreq = 0.02 + Math.random() * 0.02;
    this.tailPhase = Math.random() * Math.PI * 2;
    this.alive    = true;
    this.flash    = 0;

    // Count-Up fish has accumulating value
    if (this.id === 'jackpot') {
      this.countUp = 100 + Math.floor(Math.random() * 200);
    }
  }

  update() {
    this.x += this.speed * this.dir;
    this.y  = this.baseY + Math.sin(frameCount * this.waveFreq + this.wave) * this.waveAmp;
    this.tailPhase += 0.15;

    // Count-Up accumulates value over time
    if (this.id === 'jackpot' && frameCount % 30 === 0) {
      this.countUp += Math.floor(5 + Math.random() * 10);
    }

    if (this.flash > 0) this.flash--;

    // Respawn when off-screen
    if ((this.dir === 1 && this.x > W + 100) || (this.dir === -1 && this.x < -100)) {
      this.init();
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // Flip sprite based on swim direction
    const flip = this.dir === -1 ? -1 : 1;
    ctx.scale(flip, 1);

    // Hit flash effect
    if (this.flash > 0) {
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(this.flash * 0.8);
    }

    // Glow halo
    ctx.shadowBlur  = 20 + Math.sin(frameCount * 0.05) * 8;
    ctx.shadowColor = this.glow;

    // === BODY ===
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size, this.size * 0.55, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();

    // === TAIL ===
    const tw = Math.sin(this.tailPhase) * 12;
    ctx.beginPath();
    ctx.moveTo(-this.size + 4, 0);
    ctx.lineTo(-this.size - 18, -12 + tw);
    ctx.lineTo(-this.size - 18,  12 + tw);
    ctx.closePath();
    ctx.fillStyle = this.color;
    ctx.fill();

    // === DORSAL FIN ===
    ctx.beginPath();
    ctx.moveTo(-this.size * 0.2, -this.size * 0.55);
    ctx.lineTo( this.size * 0.1, -this.size * 0.9);
    ctx.lineTo( this.size * 0.4, -this.size * 0.55);
    ctx.fillStyle = this.color;
    ctx.fill();

    // === EYE ===
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(this.size * 0.45, -this.size * 0.1, this.size * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.size * 0.47, -this.size * 0.1, this.size * 0.07, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();

    // === SPECIAL MARKINGS ===
    if (this.id === 'drill') {
      ctx.fillStyle = 'rgba(0,229,255,0.35)';
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.6, this.size * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      drawEmoji(ctx, '⚡', -8, 7, 18);
    } else if (this.id === 'bomb') {
      ctx.fillStyle = 'rgba(255,23,68,0.3)';
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.6, this.size * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      drawEmoji(ctx, '💣', -10, 7, 16);
    } else if (this.id === 'roulette') {
      ctx.fillStyle = 'rgba(224,64,251,0.3)';
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.6, this.size * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      drawEmoji(ctx, '🎰', -10, 7, 16);
    } else if (this.id === 'random') {
      ctx.fillStyle = 'rgba(255,215,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.6, this.size * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      drawEmoji(ctx, '🎁', -10, 7, 16);
    } else if (this.id === 'boss') {
      ctx.fillStyle = 'rgba(255,111,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.7, this.size * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      drawEmoji(ctx, '👑', -11, 8, 18);
    }

    // Count-up value label
    if (this.id === 'jackpot') {
      ctx.scale(flip, 1); // un-flip text
      ctx.shadowBlur = 0;
      ctx.fillStyle  = '#ffd700';
      ctx.font       = 'bold 13px Arial';
      ctx.textAlign  = 'center';
      ctx.fillText('+' + this.countUp, 0, -this.size - 10);
    }

    ctx.restore();

    // === HP BAR (drawn in world space, not flipped) ===
    if (this.maxHp > 5) {
      const bw = this.size * 1.6;
      const bh = 4;
      const bx = this.x - bw / 2;
      const by = this.y - this.size - 22;
      const pct = this.hp / this.maxHp;
      const hpColor = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ffc107' : '#f44336';

      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = hpColor;
      ctx.fillRect(bx, by, bw * pct, bh);
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth   = 0.5;
      ctx.strokeRect(bx, by, bw, bh);
    }
  }
}

// Helper: draw emoji centered
function drawEmoji(c, txt, x, y, size) {
  c.save();
  c.shadowBlur   = 0;
  c.font         = size + 'px Arial';
  c.textAlign    = 'center';
  c.textBaseline = 'middle';
  c.fillText(txt, x, y);
  c.restore();
}

// ============================================================
//  SPECIAL WEAPON — DRILL
//  Bounces around screen, continuously damages nearby fish
// ============================================================
class SpecialDrill {
  constructor() {
    this.x    = W / 2;
    this.y    = H / 2;
    this.vx   = (Math.random() - 0.5) * 12;
    this.vy   = (Math.random() - 0.5) * 12;
    this.angle = 0;
    this.alive = true;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    // Bounce off walls
    if (this.x < 40  || this.x > W - 40) this.vx *= -1;
    if (this.y < 40  || this.y > H - 100) this.vy *= -1;

    this.angle += 0.15;

    // Continuous area damage
    for (let f of fishes) {
      if (!f.alive) continue;
      const d = Math.hypot(this.x - f.x, this.y - f.y);
      if (d < f.size + 50) {
        f.hp   -= 0.4;
        f.flash = 5;
        if (f.hp <= 0) killFish(f);
      }
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.shadowBlur  = 30;
    ctx.shadowColor = '#00e5ff';

    // Outer pulse rings
    ctx.strokeStyle = 'rgba(0,229,255,0.6)';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 35, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(0,229,255,0.25)';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.arc(0, 0, 50, 0, Math.PI * 2);
    ctx.stroke();

    // Diamond body
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath();
    ctx.moveTo(0, -28);
    ctx.lineTo(14, 0);
    ctx.lineTo(0,  28);
    ctx.lineTo(-14, 0);
    ctx.closePath();
    ctx.fill();

    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(6,   0);
    ctx.lineTo(0,  12);
    ctx.lineTo(-6,  0);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // Spark particles
    for (let i = 0; i < 2; i++) {
      spawnParticle(
        this.x + (Math.random() - 0.5) * 60,
        this.y + (Math.random() - 0.5) * 60,
        '#00e5ff', 2, 1
      );
    }
  }
}

// ============================================================
//  SPECIAL WEAPON — BOMB
//  Floats around, explodes at end of timer
// ============================================================
class SpecialBomb {
  constructor() {
    this.x     = W / 2;
    this.y     = H / 2;
    this.vx    = (Math.random() - 0.5) * 8;
    this.vy    = (Math.random() - 0.5) * 8;
    this.pulse = 0;
    this.alive = true;
  }

  update() {
    this.x  += this.vx;
    this.y  += this.vy;
    this.vx *= 0.99;
    this.vy *= 0.99;

    if (this.x < 40  || this.x > W - 40) this.vx *= -1;
    if (this.y < 40  || this.y > H - 100) this.vy *= -1;

    this.pulse += 0.08;
  }

  draw() {
    const p = Math.sin(this.pulse) * 8;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.shadowBlur  = 40;
    ctx.shadowColor = '#ff1744';

    // Outer glow ring
    ctx.strokeStyle = 'rgba(255,100,100,0.4)';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 38 + p, 0, Math.PI * 2);
    ctx.stroke();

    // Main body
    ctx.fillStyle = '#b71c1c';
    ctx.beginPath();
    ctx.arc(0, 0, 28 + p, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ff1744';
    ctx.beginPath();
    ctx.arc(0, 0, 22 + p, 0, Math.PI * 2);
    ctx.fill();

    // Specular highlight
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.arc(-6, -6, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Smoke particles
    for (let i = 0; i < 1; i++) {
      spawnParticle(
        this.x + (Math.random() - 0.5) * 40,
        this.y + (Math.random() - 0.5) * 40,
        '#ff5722', 3, 1
      );
    }
  }
}

// ============================================================
//  BULLET CLASS
// ============================================================
class Bullet {
  constructor(ox, oy) {
    this.x  = ox;
    this.y  = oy;
    const ang = Math.atan2(mouse.y - oy, mouse.x - ox);
    this.vx    = Math.cos(ang) * 16;
    this.vy    = Math.sin(ang) * 16;
    this.alive = true;
    this.trail = [];
  }

  update() {
    // Store trail positions
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.shift();

    this.x += this.vx;
    this.y += this.vy;

    // Out of bounds
    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
      this.alive = false;
      return;
    }

    // Collision with fish
    for (let f of fishes) {
      if (!f.alive) continue;
      if (Math.hypot(this.x - f.x, this.y - f.y) < f.size + 8) {
        this.alive = false;
        f.hp--;
        f.flash = 8;
        spawnHitSparks(this.x, this.y);
        if (f.hp <= 0) killFish(f);
        break;
      }
    }
  }

  draw() {
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const a   = (i / this.trail.length) * 0.5;
      const sz  = 3 * (i / this.trail.length);
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,215,0,${a})`;
      ctx.fill();
    }
    // Head
    ctx.save();
    ctx.shadowBlur  = 15;
    ctx.shadowColor = '#ffd700';
    ctx.beginPath();
    ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd700';
    ctx.fill();
    ctx.restore();
  }
}

// ============================================================
//  PARTICLE SYSTEM
// ============================================================
function spawnParticle(x, y, color, size, life) {
  particles.push({
    x, y,
    vx: (Math.random() - 0.5) * 6,
    vy: (Math.random() - 0.5) * 6 - 1,
    color,
    size:    size || 4,
    life:    life || 1,
    maxLife: life || 1,
    isCoin:  false,
    rotate:  0,
  });
}

function spawnHitSparks(x, y) {
  for (let i = 0; i < 5; i++) spawnParticle(x, y, '#ffffff', 3, 0.7);
}

function spawnExplosion(x, y, color) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 0.5) * 14 - 3,
      color,
      size:    4 + Math.random() * 6,
      life:    1,
      maxLife: 1,
      isCoin:  false,
      rotate:  0,
    });
  }
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 20,
      vy: (Math.random() - 0.5) * 20,
      color:   '#fff',
      size:    2,
      life:    0.8,
      maxLife: 0.8,
      isCoin:  false,
      rotate:  0,
    });
  }
}

function spawnCoins(x, y, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx:     Math.cos(ang) * spd,
      vy:     Math.sin(ang) * spd - 3,
      color:  '#ffd700',
      size:   5,
      life:   1.2,
      maxLife:1.2,
      isCoin: true,
      rotate: Math.random() * Math.PI * 2,
    });
  }
}

// ============================================================
function floatText(str, x, y, color) {
  const el = document.createElement('div');
  el.className = 'floater';
  el.textContent = str;
  el.style.cssText = `left:${x}px;top:${y}px;color:${color || '#ffd700'};`;
  document.getElementById('floaters').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ============================================================
//  FISH DEATH HANDLER
// ============================================================
function killFish(f) {
  if (!f.alive) return;
  f.alive = false;

  spawnExplosion(f.x, f.y, f.glow);
  spawnCoins(f.x, f.y, f.id === 'boss' ? 10 : 4);

  // Special fish: trigger bonus instead of giving coins directly
  if (f.id === 'drill')    { activateDrill();           f.init(); return; }
  if (f.id === 'bomb')     { activateBombMode();         f.init(); return; }
  if (f.id === 'roulette') { openBonus('roulette', f);  return; }
  if (f.id === 'random')   { openBonus('random',   f);  return; }

  // Normal reward
  let win = 0;
  if (f.id === 'jackpot') {
    win = f.countUp;
    jackpotPool = Math.max(0, jackpotPool - win);
    updateJackpot();
    floatText('JACKPOT! +' + win, f.x, f.y - 30, '#ffd700');
  } else {
    win = Math.floor(f.val * (bet / 10));
  }

  balance  += win;
  totalWin += win;
  floatText('+' + win, f.x, f.y - 20, '#ffd700');
  updateUI();
  f.init();
}

function endSpecial() {

];

let bonusAnimId  = null;
let bonusPrizes  = [];
let bonusType    = '';
let currentFish  = null;

// ============================================================
//  BONUS WHEEL — OPEN & ANIMATE
// ============================================================
function openBonus(type, fish) {
  bonusType   = type;
  currentFish = fish;
  bonusPrizes = type === 'roulette' ? ROULETTE_PRIZES : RANDOM_BONUSES;

  // Reset UI
  document.getElementById('bonus-overlay').style.display  = 'flex';
  document.getElementById('bonus-title').textContent       = type === 'roulette' ? '🎰 ROULETTE BONUS!' : '🎁 LUCKY BONUS!';
  document.getElementById('bonus-subtitle').textContent    = 'Roda berputar...';
  document.getElementById('bonus-result').textContent      = '';
  document.getElementById('bonus-close').style.display     = 'none';
  document.getElementById('bonus-countdown').textContent   = '';

  const cv  = document.getElementById('bonusCanvas');
  const cx  = cv.getContext('2d');
  const CW  = cv.width;
  const CH  = cv.height;

  // Pick winning segment
  const targetSegment = Math.floor(Math.random() * bonusPrizes.length);
  const segAngle      = (Math.PI * 2) / bonusPrizes.length;
  const targetAngle   = Math.PI * 6 + Math.PI * 2
                        - (targetSegment * segAngle + segAngle / 2)
                        - Math.PI / 2;

  let elapsed  = 0;
  const frames = 180; // spin duration in frames

  if (bonusAnimId) cancelAnimationFrame(bonusAnimId);

  function spin() {
    elapsed++;
    const t    = Math.min(elapsed / frames, 1);
    const ease = 1 - Math.pow(1 - t, 4); // ease-out quartic
    const angle = targetAngle * ease;

    drawWheel(angle, bonusPrizes, cv, cx, CW, CH);

    if (elapsed < frames) {
      bonusAnimId = requestAnimationFrame(spin);
    } else {
      drawWheel(targetAngle, bonusPrizes, cv, cx, CW, CH);
      showBonusResult(bonusPrizes[targetSegment]);
    }
  }

  spin();
}

// ============================================================
//  BONUS WHEEL — DRAW
// ============================================================
function drawWheel(angle, prizes, cv, cx, CW, CH) {
  const R   = CW / 2 - 10;
  const ox  = CW / 2;
  const oy  = CH / 2;
  const seg = (Math.PI * 2) / prizes.length;

  cx.clearRect(0, 0, CW, CH);

  // Draw segments
  cx.shadowBlur   = 20;
  cx.shadowColor  = 'rgba(0,0,0,0.5)';
  for (let i = 0; i < prizes.length; i++) {
    const a = angle + i * seg;
    cx.beginPath();
    cx.moveTo(ox, oy);
    cx.arc(ox, oy, R, a, a + seg);
    cx.closePath();
    cx.fillStyle   = prizes[i].color;
    cx.fill();
    cx.strokeStyle = 'rgba(0,0,0,0.3)';
    cx.lineWidth   = 1.5;
    cx.stroke();
  }

  cx.shadowBlur = 0;

  // Segment labels
  for (let i = 0; i < prizes.length; i++) {
    const a = angle + i * seg + seg / 2;
    cx.save();
    cx.translate(ox + Math.cos(a) * R * 0.68, oy + Math.sin(a) * R * 0.68);
    cx.rotate(a + Math.PI / 2);
    cx.fillStyle    = '#fff';
    cx.font         = 'bold 11px Arial';
    cx.textAlign    = 'center';
    cx.textBaseline = 'middle';
    cx.shadowBlur   = 3;
    cx.shadowColor  = 'rgba(0,0,0,0.9)';
    cx.fillText(prizes[i].label, 0, 0);
    cx.restore();
  }

  // Center hub
  cx.beginPath();
  cx.arc(ox, oy, 18, 0, Math.PI * 2);
  cx.fillStyle   = '#ffd700';
  cx.fill();
  cx.strokeStyle = '#fff';
  cx.lineWidth   = 2;
  cx.stroke();

  // Pointer (top)
  cx.beginPath();
  cx.moveTo(ox,      oy - R - 5);
  cx.lineTo(ox - 10, oy - R + 15);
  cx.lineTo(ox + 10, oy - R + 15);
  cx.closePath();
  cx.fillStyle   = '#fff';
  cx.shadowBlur  = 10;
  cx.shadowColor = '#fff';
  cx.fill();
}

// ============================================================
//  BONUS WHEEL — SHOW RESULT WITH COUNTDOWN
// ============================================================
function showBonusResult(prize) {
  document.getElementById('bonus-subtitle').textContent = 'Hasil:';

  let resultText = '';
  let winAmount  = 0;

  if (prize.type === 'drill') {
    resultText = '⚡ FREE DRILL!';
    setTimeout(() => { closeBonus(); activateDrill(); }, 1800);
  } else if (prize.type === 'bomb') {
    resultText = '💣 FREE BOMB!';
    setTimeout(() => { closeBonus(); activateBombMode(); }, 1800);
  } else if (prize.type === 'roulette') {
    resultText = '🎰 FREE ROULETTE!';
    setTimeout(() => { closeBonus(); openBonus('roulette', currentFish); }, 1800);
  } else {
    const mult = prize.mult || 0;
    winAmount   = mult * bet;
    if (mult === 0) {
      resultText = 'Sayang sekali...';
    } else {
      resultText = '+' + winAmount + ' Koin!';
      balance   += winAmount;
      totalWin  += winAmount;
      floatText('+' + winAmount, W / 2, H / 2, '#ffd700');
      updateUI();
    }
  }

  // Countdown animation: 3 … 2 … 1 … reveal
  let cd = 3;
  const cdEl = document.getElementById('bonus-countdown');

  function tick() {
    cdEl.textContent = cd > 0 ? cd : '';
    if (cd > 0) {
      cd--;
      setTimeout(tick, 400);
    } else {
      cdEl.textContent = '';
      document.getElementById('bonus-result').textContent = resultText;
      document.getElementById('bonus-close').style.display = 'inline-block';
      if (currentFish) currentFish.init();
    }
  }
  tick();
}

function closeBonus() {
  document.getElementById('bonus-overlay').style.display = 'none';
  if (bonusAnimId) cancelAnimationFrame(bonusAnimId);
}

// ============================================================
//  SCREEN SHAKE
// ============================================================
function shakeScreen() { shakeAmt = 12; }

// ============================================================
//  BACKGROUND — OCEAN + GOD RAYS + BUBBLES
// ============================================================
const bubbles = [];
for (let i = 0; i < 30; i++) {
  bubbles.push({
    x:   Math.random() * 2000,
    y:   Math.random() * 800,
    r:   1 + Math.random() * 4,
    spd: 0.3 + Math.random() * 0.7,
  });
}

function drawBackground() {
  // Ocean gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,   '#000c1f');
  g.addColorStop(0.5, '#001a3a');
  g.addColorStop(1,   '#000811');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Animated god rays
  ctx.save();
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 8; i++) {
    const rx = W * 0.5 + Math.cos(i * 0.8 + frameCount * 0.002) * W * 0.3;
    const rg = ctx.createLinearGradient(rx, 0, rx + 60, H);
    rg.addColorStop(0, 'rgba(0,150,255,0.8)');
    rg.addColorStop(1, 'transparent');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.moveTo(rx - 30,       0);
    ctx.lineTo(rx + 30 + 80,  H);
    ctx.lineTo(rx - 80 + 80,  H);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Rising bubbles
  ctx.save();
  for (let b of bubbles) {
    b.y -= b.spd;
    b.x += Math.sin(frameCount * 0.01 + b.r) * 0.3;
    if (b.y < -10) { b.y = H + 10; b.x = Math.random() * W; }
    ctx.globalAlpha  = 0.15;
    ctx.strokeStyle  = '#4fc3f7';
    ctx.lineWidth    = 0.8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();

  // Sea floor
  ctx.fillStyle   = 'rgba(0,30,60,0.6)';
  ctx.fillRect(0, H - 40, W, 40);
  ctx.strokeStyle = 'rgba(0,200,255,0.15)';
  ctx.lineWidth   = 1;
  ctx.beginPath();
  ctx.moveTo(0,  H - 40);
  ctx.lineTo(W,  H - 40);
  ctx.stroke();
}

// ============================================================
//  CANNON DRAW
// ============================================================
function drawCannon() {
  cannonX = W / 2;
  cannonY = H - 60;

  const ang = Math.atan2(mouse.y - cannonY, mouse.x - cannonX);

  ctx.save();
  ctx.translate(cannonX, cannonY);

  // Base platform
  ctx.shadowBlur  = 20;
  ctx.shadowColor = '#00bcd4';
  ctx.fillStyle   = '#1a2a3a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 50, 20, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#00bcd4';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Rotating barrel
  ctx.rotate(ang);
  ctx.fillStyle   = specialWeapon ? '#ff1744' : '#263545';
  ctx.beginPath();
  ctx.rect(0, -10, 65, 20);
  ctx.fill();
  ctx.strokeStyle = specialWeapon ? '#ff5252' : '#00e5ff';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  // Barrel tip
  ctx.fillStyle = specialWeapon ? '#ff5252' : '#37474f';
  ctx.beginPath();
  ctx.rect(55, -12, 18, 24);
  ctx.fill();

  ctx.restore();

  // Center orb (pulsing)
  const pulse = Math.sin(frameCount * 0.1) * 4;
  ctx.save();
  ctx.translate(cannonX, cannonY);
  ctx.shadowBlur  = 20 + pulse;
  ctx.shadowColor = '#00bcd4';
  ctx.fillStyle   = '#0097a7';
  ctx.beginPath();
  ctx.arc(0, 0, 18, 0, Math.PI * 2);
  ctx.fill();
  // Orb highlight
  ctx.fillStyle = 'rgba(0,229,255,0.5)';
  ctx.beginPath();
  ctx.arc(-4, -5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ============================================================
//  MAIN GAME LOOP
// ============================================================
function loop() {
  frameCount++;

  // Screen shake transform
  if (shakeAmt > 0) {
    ctx.save();
    ctx.translate(
      (Math.random() - 0.5) * shakeAmt,
      (Math.random() - 0.5) * shakeAmt
    );
    shakeAmt *= 0.8;
    if (shakeAmt < 0.5) shakeAmt = 0;
  }

  ctx.clearRect(0, 0, W, H);

  // 1. Background
  drawBackground();

  // 2. Fishes
  for (let f of fishes) {
    if (f.alive) { f.update(); f.draw(); }
  }

  // 3. Special weapon
  if (specialWeapon) {
    specialWeapon.update();
    specialWeapon.draw();
    specialTimer--;

    const pct = (specialTimer / specialMax) * 100;
    document.getElementById('special-bar-fill').style.width = pct + '%';

    if (specialTimer <= 0) endSpecial();
  }

  // 4. Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].update();
    bullets[i].draw();
    if (!bullets[i].alive) bullets.splice(i, 1);
  }

  // 5. Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p  = particles[i];
    p.x     += p.vx;
    p.y     += p.vy;
    p.vy    += 0.15;          // gravity
    p.life  -= 0.025;

    const a  = Math.max(0, p.life / p.maxLife);
    ctx.save();
    ctx.globalAlpha  = a;
    ctx.shadowBlur   = 8;
    ctx.shadowColor  = p.color;

    if (p.isCoin) {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * 0.5, p.rotate + frameCount * 0.1, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    if (p.life <= 0) particles.splice(i, 1);
  }

  // 6. Cannon
  drawCannon();

  if (shakeAmt > 0) ctx.restore();

  // 7. Auto fire
  if (autoFire && !specialWeapon && balance >= bet && frameCount % 12 === 0) {
    shoot();
  }

  // 8. Jackpot pool drifts up slowly
  if (frameCount % 180 === 0 && jackpotPool < 9999999) {
    jackpotPool += Math.floor(Math.random() * 50 + 10);
    updateJackpot();
  }

  // 9. Level up check
  if (totalWin > level * 500) {
    level++;
    floatText('⬆ LEVEL ' + level, W / 2, H / 3, '#00e5ff');
    updateUI();
  }

  // 10. Game over check
  if (!gameOver && balance < bet && !specialWeapon && !autoFire) {
    showGameOver();
  }

  requestAnimationFrame(loop);
}

// ============================================================
//  INPUT HANDLING — MOUSE & TOUCH
// ============================================================
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener('mousedown', e => {
  if (!e.target.closest('.hud-bottom') && !e.target.closest('#bonus-overlay')) {
    shoot();
  }
});

window.addEventListener('touchstart', e => {
  if (e.target.closest('.hud-bottom') || e.target.closest('#bonus-overlay')) return;
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
  shoot();
  e.preventDefault();
}, { passive: false });

window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.x = t.clientX;
  mouse.y = t.clientY;
}, { passive: true });

// ============================================================
//  INIT
// ============================================================
for (let i = 0; i < 18; i++) fishes.push(new Fish());
updateUI();
updateJackpot();
loop();
</script>
</body>
</html>
