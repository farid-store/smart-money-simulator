<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaridTrade Pro - Payout Certificate</title>
    <link rel="preconnect" href="https://fonts.googleapis.ArgumentParser">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Alex+Brush&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #e8c678;
            --bg-dark: #0a0a0a;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Control Panel untuk Customization */
        .control-panel {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .control-panel input {
            padding: 10px;
            border: 1px solid #444;
            background: #111;
            color: var(--text-white);
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
        }

        .control-panel input:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* Area Sertifikat */
        .certificate-wrapper {
            background: radial-gradient(circle at center bottom, #2a2a2a 0%, var(--bg-dark) 60%);
            width: 1000px;
            height: 1000px; /* Rasio persegi (1:1) seperti gambar */
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            padding: 80px;
            box-sizing: border-box;
        }

        /* Garis tipis pemisah */
        .divider {
            position: absolute;
            top: 250px;
            left: 80px;
            right: 80px;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        .divider.bottom {
            top: auto;
            bottom: 250px;
        }

        /* Bagian Kiri (Teks) */
        .left-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 2;
        }

        .header-title h1 {
            color: var(--text-white);
            font-size: 75px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: 2px;
        }

        .header-title .certificate-text {
            color: var(--gold);
            font-size: 70px;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            padding: 0 15px;
        }

        /* Efek Bracket [ ] di tulisan CERTIFICATE */
        .header-title .certificate-text::before,
        .header-title .certificate-text::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            border: 4px solid var(--text-white);
        }
        .header-title .certificate-text::before {
            top: -5px;
            left: -10px;
            border-right: none;
            border-bottom: none;
        }
        .header-title .certificate-text::after {
            bottom: -5px;
            right: -10px;
            border-left: none;
            border-top: none;
        }

        /* Info Utama */
        .main-info {
            margin-top: 100px;
        }

        .label {
            color: var(--text-white);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .name {
            color: var(--text-white);
            font-size: 55px;
            font-weight: 800;
            margin: 0 0 40px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .amount {
            color: var(--gold);
            font-size: 65px;
            font-weight: 800;
            margin: 0 0 40px 0;
        }

        .date {
            color: var(--text-white);
            font-size: 30px;
            font-weight: 600;
            margin: 0;
        }

        /* Footer (Signatures) */
        .footer-signatures {
            position: absolute;
            bottom: 80px;
            left: 80px;
            display: flex;
            gap: 100px;
        }

        .signature-block {
            display: flex;
            flex-direction: column;
        }

        .signature-title {
            color: var(--text-white);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .signature-name {
            color: var(--text-white);
            font-family: 'Alex Brush', cursive;
            font-size: 45px;
            font-weight: 400;
            margin: 0;
        }

        /* Bagian Kanan (Logo & Trophy) */
        .right-content {
            position: absolute;
            top: 80px;
            right: 80px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .platform-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .platform-logo-icon {
            width: 45px;
            height: 45px;
            background: var(--text-white);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .platform-logo-icon::inner {
            content: 'FT';
            color: var(--bg-dark);
            font-weight: 900;
            font-size: 20px;
        }

        .platform-name {
            color: var(--text-white);
            font-size: 22px;
            font-weight: 800;
            text-align: right;
            line-height: 1.1;
        }

        /* Placeholder Trophy */
        .trophy-container {
            position: absolute;
            bottom: 60px;
            right: 60px;
            width: 350px;
            height: 500px;
            /* Kamu bisa mengganti URL di bawah dengan link gambar trophy PNG transparan aslimu */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/4/4e/Transparent_Trophy.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.9));
            z-index: 3;
        }

        /* Efek tekstur lantai/cahaya */
        .floor-light {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.05), transparent);
            pointer-events: none;
            z-index: 1;
        }

    </style>
</head>
<body>

    <div class="control-panel">
        <input type="text" id="inputName" placeholder="Nama Peserta" value="NDUMISO" onkeyup="updateCert()">
        <input type="text" id="inputAmount" placeholder="Nominal (Contoh: $500)" value="$500" onkeyup="updateCert()">
        <input type="date" id="inputDate" value="2026-04-15" onchange="updateCert()">
    </div>

    <div class="certificate-wrapper" id="certificate">
        <div class="divider"></div>
        <div class="divider bottom"></div>
        <div class="floor-light"></div>

        <div class="left-content">
            <div class="header-title">
                <h1>PAYOUT</h1>
                <h1 class="certificate-text">CERTIFICATE</h1>
            </div>

            <div class="main-info">
                <div class="label">PROUDLY PRESENTED TO:</div>
                <h2 class="name" id="certName">NDUMISO</h2>

                <div class="label">PROFIT SPLIT</div>
                <h2 class="amount" id="certAmount">$500</h2>

                <div class="label">DATE</div>
                <h3 class="date" id="certDate">2026-04-15</h3>
            </div>
        </div>

        <div class="footer-signatures">
            <div class="signature-block">
                <div class="signature-title">FOUNDER & CEO</div>
                <div class="signature-name">Farid Siddiq</div>
            </div>
            <div class="signature-block">
                <div class="signature-title">EXECUTIVE BUSINESS PARTNER</div>
                <div class="signature-name">Rifky Fahmi</div>
            </div>
        </div>

        <div class="right-content">
            <div class="platform-logo">
                <div class="platform-logo-icon"></div>
                <div class="platform-name">FARIDTRADE<br>PRO</div>
            </div>
        </div>
        
        <div class="trophy-container"></div>
    </div>

    <script>
        function updateCert() {
            // Mengambil value dari input
            const name = document.getElementById('inputName').value;
            const amount = document.getElementById('inputAmount').value;
            const date = document.getElementById('inputDate').value;

            // Memperbarui tampilan sertifikat
            document.getElementById('certName').innerText = name.toUpperCase();
            document.getElementById('certAmount').innerText = amount;
            document.getElementById('certDate').innerText = date;
        }
    </script>

</body>
</html>
