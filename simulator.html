<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>

<body class="bg-[#0D1117] text-white h-screen flex">

  <!-- Sidebar -->
  <div class="w-16 bg-[#161B22] flex flex-col items-center py-4">
    <div class="mb-4">📊</div>
    <div class="mb-4">⭐</div>
    <div class="mb-4">💼</div>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col">

    <!-- Topbar -->
    <div class="h-12 bg-[#161B22] flex items-center justify-between px-4">
      <input placeholder="Search stock..."
        class="bg-[#0D1117] px-3 py-1 rounded text-sm outline-none"/>

      <div class="flex gap-2">
        <button class="bg-green-600 px-3 py-1 rounded">BUY</button>
        <button class="bg-red-600 px-3 py-1 rounded">SELL</button>
      </div>
    </div>

    <!-- Grid Layout -->
    <div class="grid grid-cols-12 grid-rows-6 gap-2 p-2 flex-1">

      <!-- Order Book -->
      <div class="col-span-3 row-span-3 bg-[#161B22] rounded p-2 text-sm">
        <h2 class="mb-2">Order Book</h2>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <h3 class="text-green-400">Bid</h3>
            <p>10,000</p>
            <p>9,950</p>
            <p>9,900</p>
          </div>
          <div>
            <h3 class="text-red-400">Offer</h3>
            <p>10,100</p>
            <p>10,150</p>
            <p>10,200</p>
          </div>
        </div>
      </div>

      <!-- Chart -->
      <div class="col-span-6 row-span-4 bg-[#161B22] rounded p-2">
        <div id="chart" style="height:100%;"></div>
      </div>

      <!-- Financial -->
      <div class="col-span-3 row-span-3 bg-[#161B22] rounded p-2 text-sm">
        <h2>Financial</h2>
        <p>Revenue: 25B</p>
        <p>Net Income: 12B</p>
        <p>EPS: 120</p>
      </div>

      <!-- Trades -->
      <div class="col-span-3 row-span-3 bg-[#161B22] rounded p-2 text-sm">
        <h2>Trades</h2>
        <ul>
          <li>10:01 - 10,050</li>
          <li>10:02 - 10,075</li>
          <li>10:03 - 10,060</li>
        </ul>
      </div>

    </div>
  </div>

  <!-- Chart Script -->
  <script>
    const chart = LightweightCharts.createChart(document.getElementById('chart'), {
      layout: {
        background: { color: '#161B22' },
        textColor: '#DDD'
      },
      grid: {
        vertLines: { color: '#2A2E39' },
        horzLines: { color: '#2A2E39' }
      }
    });

    const candleSeries = chart.addCandlestickSeries();

    candleSeries.setData([
      { time: '2024-01-01', open: 100, high: 110, low: 95, close: 105 },
      { time: '2024-01-02', open: 105, high: 115, low: 100, close: 110 },
      { time: '2024-01-03', open: 110, high: 120, low: 108, close: 115 },
      { time: '2024-01-04', open: 115, high: 125, low: 112, close: 120 },
      { time: '2024-01-05', open: 120, high: 130, low: 118, close: 125 },
    ]);

    chart.timeScale().fitContent();
  </script>

</body>
</html>
